<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Domácí Učitel</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0f1117;--card:#1a1d27;--card2:#242834;--text:#e8e8ed;--text2:#9ca3af;--text3:#6b7280;--accent:#f59e0b;--accent2:#fbbf24;--green:#10b981;--red:#ef4444;--blue:#3b82f6;--matika:#f97316;--cestina:#06b6d4;--prirodoveda:#22c55e;--vlastiveda:#8b5cf6;--anglictina:#ec4899;--radius:14px;--shadow:0 4px 20px rgba(0,0,0,0.3)}
    body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh}
    button{font-family:'Nunito',sans-serif;cursor:pointer;border:none;transition:transform .15s}
    button:hover{transform:translateY(-1px)}button:active{transform:scale(.97)}
    @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    .fade-in{animation:fadeIn .35s ease-out}.slide-up{animation:slideUp .4s ease-out}
    .screen{min-height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
    .login{justify-content:center;align-items:center;padding:40px 24px}
    .login-logo{font-size:72px;margin-bottom:12px;filter:drop-shadow(0 4px 12px rgba(245,158,11,0.4))}
    .login-title{font-size:32px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .login-sub{color:var(--text2);font-size:15px;margin:6px 0 40px}
    .login-btn{display:block;width:100%;padding:18px;border-radius:var(--radius);color:#fff;font-size:17px;font-weight:700;margin-bottom:12px;box-shadow:var(--shadow)}
    .header{display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--card);border-bottom:1px solid rgba(255,255,255,0.06);position:sticky;top:0;z-index:10}
    .back-btn{background:var(--card2);padding:8px 14px;border-radius:10px;font-size:14px;font-weight:600;color:var(--text2)}
    .header-title{font-size:17px;font-weight:700;flex:1}
    .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px}
    .loading-spinner{width:40px;height:40px;border:4px solid var(--card2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
    .day-grid{padding:16px 18px;display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
    .day-card{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 8px;background:var(--card);border-radius:12px;border:2px solid transparent;transition:border-color .2s}
    .day-card:hover{border-color:var(--accent)}.day-card.completed{border-color:var(--green);background:rgba(16,185,129,0.08)}
    .day-num{font-size:22px;font-weight:800;color:var(--accent)}.day-label{font-size:10px;color:var(--text3);margin-top:2px}
    .week-label{grid-column:1/-1;font-size:13px;font-weight:700;color:var(--text2);padding:8px 0 2px}
    .okruh-list{padding:16px 18px;display:flex;flex-direction:column;gap:10px}
    .okruh-card{display:flex;align-items:center;gap:14px;padding:16px;background:var(--card);border-radius:12px;border-left:4px solid var(--accent);text-align:left;transition:border-color .2s}
    .okruh-card:hover{border-left-color:var(--accent2)}
    .okruh-card.chaos{border-left-color:var(--red);background:linear-gradient(135deg,var(--card),rgba(239,68,68,0.08))}
    .okruh-card.completed{opacity:.6;border-left-color:var(--green)}
    .quiz-screen{min-height:100vh;display:flex;flex-direction:column}
    .quiz-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 18px;gap:20px}
    .quiz-progress{display:flex;gap:6px;margin-bottom:8px}
    .quiz-pip{width:24px;height:6px;border-radius:3px;background:var(--card2);transition:background .3s}
    .quiz-pip.done{background:var(--green)}.quiz-pip.wrong{background:var(--red)}.quiz-pip.active{background:var(--accent)}
    .quiz-question{font-size:18px;font-weight:700;text-align:center;line-height:1.5;padding:0 8px;min-height:54px}
    .quiz-choices{display:flex;flex-direction:column;gap:8px;width:100%;max-width:400px}
    .quiz-choice{padding:14px 18px;background:var(--card);border-radius:12px;color:var(--text);font-size:15px;font-weight:600;text-align:left;border:2px solid rgba(255,255,255,0.06);transition:border-color .2s,background .2s}
    .quiz-choice:hover{border-color:var(--accent)}
    .quiz-choice.correct{border-color:var(--green);background:rgba(16,185,129,0.15)}
    .quiz-choice.wrong{border-color:var(--red);background:rgba(239,68,68,0.1)}
    .quiz-choice.disabled{pointer-events:none;opacity:.7}
    .quiz-result{display:flex;flex-direction:column;align-items:center;gap:16px;padding:40px 24px;text-align:center;flex:1;justify-content:center}
    .quiz-result-btn{padding:16px 40px;border-radius:var(--radius);background:var(--accent);color:#000;font-size:16px;font-weight:700;margin-top:12px}
    .score-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;font-size:12px;font-weight:700}
    .score-correct{background:rgba(16,185,129,0.15);color:var(--green)}
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const{useState,useEffect}=React;
const PI={cestina:'📖',matika:'🔢',anglictina:'🇬🇧',prirodoveda:'🌿',vlastiveda:'🏰',mix:'🎲'};
const PC={cestina:'var(--cestina)',matika:'var(--matika)',anglictina:'var(--anglictina)',prirodoveda:'var(--prirodoveda)',vlastiveda:'var(--vlastiveda)',mix:'var(--red)'};
const PN={cestina:'Čeština',matika:'Matematika',anglictina:'Angličtina',prirodoveda:'Přírodověda',vlastiveda:'Vlastivěda',mix:'Chaos'};
const norm=s=>String(s).toLowerCase().replace(/\s+/g,' ').trim().replace(/[.,!?]/g,'').replace(/\s/g,'');
const getOD=id=>localStorage.getItem('od_'+id)==='1';
const setOD=id=>localStorage.setItem('od_'+id,'1');
const GW=['Hmm, to není ono 🤔','Skoro! Ještě jednou? 🧐','To nesedí, přemýšlej 💭'];
const GC=['Výborně! 🎯','Přesně tak! ⭐','Správně! 🏅','Bingo! 🚀'];
const GA=['Šlo to! 💪','Nakonec správně! ✨','Zvládl/a jsi to! 👍'];
const rnd=a=>a[Math.floor(Math.random()*a.length)];

function Login({onSelect}){
  return(<div className="screen login"><div className="slide-up" style={{textAlign:'center',width:'100%'}}>
    <div className="login-logo">📚</div>
    <div className="login-title">Domácí Učitel</div>
    <div className="login-sub">4. třída ZŠ</div>
    <button className="login-btn" style={{background:'linear-gradient(135deg,#f59e0b,#f97316)'}} onClick={()=>onSelect('mise')}>🗺️ Mise</button>
    <button className="login-btn" style={{background:'var(--blue)'}} onClick={()=>onSelect('parent')}>👨‍👩‍👧 Jsem rodič</button>
    <div style={{color:'var(--text3)',fontSize:12,marginTop:40}}>v0.6 — Jaty</div>
  </div></div>);
}

function MisePicker({onPick,onBack}){
  const mises=[{id:1,mesic:'Září',soubor:'mise01_zari.json',icon:'🍂',color:'#f59e0b'}];
  return(<div className="screen"><div className="header"><button className="back-btn" onClick={onBack}>←</button><span className="header-title">Vyber misi</span></div>
    <div style={{padding:'16px 18px',display:'flex',flexDirection:'column',gap:12}}>
      {mises.map((m,i)=>(
        <button key={m.id} className="fade-in" style={{display:'flex',alignItems:'center',gap:16,padding:'20px 18px',background:'var(--card)',borderRadius:'var(--radius)',borderLeft:'4px solid '+m.color,textAlign:'left',boxShadow:'var(--shadow)'}} onClick={()=>onPick(m)}>
          <span style={{fontSize:40}}>{m.icon}</span>
          <div style={{flex:1}}><div style={{fontSize:18,fontWeight:800}}>Mise {m.id} — {m.mesic}</div><div style={{fontSize:13,color:'var(--text3)',marginTop:2}}>20 dní • 800 otázek</div></div>
          <span style={{fontSize:20,color:'var(--text3)'}}>→</span>
        </button>
      ))}
      {[2,3,4,5,6,7,8,9,10].map(n=>(
        <div key={n} style={{padding:'20px 18px',background:'var(--card)',borderRadius:'var(--radius)',borderLeft:'4px solid var(--card2)',opacity:.4,display:'flex',alignItems:'center',gap:16}}>
          <span style={{fontSize:40}}>🔒</span><div><div style={{fontSize:16,fontWeight:700,color:'var(--text3)'}}>Mise {n}</div><div style={{fontSize:12,color:'var(--text3)'}}>Připravuje se...</div></div>
        </div>
      ))}
    </div></div>);
}

function DayPicker({data,name,onPick,onBack}){
  const wk=[{l:'Týden 1 — Rozjezd',d:data.filter(d=>d.den>=1&&d.den<=5)},{l:'Týden 2 — Nová látka',d:data.filter(d=>d.den>=6&&d.den<=10)},{l:'Týden 3 — Prohlubování',d:data.filter(d=>d.den>=11&&d.den<=15)},{l:'Týden 4 — Upevnění',d:data.filter(d=>d.den>=16&&d.den<=20)}];
  return(<div className="screen"><div className="header"><button className="back-btn" onClick={onBack}>←</button><span className="header-title">{name}</span></div>
    <div className="day-grid">
      {wk.map((w,wi)=><React.Fragment key={wi}>
        <div className="week-label">{w.l}</div>
        {w.d.map(day=>{const c=day.okruhy.every(o=>getOD(o.okruh_id));const dc=day.okruhy.filter(o=>getOD(o.okruh_id)).length;
          return(<button key={day.den} className={'day-card fade-in'+(c?' completed':'')} style={{animationDelay:day.den*.03+'s'}} onClick={()=>onPick(day)}>
            <div className="day-num">{c?'✓':day.den}</div><div className="day-label">{dc}/4</div>
          </button>);})}
      </React.Fragment>)}
    </div></div>);
}

function OkruhPicker({day,onPick,onBack}){
  return(<div className="screen"><div className="header"><button className="back-btn" onClick={onBack}>←</button><span className="header-title">Den {day.den}</span><span style={{fontSize:12,color:'var(--text3)'}}>40 otázek</span></div>
    <div className="okruh-list">
      {day.okruhy.map((o,i)=>{const done=getOD(o.okruh_id);const ch=o.typ==='chaos';const icon=ch?'🎲':(PI[o.predmet]||'📝');const color=ch?'var(--red)':(PC[o.predmet]||'var(--accent)');const nm=ch?'CHAOS — mix všeho!':(PN[o.predmet]||o.predmet);
        return(<button key={i} className={'okruh-card fade-in'+(ch?' chaos':'')+(done?' completed':'')} style={{animationDelay:i*.08+'s',borderLeftColor:done?'var(--green)':color}} onClick={()=>onPick(o)}>
          <span style={{fontSize:28}}>{icon}</span>
          <div style={{flex:1}}><div style={{fontSize:15,fontWeight:700}}>{nm}</div><div style={{fontSize:12,color:'var(--text3)',marginTop:2}}>{o.tema} • 10 otázek</div></div>
          {done?<span style={{fontSize:11,fontWeight:700,padding:'3px 8px',borderRadius:6,background:'rgba(16,185,129,0.15)',color:'var(--green)'}}>✓</span>:<span style={{fontSize:11,fontWeight:700,padding:'3px 8px',borderRadius:6,background:'rgba(245,158,11,0.15)',color:'var(--accent)'}}>→</span>}
        </button>);})}
    </div></div>);
}

function Quiz({okruh,onFinish,onBack}){
  const[tasks]=useState(()=>okruh.otazky);
  const[cur,setCur]=useState(0);const[res,setRes]=useState([]);const[att,setAtt]=useState(0);
  const[sel,setSel]=useState(null);const[wrongs,setWrongs]=useState([]);
  const[guide,setGuide]=useState('');const[fb,setFb]=useState('');const[phase,setPhase]=useState('go');
  const t=tasks[cur];const ch=okruh.typ==='chaos';

  function adv(nr){setTimeout(()=>{
    if(cur+1<tasks.length){setCur(c=>c+1);setSel(null);setWrongs([]);setFb('');setGuide('');setAtt(0);setPhase('go');}
    else{if(nr.filter(r=>r==='c').length>=7)setOD(okruh.okruh_id);setPhase('done');}
  },1400);}

  function pick(opt){
    if(phase!=='go'||wrongs.includes(opt))return;
    if(norm(opt)===norm(t.answer)){
      setSel(opt);setPhase('fb');const nr=[...res,'c'];setRes(nr);
      setGuide(att>0?rnd(GA):rnd(GC));setFb('');adv(nr);
    }else{
      const na=att+1;setAtt(na);setWrongs(p=>[...p,opt]);
      if(na>=3){setSel(opt);setPhase('rev');const nr=[...res,'w'];setRes(nr);setGuide('Správná odpověď: '+t.answer);setFb(t.hint||'');adv(nr);}
      else if(na===1){setGuide(rnd(GW));setFb('');}
      else{setGuide('Poslední pokus! 💡 '+(t.hint||'Přemýšlej...'));setFb('');}
    }
  }

  if(phase==='done'){const cc=res.filter(r=>r==='c').length;const ok=cc>=7;
    return(<div className="quiz-screen"><div className="header"><button className="back-btn" onClick={onBack}>←</button><span className="header-title">{okruh.tema}</span></div>
      <div className="quiz-result slide-up">
        <div style={{fontSize:64}}>{ok?'🏆':'💪'}</div>
        <div style={{fontSize:24,fontWeight:800,color:ok?'var(--green)':'var(--accent)'}}>{ok?'Výborně!':'Zkus to znovu'}</div>
        <div style={{fontSize:18,color:'var(--text2)'}}>{cc} z {tasks.length} správně</div>
        <div className="quiz-progress" style={{marginTop:8}}>{res.map((r,i)=><div key={i} className={'quiz-pip '+(r==='c'?'done':'wrong')}/>)}</div>
        {!ok&&<p style={{color:'var(--text3)',fontSize:13,marginTop:8}}>Potřebuješ aspoň 7 z 10.</p>}
        <button className="quiz-result-btn" onClick={onFinish}>← Zpět</button>
      </div></div>);}

  if(!t)return null;
  return(<div className="quiz-screen"><div className="header"><button className="back-btn" onClick={onBack}>←</button>
    <span className="header-title" style={{fontSize:14}}>{ch&&t.predmet?(PI[t.predmet]||'')+' ':''}{okruh.tema}</span>
    <span className="score-badge score-correct">{cur+1}/{tasks.length}</span></div>
    <div className="quiz-body" key={cur+'-'+att}>
      <div className="quiz-progress">{tasks.map((_,i)=><div key={i} className={'quiz-pip'+(i<res.length?(res[i]==='c'?' done':' wrong'):(i===cur?' active':''))}/>)}</div>
      <div className="quiz-question fade-in">{t.question}</div>
      <div className="quiz-choices fade-in">{(t.options||[]).map((opt,i)=>{
        const wp=wrongs.includes(opt);const ic=norm(opt)===norm(t.answer);
        let cls='quiz-choice';
        if(phase==='rev'||phase==='fb'){cls+=' disabled';if(ic)cls+=' correct';if(opt===sel&&!ic)cls+=' wrong';}
        else if(wp)cls+=' wrong disabled';
        return<button key={i} className={cls} onClick={()=>pick(opt)}>{opt}</button>;
      })}</div>
      {guide&&<div className="fade-in" style={{display:'flex',gap:10,alignItems:'flex-start',maxWidth:400,width:'100%',padding:'0 4px'}}>
        <span style={{fontSize:28,flexShrink:0}}>🧑‍🔬</span>
        <div style={{background:'var(--card)',borderRadius:'4px 14px 14px 14px',padding:'10px 14px',fontSize:14,lineHeight:1.5}}>
          {guide}{fb&&<div style={{color:'var(--text3)',fontSize:12,marginTop:4}}>{fb}</div>}
        </div></div>}
      {att>0&&phase==='go'&&<div style={{fontSize:11,color:'var(--text3)'}}>Pokus {att+1}/3</div>}
    </div></div>);
}

function Parent({onBack}){
  return(<div className="screen"><div className="header"><button className="back-btn" onClick={onBack}>←</button><span className="header-title">📊 Přehled</span></div>
    <div style={{padding:'16px 18px'}} className="fade-in"><div style={{background:'var(--card)',borderRadius:'var(--radius)',padding:18,boxShadow:'var(--shadow)'}}>
      <div style={{fontSize:13,color:'var(--text2)'}}>Stav</div><div style={{fontSize:24,fontWeight:800,color:'var(--accent)'}}>Aktivní</div>
      <p style={{color:'var(--text3)',fontSize:13,marginTop:4}}>Rodičovský přehled bude doplněn.</p>
    </div></div></div>);
}

function App(){
  const[v,setV]=useState('login');const[md,setMd]=useState(null);const[mn,setMn]=useState('');
  const[day,setDay]=useState(null);const[okr,setOkr]=useState(null);const[tick,setTick]=useState(0);
  const[ld,setLd]=useState(false);const[err,setErr]=useState(null);

  function loadM(m){setLd(true);fetch(m.soubor).then(r=>{if(!r.ok)throw new Error();return r.json();}).then(d=>{setMd(d);setMn('Mise '+m.id+' — '+m.mesic);setV('days');setLd(false);}).catch(()=>{setErr('Nepodařilo se načíst misi.');setLd(false);});}

  if(err)return<div className="loading"><div style={{fontSize:48}}>⚠️</div><div style={{color:'var(--red)'}}>{err}</div><button style={{marginTop:16,padding:'10px 24px',background:'var(--card)',color:'var(--text)',borderRadius:10}} onClick={()=>{setErr(null);setV('login');}}>Zpět</button></div>;
  if(ld)return<div className="loading"><div className="loading-spinner"/><div style={{color:'var(--text2)'}}>Načítám misi...</div></div>;
  if(v==='login')return<Login onSelect={setV}/>;
  if(v==='mise')return<MisePicker onPick={loadM} onBack={()=>setV('login')}/>;
  if(v==='days'&&md)return<DayPicker data={md} name={mn} onPick={d=>{setDay(d);setV('okruhy');}} onBack={()=>{setMd(null);setV('mise');}}/>;
  if(v==='okruhy'&&day)return<OkruhPicker day={day} onPick={o=>{setOkr(o);setV('quiz');}} onBack={()=>{setDay(null);setV('days');}}/>;
  if(v==='quiz'&&okr)return<Quiz key={okr.okruh_id+'-'+tick} okruh={okr} onFinish={()=>{setOkr(null);setV('okruhy');setTick(t=>t+1);}} onBack={()=>{setOkr(null);setV('okruhy');}}/>;
  if(v==='parent')return<Parent onBack={()=>setV('login')}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
