<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Domácí Učitel</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0f1117;--card:#1a1d27;--card2:#242834;
--text:#e8e8ed;--text2:#9ca3af;--text3:#6b7280;
--accent:#f59e0b;--accent2:#fbbf24;
--green:#10b981;--red:#ef4444;--blue:#3b82f6;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);width:100vw;height:100vh;height:100dvh}
button{font-family:'Nunito',sans-serif;cursor:pointer;border:none}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes bubblePop{0%{opacity:0;transform:scale(0.6)}60%{transform:scale(1.06)}100%{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes collectPop{0%{transform:scale(0) rotate(-8deg);opacity:0}50%{transform:scale(1.12) rotate(2deg)}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}

/* LOGIN */
.login-screen{height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:40px 24px;text-align:center}
.login-logo{font-size:72px;margin-bottom:12px;filter:drop-shadow(0 4px 12px rgba(245,158,11,0.4))}
.login-title{font-size:32px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-sub{color:var(--text2);font-size:15px;margin:6px 0 40px}
.login-btn{display:block;width:100%;max-width:400px;padding:18px;border-radius:14px;color:#fff;font-size:17px;font-weight:700;margin-bottom:12px;box-shadow:0 4px 20px rgba(0,0,0,0.3)}

/* DAY PICKER */
.dp-screen{height:100%;display:flex;flex-direction:column}
.hdr{display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--card);border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0}
.back-btn{background:var(--card2);padding:8px 14px;border-radius:10px;font-size:14px;font-weight:600;color:var(--text2)}
.hdr-title{font-size:17px;font-weight:700;flex:1}
.day-list{flex:1;overflow-y:auto;padding:16px 18px}
.day-card{display:flex;align-items:center;gap:14px;padding:16px;background:var(--card);border-radius:14px;box-shadow:0 4px 20px rgba(0,0,0,0.3);text-align:left;border-left:4px solid var(--accent);margin-bottom:8px;width:100%}
.day-card.locked{opacity:0.4;border-left-color:var(--text3)}
.day-num{font-size:28px;font-weight:800;color:var(--accent);min-width:40px;text-align:center;font-family:'Bangers',cursive}

/* FULLSCREEN SCENE */
.scene{position:fixed;inset:0;overflow:hidden;background:#000}
.scene-bg{position:absolute;inset:0;background-size:contain;background-position:center;background-repeat:no-repeat;background-color:#000}
.scene-dim{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.35) 0%,transparent 25%,transparent 75%,rgba(0,0,0,0.2) 100%)}
.top-bar{position:absolute;top:8px;left:12px;right:12px;z-index:40;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none}
.top-bar>*{pointer-events:auto}
.pill{background:rgba(0,0,0,0.55);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,0.15);border-radius:12px;padding:6px 14px;color:#fff;font-size:13px;font-weight:700}

/* BUBLINA — vajíčko na ležato, špička dolů k ústům */
.bub-wrap{position:absolute;z-index:15;animation:bubblePop 0.3s ease-out}
.bub-egg{
  position:relative;background:#fff;color:#1a1a1a;
  border:3px solid #222;
  /* vajíčko na ležato = hodně border-radius, víc široké než vysoké */
  border-radius:48% 48% 48% 48% / 52% 52% 52% 52%;
  padding:14px 32px 12px;
  min-width:180px;max-width:320px;
  box-shadow:3px 4px 0 rgba(0,0,0,0.2);
}
.bub-name{font-family:'Bangers',cursive;font-size:13px;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:2px;text-align:center}
.bub-name.cv{color:#1565C0}
.bub-name.ca{color:#2E7D32}
.bub-name.cp{color:#C62828}
.bub-txt{font-size:15px;font-weight:600;line-height:1.4;text-align:left}
/* Špička — dlouhá ostrá, dolů k ústům */
.bub-tail{position:absolute;bottom:-20px;width:20px;height:22px}
.bub-tail.tl{left:35%}
.bub-tail.tr{right:35%}

/* Popisný text scény */
.scene-desc{
  position:absolute;z-index:15;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(0,0,0,0.78);border-radius:20px;padding:14px 24px;
  color:#ddd;font-size:16px;font-style:italic;text-align:center;
  max-width:75%;backdrop-filter:blur(4px);animation:fadeIn 0.3s
}

/* Dialog hint */
.tap-hint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);z-index:30;
  background:rgba(0,0,0,0.45);backdrop-filter:blur(4px);border-radius:20px;padding:7px 18px;
  font-size:13px;color:rgba(255,255,255,0.45);pointer-events:none}

/* OTÁZKOVÝ PANEL */
.q-panel{position:absolute;bottom:0;left:0;right:0;z-index:20;
  background:rgba(12,12,24,0.93);backdrop-filter:blur(12px);
  border-top:2px solid rgba(255,255,255,0.08);padding:10px 14px 14px;
  animation:slideUp 0.25s ease-out}
.q-text{font-size:17px;font-weight:700;color:#E8E8ED;line-height:1.4;margin-bottom:8px;text-align:center}
.q-opts{display:flex;flex-direction:column;gap:6px;max-width:560px;margin:0 auto}
.q-opt{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:11px;
  background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.12);
  color:#fff;font-size:16px;font-weight:600;text-align:left;transition:all 0.12s}
.q-opt:hover:not(.lk){border-color:var(--accent);background:rgba(255,255,255,0.1)}
.q-opt:active:not(.lk){transform:scale(0.98)}
.q-opt.lk{pointer-events:none}
.q-lbl{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,0.1);font-family:'Bangers',cursive;font-size:14px}
.q-opt.ok{background:rgba(16,185,129,0.2);border-color:#10B981;color:#A7F3D0}
.q-opt.ok .q-lbl{background:#10B981;color:#fff}
.q-opt.bad{background:rgba(239,68,68,0.15);border-color:#EF4444;color:#FECACA}
.q-opt.bad .q-lbl{background:#EF4444;color:#fff}
.q-opt.dim{opacity:0.3}
.q-info{text-align:center;font-size:12px;color:rgba(255,255,255,0.35);margin-top:4px}

/* SBĚR */
.col-ov{position:absolute;inset:0;z-index:60;background:rgba(0,0,0,0.87);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;cursor:pointer}
.col-box{text-align:center;padding:30px;animation:collectPop 0.5s ease-out}

/* SHRNUTÍ */
.sum-ov{position:absolute;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:50}
.sum-box{background:rgba(18,18,35,0.95);border:2px solid rgba(255,255,255,0.12);border-radius:22px;padding:32px;max-width:420px;width:90%;text-align:center;animation:collectPop 0.4s}

/* VIDEO */
.vid-wrap{position:fixed;inset:0;background:#000;z-index:100}
.vid-wrap video{width:100%;height:100%;object-fit:cover}
.skip-btn{position:absolute;bottom:24px;right:24px;background:rgba(0,0,0,0.6);color:#fff;border:none;
  border-radius:12px;padding:10px 20px;font-size:15px;font-weight:700;backdrop-filter:blur(4px);z-index:10}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px}
.spinner{width:40px;height:40px;border:4px solid var(--card2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const {useState,useRef,useEffect} = React;

const GH = 'https://raw.githubusercontent.com/jaty-byznys/domaci-ucitel/main/';
const LABELS = ['A','B','C','D','E'];
const NAMES = {volta:'Dr. Volta',agent:'Agent K',skripek:'Skřípek',repak:'Řepák',keksik:'Keksík',krivak:'Krivák',piratka:'Pirátka',kotva:'Kotva'};
const PIRATES = ['skripek','repak','krivak','piratka','kotva'];
function norm(s){return String(s).toLowerCase().replace(/\s+/g,' ').trim().replace(/[.,!?]/g,'').replace(/\s/g,'');}

/* ═══ BUBLINA — vajíčko na ležato, špička dolů k ústům ═══ */
function Bubble({who,text}){
  const w = (who||'volta').toLowerCase();
  if(w==='popis') return <div className="scene-desc">{text}</div>;
  
  const name = NAMES[w]||who;
  const isAgent = w==='agent';
  const isPirat = PIRATES.includes(w);
  
  // Pozice: NAD hlavou postavy, mírně před obličejem
  // Volta hlava ~ 28% zleva na obrázku → bublina tam
  // Agent hlava ~ 82% zleva → bublina tam
  // Piráti — záleží, defaultně vlevo-střed
  let style;
  if(isAgent){
    style = {right:'6%',top:'8%'};
  } else {
    style = {left:'3%',top:'5%'};
  }
  
  const nc = isAgent?'ca':isPirat?'cp':'cv';
  const tc = isAgent?'tr':'tl';
  
  return(
    <div className="bub-wrap" style={style} key={w+text.substring(0,20)}>
      <div className="bub-egg">
        <div className={'bub-name '+nc}>{name}</div>
        <div className="bub-txt">{text}</div>
      </div>
      <svg className={'bub-tail '+tc} viewBox="0 0 20 22" fill="none">
        <path d="M2 0 L10 20 L18 0" fill="#222"/>
        <path d="M4 0 L10 15 L16 0" fill="#fff"/>
      </svg>
    </div>
  );
}

/* ═══ VIDEO ═══ */
function VideoPlayer({src,onEnd}){
  return(
    <div className="vid-wrap">
      <video key={src} src={src} autoPlay muted playsInline onEnded={onEnd} onError={onEnd}/>
      <button className="skip-btn" onClick={onEnd}>Přeskočit ▸</button>
    </div>
  );
}

/* ═══ MISSION SCREEN ═══ */
function MissionScreen({dayData,onBack}){
  const [phase,setPhase] = useState('intro_video');
  const [okruhIdx,setOkruhIdx] = useState(0);
  const [qIdx,setQIdx] = useState(0);
  const [dialogIdx,setDialogIdx] = useState(0);
  const [score,setScore] = useState({correct:0,total:0});
  const [attempts,setAttempts] = useState(0);
  const [answered,setAnswered] = useState(null); // null|'correct'|'wrong'|'giveup'
  const [selectedOpt,setSelectedOpt] = useState(null);
  const [collectItem,setCollectItem] = useState(null);
  const [introVidIdx,setIntroVidIdx] = useState(0);
  
  const dn = dayData.den;
  const imgBase = GH+'img/m01/d'+String(dn).padStart(2,'0')+'/';
  const vidBase = GH+'video/m01/d'+String(dn).padStart(2,'0')+'/';
  
  const sImg = n => imgBase+'D'+dn+'S'+n+'.png';
  const introVids = [vidBase+'D'+dn+'-S1.mp4', vidBase+'D'+dn+'-S2.mp4'];
  const akceVid = oi => vidBase+'D'+dn+'-S'+(oi+3)+'.mp4';
  const zaverVid = vidBase+'D'+dn+'-S6.mp4';
  
  function curBg(){
    if(phase==='summary'||phase==='zaver_dialog') return sImg(5);
    return sImg(Math.min(okruhIdx+1,6));
  }
  
  const okruh = dayData.okruhy?.[okruhIdx];
  const question = okruh?.otazky?.[qIdx];
  
  function getDialogs(){
    if(phase==='intro_dialog') return dayData.intro||[];
    if(phase==='akce_dialog') return okruh?.akce?.dialog||[];
    if(phase==='scenka') return okruh?.scenka||[];
    if(phase==='zaver_dialog') return dayData.zaver||[];
    return [];
  }
  const dialogs = getDialogs();
  const curDlg = dialogs[dialogIdx];
  
  // ─── Navigace ───
  function videoEnd(){
    if(phase==='intro_video'){
      if(introVidIdx+1 < introVids.length){setIntroVidIdx(introVidIdx+1);}
      else{setDialogIdx(0);setPhase('intro_dialog');}
    } else if(phase==='akce_video'){
      if(okruh?.akce?.dialog?.length>0){setDialogIdx(0);setPhase('akce_dialog');}
      else doSber();
    } else if(phase==='zaver_video'){
      if(dayData.zaver?.length>0){setDialogIdx(0);setPhase('zaver_dialog');}
      else setPhase('summary');
    }
  }
  
  function advDlg(){
    if(dialogIdx < dialogs.length-1){setDialogIdx(dialogIdx+1);}
    else{
      setDialogIdx(0);
      if(phase==='intro_dialog'){setQIdx(0);setAttempts(0);setAnswered(null);setSelectedOpt(null);setPhase('questions');}
      else if(phase==='akce_dialog') doSber();
      else if(phase==='scenka') nextOkruh();
      else if(phase==='zaver_dialog') setPhase('summary');
    }
  }
  
  function doSber(){
    const s = okruh?.akce?.sber;
    if(s){setCollectItem(s);} else afterSber();
  }
  function closeSber(){setCollectItem(null);afterSber();}
  function afterSber(){
    if(okruh?.scenka?.length>0){setDialogIdx(0);setPhase('scenka');}
    else nextOkruh();
  }
  
  function nextOkruh(){
    const nx = okruhIdx+1;
    if(nx < dayData.okruhy.length){
      setOkruhIdx(nx);setQIdx(0);setAttempts(0);setAnswered(null);setSelectedOpt(null);setDialogIdx(0);
      setPhase('questions');
    } else setPhase('zaver_video');
  }
  
  // ─── OTÁZKY: 3 pokusy, Volta pomáhá po každé špatné ───
  function handleSelect(opt){
    if(answered==='correct'||answered==='giveup') return;
    const isCorrect = norm(opt)===norm(question.answer);
    setSelectedOpt(opt);
    
    if(isCorrect){
      setAnswered('correct');
      setScore(p=>({correct:p.correct+1,total:p.total+1}));
      setTimeout(()=>{goNextQ();},2200);
    } else {
      const na = attempts+1;
      setAttempts(na);
      if(na>=3){
        setAnswered('giveup');
        setScore(p=>({...p,total:p.total+1}));
        setTimeout(()=>{goNextQ();},3000);
      } else {
        setAnswered('wrong');
        // Volta pomůže — po 2.5s reset pro další pokus
        setTimeout(()=>{setAnswered(null);setSelectedOpt(null);},2500);
      }
    }
  }
  
  function goNextQ(){
    setAnswered(null);setSelectedOpt(null);setAttempts(0);
    const nq = qIdx+1;
    if(nq >= (okruh?.otazky?.length||10)){
      // Po 10 otázkách → akce video (nebo závěr pro poslední okruh)
      if(okruhIdx < dayData.okruhy.length-1) setPhase('akce_video');
      else setPhase('zaver_video');
    } else setQIdx(nq);
  }
  
  // Volta text
  function voltaText(){
    if(!question) return '';
    if(answered==='correct') return question.vs||'Správně! 🎯';
    if(answered==='giveup') return 'Správná odpověď: '+question.answer;
    if(answered==='wrong') return question.vn||question.hint||'Zkus to jinak!';
    return question.vi||question.question;
  }
  
  // ═══ RENDER ═══
  
  // VIDEO
  if(phase==='intro_video') return <VideoPlayer src={introVids[introVidIdx]} onEnd={videoEnd}/>;
  if(phase==='akce_video') return <VideoPlayer src={akceVid(okruhIdx)} onEnd={videoEnd}/>;
  if(phase==='zaver_video') return <VideoPlayer src={zaverVid} onEnd={videoEnd}/>;
  
  // DIALOGY
  if(['intro_dialog','akce_dialog','scenka','zaver_dialog'].includes(phase)){
    const d = curDlg;
    if(!d){advDlg();return null;}
    return(
      <div className="scene" onClick={advDlg} style={{cursor:'pointer'}}>
        <div className="scene-bg" style={{backgroundImage:'url('+curBg()+')'}}/>
        <div className="scene-dim"/>
        <div className="top-bar">
          <button className="pill" onClick={e=>{e.stopPropagation();onBack();}}>← Zpět</button>
        </div>
        <Bubble who={d.p} text={d.t}/>
        <div className="tap-hint">{dialogIdx+1}/{dialogs.length} — Klikni ▸</div>
        {collectItem && (
          <div className="col-ov" onClick={e=>{e.stopPropagation();closeSber();}}>
            <div className="col-box">
              <div style={{fontSize:14,color:'#FFD700',fontWeight:700,letterSpacing:2,marginBottom:16}}>✦ NOVÝ PŘEDMĚT ✦</div>
              <div style={{fontSize:56,marginBottom:12}}>{collectItem.ikona||'📦'}</div>
              <div style={{fontSize:24,fontWeight:700,color:'#FFD700'}}>{collectItem.nazev}</div>
              {collectItem.popis && <div style={{color:'#aaa',fontSize:15,marginTop:6}}>{collectItem.popis}</div>}
              <div style={{color:'#555',fontSize:13,marginTop:20}}>Klikni pro pokračování</div>
            </div>
          </div>
        )}
      </div>
    );
  }
  
  // OTÁZKY
  if(phase==='questions' && question){
    const vt = voltaText();
    const agentTxt = selectedOpt;
    const locked = answered==='correct'||answered==='giveup';
    const okIcons = ['📝','🔢','🌍','🌀'];
    
    return(
      <div className="scene">
        <div className="scene-bg" style={{backgroundImage:'url('+curBg()+')'}}/>
        <div className="scene-dim"/>
        <div className="top-bar">
          <div style={{display:'flex',gap:8}}>
            <button className="pill" onClick={onBack}>← Zpět</button>
            <span className="pill">{okIcons[okruhIdx]||'📚'} {okruh?.tema} — {qIdx+1}/{okruh?.otazky?.length}</span>
          </div>
          <span className="pill">⭐ {score.correct}/{score.total}</span>
        </div>
        
        {/* Volta bublina — nad jeho hlavou vlevo */}
        <Bubble who="volta" text={vt}/>
        
        {/* Agent bublina — co dítě vybralo */}
        {agentTxt && <Bubble who="agent" text={agentTxt}/>}
        
        {/* Panel otázek dole */}
        <div className="q-panel">
          <div className="q-text">{question.question}</div>
          <div className="q-opts">
            {(question.options||[]).map((opt,i)=>{
              let c = 'q-opt';
              if(locked){
                if(norm(opt)===norm(question.answer)) c+=' ok';
                else if(opt===selectedOpt) c+=' bad';
                else c+=' dim';
                c+=' lk';
              } else if(answered==='wrong' && opt===selectedOpt){
                c+=' bad';
              }
              return(
                <button key={i} className={c} onClick={()=>handleSelect(opt)}>
                  <span className="q-lbl">
                    {locked && norm(opt)===norm(question.answer)?'✓':
                     (opt===selectedOpt && (answered==='wrong'||answered==='giveup'))?'✗':
                     LABELS[i]}
                  </span>
                  <span>{opt}</span>
                </button>
              );
            })}
          </div>
          {!locked && attempts>0 && <div className="q-info">Pokus {attempts+1}/3 — Volta ti pomáhá ☝️</div>}
        </div>
      </div>
    );
  }
  
  // SHRNUTÍ
  if(phase==='summary'){
    return(
      <div className="scene">
        <div className="scene-bg" style={{backgroundImage:'url('+sImg(5)+')'}}/>
        <div className="sum-ov">
          <div className="sum-box">
            <div style={{fontFamily:"'Bangers',cursive",fontSize:32,color:'#FFD700',marginBottom:18}}>🎉 Den {dn} hotový!</div>
            <div style={{display:'flex',justifyContent:'center',gap:28,marginBottom:20}}>
              <div>
                <div style={{fontFamily:"'Bangers',cursive",fontSize:36,color:'#4CAF50'}}>{score.correct}</div>
                <div style={{fontSize:13,color:'rgba(255,255,255,0.45)',textTransform:'uppercase',letterSpacing:1}}>Správně</div>
              </div>
              <div>
                <div style={{fontFamily:"'Bangers',cursive",fontSize:36,color:'#fff'}}>{score.total}</div>
                <div style={{fontSize:13,color:'rgba(255,255,255,0.45)',textTransform:'uppercase',letterSpacing:1}}>Otázek</div>
              </div>
            </div>
            {dayData.predmety_sberu?.length>0 && <div>
              <div style={{fontFamily:"'Bangers',cursive",fontSize:18,color:'#fff',marginBottom:10}}>Sebrané předměty</div>
              <div style={{display:'flex',justifyContent:'center',gap:8,flexWrap:'wrap'}}>
                {dayData.predmety_sberu.map((p,i)=>(
                  <div key={i} style={{background:'rgba(255,255,255,0.06)',borderRadius:12,padding:'8px 12px',fontSize:14,border:'1px solid rgba(245,158,11,0.3)'}}>
                    <span style={{marginRight:5}}>{p.ikona}</span>{p.nazev}
                  </div>
                ))}
              </div>
            </div>}
            <button onClick={onBack} style={{marginTop:24,background:'#f59e0b',border:'none',borderRadius:14,padding:'14px 32px',color:'#000',fontSize:18,fontWeight:700,cursor:'pointer'}}>
              Zpět na mise
            </button>
          </div>
        </div>
      </div>
    );
  }
  return null;
}

/* ═══ DAY PICKER ═══ */
function DayPicker({miseData,onPick,onBack}){
  return(
    <div className="dp-screen">
      <div className="hdr">
        <button className="back-btn" onClick={onBack}>←</button>
        <span style={{fontSize:24}}>🏴‍☠️</span>
        <span className="hdr-title">Mise 1 — Září</span>
      </div>
      <div className="day-list">
        {miseData.map((den,i)=>{
          const ok = den.intro?.length>0;
          return(
            <button key={i} className={'day-card'+(ok?'':' locked')} onClick={()=>ok&&onPick(den)} disabled={!ok}>
              <span className="day-num">{den.den}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:15,fontWeight:700}}>{den.nazev||'Den '+den.den}</div>
                <div style={{fontSize:12,color:'var(--text3)',marginTop:2}}>{ok?den.okruhy?.map(o=>o.tema).join(' • '):'🔒 Připravuje se'}</div>
              </div>
              {ok && <span style={{fontSize:20}}>▶</span>}
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* ═══ APP ═══ */
function App(){
  const [view,setView] = useState('login');
  const [miseData,setMiseData] = useState(null);
  const [miseDay,setMiseDay] = useState(null);
  const [loading,setLoading] = useState(false);
  
  function loadMise(){
    setLoading(true);
    fetch('mise01_scenar.json').then(r=>r.json())
      .then(d=>{setMiseData(d);setLoading(false);setView('dayPicker');})
      .catch(()=>{setLoading(false);alert('Chyba načítání mise.');});
  }
  
  function pickDay(den){
    // Zkus načíst detailní scénář pro den
    if(den.okruhy?.[0]?.otazky?.length>0 && den.intro?.length>0){
      setMiseDay(den);setView('mission');return;
    }
    const dNum = String(den.den).padStart(2,'0');
    fetch('mise01_scenar_d'+dNum+'.json').then(r=>{if(!r.ok)throw 0;return r.json();})
      .then(d=>{setMiseDay(d);setView('mission');})
      .catch(()=>{setMiseDay(den);setView('mission');});
  }
  
  if(loading) return <div className="loading"><div className="spinner"/><div style={{color:'var(--text2)'}}>Načítám...</div></div>;
  
  if(view==='login') return(
    <div className="login-screen">
      <div className="login-logo">📚</div>
      <div className="login-title">Domácí Učitel</div>
      <div className="login-sub">4. třída ZŠ</div>
      <button className="login-btn" style={{background:'linear-gradient(135deg,#dc2626,#f59e0b)',fontSize:18}} onClick={loadMise}>
        🎮 Mise — Zachraň Dr. Voltu!
      </button>
      <button className="login-btn" style={{background:'var(--blue)'}} onClick={()=>setView('parent')}>
        👨‍👩‍👧 Jsem rodič
      </button>
      <div style={{color:'var(--text3)',fontSize:12,marginTop:40}}>v1.0 — Jaty</div>
    </div>
  );
  
  if(view==='dayPicker'&&miseData) return <DayPicker miseData={miseData} onPick={pickDay} onBack={()=>setView('login')}/>;
  if(view==='mission'&&miseDay) return <MissionScreen dayData={miseDay} onBack={()=>{setMiseDay(null);setView('dayPicker');}}/>;
  if(view==='parent') return(
    <div style={{height:'100%',display:'flex',flexDirection:'column'}}>
      <div className="hdr"><button className="back-btn" onClick={()=>setView('login')}>←</button><span className="hdr-title">📊 Rodičovský přehled</span></div>
      <div style={{padding:24,textAlign:'center',color:'var(--text2)'}}>Připravuje se</div>
    </div>
  );
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
