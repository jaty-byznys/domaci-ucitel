<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Domácí Učitel</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --card: #1a1d27; --card2: #242834;
      --text: #e8e8ed; --text2: #9ca3af; --text3: #6b7280;
      --accent: #f59e0b; --accent2: #fbbf24;
      --green: #10b981; --red: #ef4444; --blue: #3b82f6;
      --matika: #f97316; --cestina: #06b6d4; --prirodoveda: #22c55e;
      --vlastiveda: #8b5cf6; --anglictina: #ec4899;
      --radius: 14px; --shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; min-height: 100vh; }
    button { font-family: 'Nunito', sans-serif; cursor: pointer; border: none; transition: transform 0.15s, box-shadow 0.15s; }
    button:hover { transform: translateY(-1px); }
    button:active { transform: scale(0.97); }
    input, textarea { font-family: 'Nunito', sans-serif; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-in { animation: fadeIn 0.35s ease-out; }
    .slide-up { animation: slideUp 0.4s ease-out; }
    .app { max-width: 480px; margin: 0 auto; min-height: 100vh; position: relative; }
    .screen { min-height: 100vh; display: flex; flex-direction: column; }
    .login { justify-content: center; align-items: center; padding: 40px 24px; }
    .login-logo { font-size: 72px; margin-bottom: 12px; filter: drop-shadow(0 4px 12px rgba(245,158,11,0.4)); }
    .login-title { font-size: 32px; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .login-sub { color: var(--text2); font-size: 15px; margin: 6px 0 40px; }
    .login-btn { display: block; width: 100%; padding: 18px; border-radius: var(--radius); color: #fff; font-size: 17px; font-weight: 700; margin-bottom: 12px; box-shadow: var(--shadow); }
    .login-ver { color: var(--text3); font-size: 12px; margin-top: 40px; }
    .header { display: flex; align-items: center; gap: 12px; padding: 14px 18px; background: var(--card); border-bottom: 1px solid rgba(255,255,255,0.06); position: sticky; top: 0; z-index: 10; }
    .back-btn { background: var(--card2); padding: 8px 14px; border-radius: 10px; font-size: 14px; font-weight: 600; color: var(--text2); }
    .header-title { font-size: 17px; font-weight: 700; flex: 1; }
    .subjects { padding: 16px 18px; display: flex; flex-direction: column; gap: 10px; }
    .subject-card { display: flex; align-items: center; gap: 14px; padding: 18px 16px; background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); text-align: left; border-left: 4px solid var(--accent); }
    .subject-icon { font-size: 32px; }
    .subject-name { font-size: 16px; font-weight: 700; color: var(--text); flex: 1; }
    .subject-info { font-size: 12px; color: var(--text3); }
    .topics { padding: 16px 18px; display: flex; flex-direction: column; gap: 8px; }
    .topic-card { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: var(--card); border-radius: 12px; text-align: left; border: 1px solid rgba(255,255,255,0.04); }
    .topic-name { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; }
    .chat-screen { height: 100vh; height: 100dvh; display: flex; flex-direction: column; }
    .chat-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: var(--card); border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 16px 12px; display: flex; flex-direction: column; gap: 10px; }
    .msg { display: flex; max-width: 88%; }
    .msg-tutor { align-items: flex-start; gap: 8px; }
    .msg-student { justify-content: flex-end; align-self: flex-end; }
    .msg-avatar { font-size: 22px; margin-top: 4px; flex-shrink: 0; }
    .msg-bubble { padding: 10px 14px; font-size: 15px; line-height: 1.55; }
    .msg-tutor .msg-bubble { background: var(--card); color: var(--text); border-radius: 4px 16px 16px 16px; }
    .msg-student .msg-bubble { background: var(--blue); color: #fff; border-radius: 16px 4px 16px 16px; }
    .typing-dots { display: flex; gap: 4px; padding: 12px 16px; }
    .typing-dots span { width: 8px; height: 8px; background: var(--text3); border-radius: 50%; animation: pulse 1.4s infinite; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    .chat-input { display: flex; gap: 8px; padding: 10px 12px; background: var(--card); border-top: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }
    .chat-input input { flex: 1; padding: 12px 16px; border-radius: 24px; border: 2px solid var(--card2); background: var(--bg); color: var(--text); font-size: 15px; outline: none; }
    .chat-input input:focus { border-color: var(--accent); }
    .chat-input button { width: 48px; height: 48px; border-radius: 50%; background: var(--accent); color: #fff; font-size: 20px; display: flex; align-items: center; justify-content: center; }
    .choices { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
    .choice-btn { padding: 10px 14px; background: var(--card2); border-radius: 10px; color: var(--text); font-size: 14px; font-weight: 600; text-align: left; border: 1px solid rgba(255,255,255,0.08); }
    .choice-btn:hover { border-color: var(--accent); }
    .score-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 6px; font-size: 12px; font-weight: 700; }
    .score-correct { background: rgba(16,185,129,0.15); color: var(--green); }
    .dash-card { background: var(--card); border-radius: var(--radius); padding: 18px; margin-bottom: 12px; box-shadow: var(--shadow); }
    .dash-label { font-size: 13px; color: var(--text2); margin-bottom: 4px; }
    .dash-value { font-size: 24px; font-weight: 800; }
    .settings-input { width: 100%; padding: 12px 16px; background: var(--bg); border: 2px solid var(--card2); border-radius: 10px; color: var(--text); font-size: 15px; outline: none; }
    .settings-input:focus { border-color: var(--accent); }
    .settings-btn { width: 100%; padding: 14px; border-radius: var(--radius); background: var(--accent); color: #000; font-size: 16px; font-weight: 700; }
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 16px; }
    .loading-spinner { width: 40px; height: 40px; border: 4px solid var(--card2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    .msg-volta .msg-bubble { background: linear-gradient(135deg, #1e3a5f, #1a2d47); border: 1px solid rgba(59,130,246,0.2); }
    .msg-volta .msg-avatar { font-size: 26px; }
    .msg-agent .msg-bubble { background: linear-gradient(135deg, #1e4d3a, #1a3d2f); border: 1px solid rgba(16,185,129,0.2); }
    .msg-pirat .msg-bubble { background: linear-gradient(135deg, #4a1e1e, #3d1a1a); border: 1px solid rgba(239,68,68,0.2); }
    .msg-scenka { max-width: 95% !important; }
    .msg-scenka .msg-bubble { background: var(--card2); color: var(--text2); font-style: italic; font-size: 13px; border: 1px solid rgba(255,255,255,0.04); }
    .msg-sber { max-width: 95% !important; }
    .msg-sber .msg-bubble { background: linear-gradient(135deg, #3d3510, #2d2808); border: 1px solid rgba(245,158,11,0.3); color: var(--accent2); }
    .day-card { display: flex; align-items: center; gap: 14px; padding: 16px; background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); text-align: left; border-left: 4px solid var(--accent); margin-bottom: 8px; }
    .day-card.locked { opacity: 0.4; border-left-color: var(--text3); }
    .day-num { font-size: 28px; font-weight: 800; color: var(--accent); min-width: 40px; text-align: center; }
    .day-info { flex: 1; }
    .day-title { font-size: 15px; font-weight: 700; color: var(--text); }
    .day-meta { font-size: 12px; color: var(--text3); margin-top: 2px; }
    .okruh-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; margin: 12px 0 4px 36px; }
    .continue-btn { display: block; margin: 16px auto; padding: 14px 32px; border-radius: 30px; background: var(--accent); color: #000; font-size: 16px; font-weight: 700; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;
    const SUBJECTS = ['matika','cestina','prirodoveda','vlastiveda','anglictina'];
    const COLORS = { matika:'var(--matika)', cestina:'var(--cestina)', prirodoveda:'var(--prirodoveda)', vlastiveda:'var(--vlastiveda)', anglictina:'var(--anglictina)' };

    function getApiKey() { return localStorage.getItem('du_api_key') || ''; }
    function setApiKeyLS(k) { localStorage.setItem('du_api_key', k); }

    function normalize(s) {
      return String(s).toLowerCase().replace(/\s+/g,' ').trim().replace(/[.,!?]/g,'').replace(/\s/g,'');
    }
    function checkAnswer(task, userAnswer) {
      const ua = normalize(userAnswer);
      const correct = normalize(task.answer);
      if (ua === correct) return { correct: true };
      if (task.answer_variants) { for (const v of task.answer_variants) { if (ua === normalize(v)) return { correct: true }; } }
      if (Array.isArray(task.answer)) {
        const answers = userAnswer.split(/[,;\s]+/).filter(Boolean);
        if (answers.length === task.answer.length && answers.every((a,i) => normalize(a) === normalize(task.answer[i]))) return { correct: true };
      }
      if (task.common_errors) { for (const ce of task.common_errors) { if (ua === normalize(ce) && task.error_explanations && task.error_explanations[ce]) return { correct: false, feedback: task.error_explanations[ce] }; } }
      return { correct: false, feedback: null };
    }

    async function askTutor(messages, task, apiKey) {
      const systemPrompt = 'Jsi přátelský učitel pro žáka 4. třídy ZŠ. Tykáš, mluvíš česky, jednoduše.\nNIKDY neříkej správnou odpověď přímo. Veď dítě otázkami. Po špatné odpovědi řekni "skoro" nebo "zkus to jinak". Krátké věty, max 2 řádky. Emoji max 1.\n\nÚloha: ' + task.question + '\n' + (task.hint ? 'Nápověda: ' + task.hint : '');
      try {
        const resp = await fetch('https://api.anthropic.com/v1/messages', { method: 'POST', headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' }, body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 300, system: systemPrompt, messages }) });
        if (!resp.ok) return null;
        const data = await resp.json();
        return data.content[0].text;
      } catch (e) { return null; }
    }

    function SettingsScreen({ onSave, currentKey }) {
      const [key, setKey] = useState(currentKey);
      return (<div className="screen" style={{padding:'60px 24px',justifyContent:'center'}}><div className="fade-in" style={{textAlign:'center'}}><div style={{fontSize:48,marginBottom:16}}>🔑</div><h2 style={{fontSize:22,fontWeight:800,marginBottom:8}}>API klíč</h2><p style={{color:'var(--text2)',fontSize:14,marginBottom:24}}>Aby mohl učitel odpovídat, potřebuje Anthropic API klíč.</p><input className="settings-input" type="password" value={key} onChange={e=>setKey(e.target.value)} placeholder="sk-ant-..." style={{marginBottom:16}} /><button className="settings-btn" onClick={()=>onSave(key)} disabled={!key.startsWith('sk-')}>Uložit</button><p style={{color:'var(--text3)',fontSize:11,marginTop:16}}>Klíč se ukládá jen v tomto zařízení.</p></div></div>);
    }

    function LoginScreen({ onSelect }) {
      return (<div className="screen login"><div className="slide-up" style={{textAlign:'center',width:'100%'}}><div className="login-logo">📚</div><div className="login-title">Domácí Učitel</div><div className="login-sub">4. třída ZŠ</div><button className="login-btn" style={{background:'linear-gradient(135deg, #dc2626, #f59e0b)', fontSize:18}} onClick={()=>onSelect('mise')}>🎮 Mise — Zachraň Dr. Voltu!</button><button className="login-btn" style={{background:'var(--accent)'}} onClick={()=>onSelect('student')}>🎒 Procvičování</button><button className="login-btn" style={{background:'var(--blue)'}} onClick={()=>onSelect('parent')}>👨‍👩‍👧 Jsem rodič</button><button className="login-btn" style={{background:'var(--card2)'}} onClick={()=>onSelect('settings')}>⚙️ Nastavení</button><div className="login-ver">v0.5 — Jaty</div></div></div>);
    }

    function SubjectPicker({ predmety, onPick, onBack }) {
      return (<div className="screen"><div className="header"><button className="back-btn" onClick={onBack}>←</button><span className="header-title">Co budeme procvičovat?</span></div><div className="subjects">{SUBJECTS.map((k,i) => { const s = predmety[k]; if (!s) return null; return (<button key={k} className="subject-card fade-in" style={{borderLeftColor:COLORS[k], animationDelay: i*0.06+'s'}} onClick={()=>onPick(k)}><span className="subject-icon">{s.icon}</span><span className="subject-name">{s.name}</span><span className="subject-info">{s.temata.length} témat</span></button>);})}</div></div>);
    }

    function TopicPicker({ predmety, subject, onPick, onBack }) {
      const s = predmety[subject];
      const [loading, setLoading] = useState(null);
      function handlePick(tema) {
        setLoading(tema.nazev);
        fetch(tema.soubor).then(r => { if (!r.ok) throw new Error('Nenalezeno'); return r.json(); })
          .then(data => { setLoading(null); onPick(data, tema.nazev); })
          .catch(e => { setLoading(null); alert('Toto téma ještě není připravené.'); });
      }
      return (<div className="screen"><div className="header"><button className="back-btn" onClick={onBack}>←</button><span style={{fontSize:24}}>{s.icon}</span><span className="header-title">{s.name}</span></div><div className="topics">{s.temata.map((tema,i) => (<button key={i} className="topic-card fade-in" style={{animationDelay: i*0.05+'s'}} onClick={()=>handlePick(tema)} disabled={loading!==null}><span className="topic-name">{loading===tema.nazev ? '⏳ ' : ''}{tema.nazev}</span></button>))}</div></div>);
    }

    function ChatScreen({ unitData, unitName, onBack, apiKey }) {
      const [msgs, setMsgs] = useState([]);
      const [inp, setInp] = useState('');
      const [typing, setTyping] = useState(false);
      const [taskIdx, setTaskIdx] = useState(0);
      const [attempts, setAttempts] = useState(0);
      const [score, setScore] = useState({ correct: 0, total: 0 });
      const [aiHistory, setAiHistory] = useState([]);
      const [waitingChoice, setWaitingChoice] = useState(null);
      const [readingQIdx, setReadingQIdx] = useState(0);
      const endRef = useRef(null);
      const inputRef = useRef(null);
      const allTasks = unitData.skills.flatMap(sk => sk.tasks);
      const currentTask = allTasks[taskIdx] || null;

      useEffect(() => { endRef.current?.scrollIntoView({behavior:'smooth'}); }, [msgs]);
      useEffect(() => {
        if (allTasks.length > 0) {
          const t = allTasks[0];
          setMsgs([{from:'tutor', text:'Ahoj! Dnes procvičujeme: '+unitName+'. Jdeme na to! 💪'}, {from:'tutor', text: t.type==='reading'&&t.text ? 'Přečti si text:\n\n"'+t.text+'"\n\n'+t.questions[0].question : t.question}]);
          if (t.type==='choice') setWaitingChoice(t.options);
          else if (t.type==='reading'&&t.questions&&t.questions[0].type==='choice') setWaitingChoice(t.questions[0].options);
        }
      }, []);

      function addMsg(from, text) { setMsgs(p => [...p, {from, text}]); }
      function getEffectiveTask(task, rqIdx) {
        if (task.type==='reading'&&task.questions) { const q=task.questions[rqIdx]||task.questions[0]; return {...task, type:q.type||'open', question:q.question, answer:q.answer, options:q.options||null, answer_variants:q.answer_variants||[], hint:q.hint||null, common_errors:q.common_errors||null, error_explanations:q.error_explanations||null}; }
        return task;
      }
      function nextTask() {
        if (currentTask.type==='reading'&&currentTask.questions&&readingQIdx+1<currentTask.questions.length) {
          const nrq=readingQIdx+1; setReadingQIdx(nrq); addMsg('tutor',currentTask.questions[nrq].question);
          const nsq=currentTask.questions[nrq]; if(nsq.type==='choice'&&nsq.options) setWaitingChoice(nsq.options);
        } else {
          setReadingQIdx(0); const next=taskIdx+1;
          if (next<allTasks.length) { setTaskIdx(next); const nt=allTasks[next]; addMsg('tutor', nt.type==='reading'&&nt.text ? 'Přečti si text:\n\n"'+nt.text+'"\n\n'+nt.questions[0].question : nt.question); if(nt.type==='choice') setWaitingChoice(nt.options); }
          else addMsg('tutor','Hotovo! Skóre: '+score.correct+'/'+score.total+' ✨');
        }
      }
      async function handleAnswer(answer) {
        if (!currentTask||typing) return;
        addMsg('student', answer); setInp(''); setWaitingChoice(null); setTyping(true);
        const et = getEffectiveTask(currentTask, readingQIdx);
        const result = checkAnswer(et, answer);
        if (result.correct) {
          const praise = attempts===0 ? ['Výborně! 🎯','Přesně tak!','Správně!'][Math.floor(Math.random()*3)] : ['Správně! Šlo to.','Ano, sedí!'][Math.floor(Math.random()*2)];
          setTimeout(()=>{ setTyping(false); addMsg('tutor',praise); setScore(p=>({correct:p.correct+1,total:p.total+1})); setAttempts(0); setTimeout(()=>nextTask(),800); },600);
        } else {
          const na=attempts+1; setAttempts(na);
          if (na>=3) {
            setTimeout(()=>{ setTyping(false); const ans=Array.isArray(et.answer)?et.answer.join(', '):et.answer; addMsg('tutor','Nevadí! Správná odpověď: '+ans+'. '+(et.hint||'')); setScore(p=>({...p,total:p.total+1})); setAttempts(0); setTimeout(()=>nextTask(),1200); },600);
          } else {
            if (apiKey) {
              const nh=[...aiHistory,{role:'user',content:'Žák odpověděl: "'+answer+'" na: "'+et.question+'". Špatně. '+(result.feedback?result.feedback:'')+' Pokus '+na+'/3.'}];
              const ai=await askTutor(nh,et,apiKey); setTyping(false);
              if(ai){addMsg('tutor',ai);setAiHistory([...nh,{role:'assistant',content:ai}]);}else{addMsg('tutor',result.feedback||et.hint||'Zkus to jinak.');}
            } else { setTimeout(()=>{setTyping(false);addMsg('tutor',result.feedback||et.hint||'Zkus to jinak.');},500); }
            if(et.type==='choice'&&et.options) setWaitingChoice(et.options);
          }
        }
      }
      const send=()=>{if(!inp.trim())return;handleAnswer(inp.trim());};
      return (<div className="chat-screen"><div className="chat-header"><button className="back-btn" onClick={onBack}>←</button><span style={{flex:1,fontWeight:700,fontSize:15}}>{unitName}</span><span className="score-badge score-correct">{score.correct}/{score.total}</span></div><div className="chat-messages">{msgs.map((m,i)=>(<div key={i} className={'msg msg-'+(m.from==='tutor'?'tutor':'student')+' fade-in'}>{m.from==='tutor'&&<span className="msg-avatar">🤖</span>}<div className="msg-bubble" style={{whiteSpace:'pre-wrap'}}>{m.text}</div></div>))}{typing&&<div className="msg msg-tutor"><span className="msg-avatar">🤖</span><div className="msg-bubble"><div className="typing-dots"><span/><span/><span/></div></div></div>}{waitingChoice&&!typing&&<div className="choices fade-in" style={{marginLeft:36,maxWidth:'85%'}}>{waitingChoice.map((opt,i)=>(<button key={i} className="choice-btn" onClick={()=>handleAnswer(opt)}>{opt}</button>))}</div>}<div ref={endRef}/></div><div className="chat-input"><input ref={inputRef} value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}} placeholder="Napiš odpověď..." /><button onClick={send}>➤</button></div></div>);
    }

    function ParentDashboard({ onBack }) {
      return (<div className="screen"><div className="header"><button className="back-btn" onClick={onBack}>←</button><span className="header-title">📊 Přehled</span></div><div style={{padding:'16px 18px'}} className="fade-in"><div className="dash-card"><div className="dash-label">Stav</div><div className="dash-value" style={{color:'var(--accent)'}}>Aktivní</div><p style={{color:'var(--text3)',fontSize:13,marginTop:4}}>Rodičovský přehled bude doplněn.</p></div></div></div>);
    }

    function DayPicker({ miseData, onPick, onBack }) {
      return (<div className="screen"><div className="header"><button className="back-btn" onClick={onBack}>←</button><span style={{fontSize:24}}>🏴‍☠️</span><span className="header-title">Mise 1 — Září</span></div><div style={{padding:'16px 18px'}}>{miseData.map((den,i) => { const hasStory = den.intro && den.intro.length > 0; return (<button key={i} className={'day-card fade-in' + (hasStory ? '' : ' locked')} style={{animationDelay: i*0.04+'s'}} onClick={()=>hasStory && onPick(den)} disabled={!hasStory}><span className="day-num">{den.den}</span><div className="day-info"><div className="day-title">{den.nazev || 'Den ' + den.den}</div><div className="day-meta">{hasStory ? den.okruhy.map(o=>o.tema).join(' • ') : '🔒 Scénář se připravuje'}</div></div>{hasStory && <span style={{fontSize:20}}>▶</span>}</button>);})}</div></div>);
    }

    const AVATAR = {volta:'🧪', agent:'🕵️', skripek:'😰', repak:'🍖', kotva:'⚓', krivak:'☠️', papousek:'🦜'};
    const POSTAVA_NAME = {volta:'Dr. Volta', agent:'Agent K', skripek:'Skřípek', repak:'Řepák', kotva:'Kotva', krivak:'Krivák', papousek:'Papoušek'};

    function MissionScreen({ dayData, onBack }) {
      const [msgs, setMsgs] = useState([]);
      const [phase, setPhase] = useState('intro');
      const [okruhIdx, setOkruhIdx] = useState(0);
      const [qIdx, setQIdx] = useState(0);
      const [waitingChoice, setWaitingChoice] = useState(null);
      const [typing, setTyping] = useState(false);
      const [inp, setInp] = useState('');
      const [attempts, setAttempts] = useState(0);
      const [score, setScore] = useState({correct:0, total:0});
      const [paused, setPaused] = useState(false);
      const endRef = useRef(null);

      useEffect(() => { endRef.current?.scrollIntoView({behavior:'smooth'}); }, [msgs]);

      function addMsg(type, text, avatar) {
        setMsgs(p => [...p, {type, text, avatar}]);
      }
      function addDialog(postava, text) {
        const p = postava.toLowerCase();
        const type = (p==='agent') ? 'agent' : (['skripek','repak','kotva','krivak'].includes(p) ? 'pirat' : 'volta');
        addMsg(type, (POSTAVA_NAME[p]||postava)+': '+text, AVATAR[p]||'❓');
      }
      function addNarration(text) { addMsg('scenka', text); }
      function addSber(text) { addMsg('sber', '🎁 '+text); }

      // Autoplay intro on mount
      useEffect(() => {
        if (!dayData || !dayData.intro) return;
        let delay = 0;
        const timers = [];
        // Intro dialogs
        dayData.intro.forEach((d, i) => {
          delay += 600 + (d.t || d.text || '').length * 15;
          timers.push(setTimeout(() => addDialog(d.p || d.postava, d.t || d.text), delay));
        });
        // After intro, show first question
        delay += 1200;
        timers.push(setTimeout(() => {
          setPhase('question');
          showQuestion(0, 0);
        }, delay));
        return () => timers.forEach(clearTimeout);
      }, []);

      function showQuestion(oIdx, qI) {
        const okruh = dayData.okruhy[oIdx];
        if (!okruh) { finishDay(); return; }
        const q = okruh.otazky[qI];
        if (!q) { finishOkruh(oIdx); return; }

        // Show okruh header at question 0
        if (qI === 0) {
          const predmetColors = {cestina:'var(--cestina)', matika:'var(--matika)', anglictina:'var(--anglictina)', prirodoveda:'var(--prirodoveda)', vlastiveda:'var(--vlastiveda)', mix:'var(--accent)'};
          addMsg('scenka', '━━━ '+okruh.tema+' ━━━');
        }

        // Volta intro for this question
        if (q.vi) {
          addDialog('volta', q.vi);
        } else {
          addDialog('volta', q.question);
        }

        // Show choice buttons
        if (q.options) {
          setWaitingChoice(q.options);
        }
      }

      function handleAnswer(answer) {
        if (typing) return;
        addMsg('student', answer, '🕵️');
        setWaitingChoice(null);
        setTyping(true);

        const okruh = dayData.okruhy[okruhIdx];
        const q = okruh.otazky[qIdx];
        const isCorrect = normalize(answer) === normalize(q.answer);

        setTimeout(() => {
          setTyping(false);
          if (isCorrect) {
            const voltaText = q.vs || ['Správně!','Výborně!','Přesně tak!'][Math.floor(Math.random()*3)];
            addDialog('volta', voltaText);
            setScore(p => ({correct:p.correct+1, total:p.total+1}));
            setAttempts(0);
            // After question 5, show akce
            setTimeout(() => advanceQuestion(okruhIdx, qIdx), 800);
          } else {
            const na = attempts + 1;
            setAttempts(na);
            if (na >= 3) {
              addDialog('volta', 'Správná odpověď: ' + q.answer + '. ' + (q.vn || q.hint || ''));
              setScore(p => ({...p, total:p.total+1}));
              setAttempts(0);
              setTimeout(() => advanceQuestion(okruhIdx, qIdx), 1000);
            } else {
              const hint = q.vn || q.hint || 'Zkus to jinak.';
              addDialog('volta', hint);
              if (q.options) setWaitingChoice(q.options);
            }
          }
        }, 500);
      }

      function advanceQuestion(oIdx, qI) {
        const okruh = dayData.okruhy[oIdx];
        const nextQ = qI + 1;

        // After question 5 (index 4), show akce if exists
        if (nextQ === 5 && okruh.akce) {
          showAkce(okruh.akce, () => {
            showQuestion(oIdx, nextQ);
          });
          return;
        }

        // After last question in okruh (index 9), show scenka
        if (nextQ >= okruh.otazky.length) {
          finishOkruh(oIdx);
          return;
        }

        showQuestion(oIdx, nextQ);
        setQIdx(nextQ);
      }

      function showAkce(akce, callback) {
        let delay = 0;
        const timers = [];
        if (akce.dialog) {
          akce.dialog.forEach(d => {
            delay += 500 + (d.t||'').length * 12;
            timers.push(setTimeout(() => addDialog(d.p, d.t), delay));
          });
        }
        if (akce.zprava) {
          delay += 600;
          timers.push(setTimeout(() => addSber(akce.zprava), delay));
        }
        delay += 1000;
        timers.push(setTimeout(() => {
          setPaused(true);
          // Wait for user to tap continue
          setMsgs(p => [...p, {type:'continue', text:''}]);
        }, delay));
        // Store callback for continue
        window._akceCallback = callback;
      }

      function handleContinue() {
        setPaused(false);
        // Remove continue message
        setMsgs(p => p.filter(m => m.type !== 'continue'));
        if (window._akceCallback) { window._akceCallback(); window._akceCallback = null; }
        if (window._scenkaCallback) { window._scenkaCallback(); window._scenkaCallback = null; }
      }

      function finishOkruh(oIdx) {
        const okruh = dayData.okruhy[oIdx];
        let delay = 0;
        const timers = [];

        // Scenka po okruhu
        if (okruh.scenka && okruh.scenka.length > 0) {
          okruh.scenka.forEach(d => {
            delay += 500 + (d.t||'').length * 12;
            timers.push(setTimeout(() => addDialog(d.p, d.t), delay));
          });
        }

        delay += 800;
        const nextOkruh = oIdx + 1;
        if (nextOkruh < dayData.okruhy.length) {
          timers.push(setTimeout(() => {
            setPaused(true);
            setMsgs(p => [...p, {type:'continue', text:''}]);
            window._scenkaCallback = () => {
              setOkruhIdx(nextOkruh);
              setQIdx(0);
              setAttempts(0);
              showQuestion(nextOkruh, 0);
            };
          }, delay));
        } else {
          timers.push(setTimeout(() => finishDay(), delay));
        }
      }

      function finishDay() {
        let delay = 0;
        const timers = [];
        if (dayData.zaver) {
          dayData.zaver.forEach(d => {
            delay += 500 + (d.t||d.text||'').length * 12;
            timers.push(setTimeout(() => addDialog(d.p||d.postava, d.t||d.text), delay));
          });
        }
        delay += 800;
        timers.push(setTimeout(() => {
          addMsg('sber', '📊 Den dokončen! Skóre: ' + score.correct + '/' + score.total);
          if (dayData.predmety_sberu && dayData.predmety_sberu.length > 0) {
            setTimeout(() => {
              addMsg('sber', '🎒 Sebrané předměty: ' + dayData.predmety_sberu.map(p=>p.nazev).join(', '));
            }, 500);
          }
        }, delay));
      }

      const send = () => { if (!inp.trim()) return; handleAnswer(inp.trim()); setInp(''); };

      return (<div className="chat-screen">
        <div className="chat-header">
          <button className="back-btn" onClick={onBack}>←</button>
          <span style={{fontSize:20}}>🏴‍☠️</span>
          <span style={{flex:1,fontWeight:700,fontSize:14}}>Den {dayData.den}: {dayData.nazev}</span>
          <span className="score-badge score-correct">{score.correct}/{score.total}</span>
        </div>
        <div className="chat-messages">
          {msgs.map((m,i) => {
            if (m.type==='continue') return (<button key={i} className="continue-btn fade-in" onClick={handleContinue}>Pokračovat ▶</button>);
            if (m.type==='student') return (<div key={i} className="msg msg-student fade-in"><div className="msg-bubble">{m.text}</div></div>);
            if (m.type==='scenka') return (<div key={i} className="msg msg-scenka fade-in"><div className="msg-bubble">{m.text}</div></div>);
            if (m.type==='sber') return (<div key={i} className="msg msg-sber fade-in"><div className="msg-bubble">{m.text}</div></div>);
            const cls = m.type==='pirat' ? 'msg-pirat' : m.type==='agent' ? 'msg-agent' : 'msg-volta';
            return (<div key={i} className={'msg msg-tutor '+cls+' fade-in'}><span className="msg-avatar">{m.avatar}</span><div className="msg-bubble" style={{whiteSpace:'pre-wrap'}}>{m.text}</div></div>);
          })}
          {typing && <div className="msg msg-tutor msg-volta"><span className="msg-avatar">🧪</span><div className="msg-bubble"><div className="typing-dots"><span/><span/><span/></div></div></div>}
          {waitingChoice && !typing && !paused && <div className="choices fade-in" style={{marginLeft:36,maxWidth:'85%'}}>{waitingChoice.map((opt,i) => (<button key={i} className="choice-btn" onClick={()=>handleAnswer(opt)}>{opt}</button>))}</div>}
          <div ref={endRef}/>
        </div>
        <div className="chat-input">
          <input value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();send();}}} placeholder="Napiš odpověď..." />
          <button onClick={send}>➤</button>
        </div>
      </div>);
    }

    function App() {
      const [view, setView] = useState('login');
      const [predmety, setPredmety] = useState(null);
      const [subject, setSubject] = useState(null);
      const [unitData, setUnitData] = useState(null);
      const [unitName, setUnitName] = useState('');
      const [apiKey, setApiKeyState] = useState(getApiKey());
      const [error, setError] = useState(null);
      const [miseData, setMiseData] = useState(null);
      const [miseDay, setMiseDay] = useState(null);

      useEffect(() => {
        fetch('predmety.json').then(r=>{if(!r.ok)throw new Error('nenalezen');return r.json();})
          .then(d=>setPredmety(d)).catch(e=>setError('Nepodařilo se načíst předměty.'));
      }, []);

      useEffect(() => {
        if (view === 'mise' && !miseData) {
          fetch('mise01_scenar.json').then(r=>{if(!r.ok)throw new Error('nenalezen');return r.json();})
            .then(d=>setMiseData(d)).catch(e=>setError('Nepodařilo se načíst misi.'));
        }
      }, [view]);

      if (error) return <div className="loading"><div style={{fontSize:48}}>⚠️</div><div style={{color:'var(--red)'}}>{error}</div></div>;
      if (!predmety) return <div className="loading"><div className="loading-spinner"/><div style={{color:'var(--text2)'}}>Načítám...</div></div>;
      if (view==='settings') return <SettingsScreen onSave={k=>{setApiKeyLS(k);setApiKeyState(k);setView('login');}} currentKey={apiKey}/>;
      if (view==='login') return <LoginScreen onSelect={setView}/>;
      if (view==='mise'&&!miseData) return <div className="loading"><div className="loading-spinner"/><div style={{color:'var(--text2)'}}>Načítám misi...</div></div>;
      if (view==='mise'&&miseData&&!miseDay) return <DayPicker miseData={miseData} onPick={d=>setMiseDay(d)} onBack={()=>{setView('login');setMiseData(null);}}/>;
      if (view==='mise'&&miseDay) return <MissionScreen dayData={miseDay} onBack={()=>setMiseDay(null)}/>;
      if (view==='student'&&!subject) return <SubjectPicker predmety={predmety} onPick={s=>setSubject(s)} onBack={()=>setView('login')}/>;
      if (view==='student'&&subject&&!unitData) return <TopicPicker predmety={predmety} subject={subject} onPick={(d,n)=>{setUnitData(d);setUnitName(n);setView('chat');}} onBack={()=>setSubject(null)}/>;
      if (view==='chat'&&unitData) return <ChatScreen unitData={unitData} unitName={unitName} onBack={()=>{setUnitData(null);setUnitName('');setView('student');}} apiKey={apiKey}/>;
      if (view==='parent') return <ParentDashboard onBack={()=>setView('login')}/>;
      return null;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
