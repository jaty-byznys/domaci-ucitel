<head>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; h}
    :root {
      --bg: #0f1117; --card: #1a1d27; --card2: #242834;
      --text: #e8e8ed; --text2: #9ca3af; --text3: #6b7280;
      --accent: #f59e0b; --accent2: #fbbf24;
      --green: #10b981; --red: #ef4444; --blue: #3b82f6;
      --matika: #f97316; --cestina: #06b6d4; --prirodoveda: #22c55e;
      --vlastiveda: #8b5cf6; --anglictina: #ec4899;
      --radius: 14px; --shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    body { font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text);
      overflow-x:hidden; min-height:100vh; }
    button { font-family:'Nunito',sans-serif; cursor:pointer; border:none;
      transition:transform 0.15s,box-shadow 0.15s; }
    button:hover { transform:translateY(-1px); }
    button:active { transform:scale(0.97); }
    input,textarea { font-family:'Nunito',sans-serif; }

    @keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes slideUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
    @keyframes spin { to{transform:rotate(360deg)} }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
    .fade-in { animation:fadeIn 0.35s ease-out; }
    .slide-up { animation:slideUp 0.4s ease-out; }

    .app { max-width:480px; margin:0 auto; min-height:100vh; position:relative; }
    .screen { min-height:100vh; display:flex; flex-direction:column; }

    /* Auth */
    .auth-screen { justify-content:center; align-items:center; padding:40px 24px; }
    .auth-logo { font-size:72px; margin-bottom:12px; filter:drop-shadow(0 4px 12px rgba(245,158,11,0.4)); }
    .auth-title { font-size:32px; font-weight:800; letter-spacing:-0.5px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .auth-sub { color:var(--text2); font-size:15px; margin:6px 0 32px; }
    .auth-form { width:100%; max-width:340px; }
    .auth-input { width:100%; padding:14px 16px; background:var(--card);
      border:2px solid var(--card2); border-radius:12px; color:var(--text);
      font-size:15px; outline:none; margin-bottom:10px; }
    .auth-input:focus { border-color:var(--accent); }
    .auth-input::placeholder { color:var(--text3); }
    .auth-btn { display:block; width:100%; padding:16px; border-radius:var(--radius);
      color:#000; font-size:16px; font-weight:700; margin-top:6px;
      background:linear-gradient(135deg,var(--accent),var(--accent2)); box-shadow:var(--shadow); }
    .auth-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
    .auth-switch { color:var(--text2); font-size:14px; margin-top:20px; background:none;
      text-align:center; width:100%; }
    .auth-switch b { color:var(--accent); }
    .auth-error { background:rgba(239,68,68,0.12); color:var(--red); padding:10px 14px;
      border-radius:10px; font-size:13px; margin-bottom:10px; text-align:center; }
    .auth-ver { color:var(--text3); font-size:11px; margin-top:40px; }

    /* Header */
    .header { display:flex; align-items:center; gap:12px; padding:14px 18px;
      background:var(--card); border-bottom:1px solid rgba(255,255,255,0.06);
      position:sticky; top:0; z-index:10; }
    .back-btn { background:var(--card2); padding:8px 14px; border-radius:10px;
      font-size:14px; font-weight:600; color:var(--text2); }
    .header-title { font-size:17px; font-weight:700; flex:1; }

    /* Home */
    .home-pad { padding:24px 18px; flex:1; }
    .home-welcome { font-size:22px; font-weight:800; margin-bottom:4px; }
    .home-sub { color:var(--text2); font-size:14px; margin-bottom:24px; }

    /* Child cards */
    .child-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .child-card { padding:22px 14px; background:var(--card); border-radius:var(--radius);
      text-align:center; box-shadow:var(--shadow); border:2px solid transparent; }
    .child-card:hover { border-color:var(--accent); }
    .child-avatar { font-size:48px; margin-bottom:8px; }
    .child-name { font-size:16px; font-weight:700; }
    .child-grade { font-size:12px; color:var(--text3); margin-top:2px; }
    .add-child { border:2px dashed var(--card2); background:transparent; color:var(--text3); box-shadow:none; }
    .add-child:hover { border-color:var(--accent); color:var(--accent); }
    .add-child .child-avatar { opacity:0.5; }

    /* Onboarding */
    .onb-form { padding:24px 18px; }
    .onb-label { font-size:14px; font-weight:700; margin-bottom:8px; color:var(--text2); }
    .onb-input { width:100%; padding:14px 16px; background:var(--card); border:2px solid var(--card2);
      border-radius:12px; color:var(--text); font-size:16px; outline:none; margin-bottom:16px; }
    .onb-input:focus { border-color:var(--accent); }
    .onb-btn { width:100%; padding:16px; border-radius:var(--radius);
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#000; font-size:16px; font-weight:700; margin-top:8px; }
    .onb-btn:disabled { opacity:0.5; }
    .avatar-grid { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin:12px 0 20px; }
    .avatar-opt { font-size:36px; padding:6px; border-radius:12px; background:var(--card);
      border:3px solid transparent; cursor:pointer; transition:all 0.2s; line-height:1; }
    .avatar-opt.sel { border-color:var(--accent); background:rgba(245,158,11,0.15); transform:scale(1.15); }
    .grade-grid { display:flex; gap:8px; margin:12px 0 20px; flex-wrap:wrap; }
    .grade-opt { padding:10px 18px; border-radius:10px; background:var(--card);
      font-size:15px; font-weight:700; color:var(--text); border:2px solid transparent; }
    .grade-opt.sel { border-color:var(--accent); background:rgba(245,158,11,0.15); }

    /* Subject & topic pickers */
    .list-pad { padding:16px 18px; display:flex; flex-direction:column; gap:10px; }
    .subject-card { display:flex; align-items:center; gap:14px; padding:18px 16px;
      background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow);
      text-align:left; border-left:4px solid var(--accent); width:100%; }
    .subject-icon { font-size:32px; }
    .subject-name { font-size:16px; font-weight:700; flex:1; }
    .subject-info { font-size:12px; color:var(--text3); }
    .topic-card { display:flex; align-items:center; gap:12px; padding:14px 16px;
      background:var(--card); border-radius:12px; text-align:left;
      border:1px solid rgba(255,255,255,0.04); width:100%; }
    .topic-name { font-size:14px; font-weight:600; flex:1; }
    .topic-badge { font-size:11px; padding:3px 8px; border-radius:6px;
      background:var(--card2); color:var(--text3); }

    /* Chat */
    .chat-screen { height:100vh; height:100dvh; display:flex; flex-direction:column; }
    .chat-header { display:flex; align-items:center; gap:10px; padding:12px 16px;
      background:var(--card); border-bottom:1px solid rgba(255,255,255,0.06); flex-shrink:0; }
    .chat-messages { flex:1; overflow-y:auto; padding:16px 12px;
      display:flex; flex-direction:column; gap:10px; }
    .msg { display:flex; max-width:88%; }
    .msg-tutor { align-items:flex-start; gap:8px; }
    .msg-student { justify-content:flex-end; align-self:flex-end; }
    .msg-avatar { font-size:22px; margin-top:4px; flex-shrink:0; }
    .msg-bubble { padding:10px 14px; font-size:15px; line-height:1.55; }
    .msg-tutor .msg-bubble { background:var(--card); border-radius:4px 16px 16px 16px; }
    .msg-student .msg-bubble { background:var(--blue); color:#fff; border-radius:16px 4px 16px 16px; }
    .typing-dots { display:flex; gap:4px; padding:12px 16px; }
    .typing-dots span { width:8px; height:8px; background:var(--text3); border-radius:50%; animation:pulse 1.4s infinite; }
    .typing-dots span:nth-child(2) { animation-delay:0.2s; }
    .typing-dots span:nth-child(3) { animation-delay:0.4s; }
    .chat-input { display:flex; gap:8px; padding:10px 12px; background:var(--card);
      border-top:1px solid rgba(255,255,255,0.06); flex-shrink:0; }
    .chat-input input { flex:1; padding:12px 16px; border-radius:24px; border:2px solid var(--card2);
      background:var(--bg); color:var(--text); font-size:15px; outline:none; }
    .chat-input input:focus { border-color:var(--accent); }
    .chat-input button { width:48px; height:48px; border-radius:50%; background:var(--accent);
      color:#fff; font-size:20px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .choices { display:flex; flex-direction:column; gap:6px; margin-top:8px; }
    .choice-btn { padding:10px 14px; background:var(--card2); border-radius:10px;
      color:var(--text); font-size:14px; font-weight:600; text-align:left;
      border:1px solid rgba(255,255,255,0.08); }
    .choice-btn:hover { border-color:var(--accent); }
    .score-badge { display:inline-flex; align-items:center; gap:4px; padding:2px 8px;
      border-radius:6px; font-size:12px; font-weight:700;
      background:rgba(16,185,129,0.15); color:var(--green); }

    /* Dashboard */
    .dash-pad { padding:16px 18px; flex:1; overflow-y:auto; }
    .dash-card { background:var(--card); border-radius:var(--radius); padding:18px;
      margin-bottom:12px; box-shadow:var(--shadow); }
    .dash-label { font-size:13px; color:var(--text2); margin-bottom:4px; }
    .dash-value { font-size:24px; font-weight:800; }
    .progress-bar { height:8px; background:var(--card2); border-radius:4px; overflow:hidden; margin-top:8px; }
    .progress-fill { height:100%; border-radius:4px; transition:width 0.5s ease; }

    .logout-btn { background:var(--card2); padding:6px 12px; border-radius:8px;
      font-size:12px; font-weight:600; color:var(--text3); }
    .spinner { width:32px; height:32px; border:3px solid var(--card2);
      border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; margin:40px auto; }
    .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
      padding:12px 20px; border-radius:12px; font-size:14px; font-weight:600;
      z-index:100; animation:slideUp 0.3s ease-out; pointer-events:none; }
    .toast-ok { background:var(--green); color:#fff; }
    .toast-err { background:var(--red); color:#fff; }
    .nav-bottom { display:flex; background:var(--card); border-top:1px solid rgba(255,255,255,0.06);
      position:sticky; bottom:0; }
    .nav-item { flex:1; padding:12px 0 10px; text-align:center; background:none; color:var(--text3);
      font-size:11px; font-weight:600; display:flex; flex-direction:column; align-items:center; gap:2px; }
    .nav-item.active { color:var(--accent); }
    .nav-icon { font-size:20px; }
  </style>

// ===== HELPERS =====
function norm(s){return String(s).toLowerCase().replace(/\s+/g,'').replace(/[.,!?]/g,'');}
function checkAns(task,ua){
  const n=norm(ua), c=norm(task.answer);
  if(n===c) return {ok:true};
  if(task.answer_variants){for(const v of task.answer_variants){if(n===norm(v))return{ok:true};}}
  if(Array.isArray(task.answer)){
    const parts=ua.split(/[,;\s]+/).filter(Boolean);
    if(parts.length===task.answer.length&&parts.every((a,i)=>norm(a)===norm(task.answer[i])))return{ok:true};
  }
  if(task.common_errors){
    for(const ce of task.common_errors){
      if(n===norm(ce)&&task.error_explanations?.[ce])return{ok:false,fb:task.error_explanations[ce]};
    }
  }
  return{ok:false,fb:null};
}

async function aiTutor(msgs,task,key){

- Max 2 řádky, emoji max 1
Úloha: ${task.question}
${task.hint?'Nápověda: '+task.hint:''}
${task.rule?'Pravidlo: '+task.rule:''}`;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,
        'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,system:sys,messages:msgs})});
    if(!r.ok)return null;
    const d=await r.json();return d.content[0].text;
  }catch{return null;}
}

function useToast(){

function AuthScreen({onAuth}){
  const[mode,setMode]=useState('login');
  const[email,setEmail]=useState('');
  const[pass,setPass]=useState('');
  const[loading,setL]=useState(false);
  const[err,setErr]=useState('');

  async function go(e){
    e.preventDefault(); setErr(''); setL(true);
    try{
      if(mode==='signup'){
        const{data,error}=await sb.auth.signUp({email,password:pass});
        if(error)throw error;
        if(data.user&&!data.session){
          setErr('✅ Registrace OK! Zkontroluj e-mail a potvrď účet.');
          setMode('login');
        }else if(data.session){onAuth(data.session,data.user);}
      }else{
        const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
        if(error)throw error;
        onAuth(data.session,data.user);
      }
    }catch(e){
      const m=e.message||'Chyba';
      if(m.includes('Invalid login'))setErr('Špatný e-mail nebo heslo.');
      else if(m.includes('already registered'))setErr('Tento e-mail už je registrovaný. Přihlaš se.');
      else if(m.includes('Password'))setErr('Heslo musí mít aspoň 6 znaků.');
      else if(m.includes('Email not confirmed'))setErr('Nejdřív potvrď e-mail (odkaz v mailu).');
      else setErr(m);
    }
    setL(false);
  }

  return(
    <div className="screen auth-screen">
      <div className="slide-up" style={{textAlign:'center',width:'100%',maxWidth:380}}>
        <div className="auth-logo">📚</div>
        <div className="auth-title">Domácí Učitel</div>
        <div className="auth-sub">{mode==='login'?'Přihlaš se':'Vytvoř si účet'}</div>
        <form className="auth-form" onSubmit={go}>
          {err&&<div className="auth-error">{err}</div>}
          <input className="auth-input" type="email" placeholder="E-mail"
            value={email} onChange={e=>setEmail(e.target.value)} required autoComplete="email"/>
          <input className="auth-input" type="password" placeholder="Heslo (min. 6 znaků)"
            value={pass} onChange={e=>setPass(e.target.value)} required minLength={6}
            autoComplete={mode==='signup'?'new-password':'current-password'}/>
          <button className="auth-btn" type="submit" disabled={loading||!email||pass.length<6}>
            {loading?'⏳ Moment...':mode==='login'?'🔑 Přihlásit se':'✨ Vytvořit účet'}
          </button>
        </form>
        <button className="auth-switch" onClick={()=>{setMode(m=>m==='login'?'signup':'login');setErr('');}}>
          {mode==='login'?<>Nemáš účet? <b>Zaregistruj se</b></>:<>Už máš účet? <b>Přihlaš se</b></>}
        </button>
        <div className="auth-ver">v0.6 — Jaty</div>
      </div>
    </div>
  );
}

function ChatScreen({subject,unit,child,onBack,apiKey}){
  const[msgs,setMsgs]=useState([]);
  const[inp,setInp]=useState('');
  const[typing,setTyping]=useState(false);
  const[taskIdx,setTaskIdx]=useState(0);
  const[attempts,setAttempts]=useState(0);
  const[score,setScore]=useState({ok:0,total:0});
  const[aiHist,setAiHist]=useState([]);
  const[choices,setChoices]=useState(null);
  const[done,setDone]=useState(false);
  const[sessionId,setSessionId]=useState(null);
  const[rewardMode,setRewardMode]=useState(null);
  const endRef=useRef(null);

  const allTasks=unit.skills.flatMap(sk=>sk.tasks);
  const task=allTasks[taskIdx]||null;

  useEffect(()=>{endRef.current?.scrollIntoView({behavior:'smooth'});},[msgs,typing]);

  // Create session + show first task
  useEffect(()=>{
    (async()=>{
      try{
        const{data}=await sb.from('sessions').insert({
          child_id:child.id, subject, unit_id:unit.id
        }).select('id').maybeSingle();
        if(data)setSessionId(data.id);
      }catch{}
      if(allTasks.length>0){
        const t=allTasks[0];
        add('tutor',`Ahoj! Dnes procvičujeme: ${unit.name}. Jdeme na to! 💪`);
        setTimeout(()=>{
          add('tutor',fmtQ(t));
          if(t.type==='choice')setChoices(t.options);
        },600);
      }
    })();
  },[]);

  function fmtQ(t){
    if(t.type==='reading'&&t.text)return`Přečti si:\n\n„${t.text}"\n\n${t.questions[0].question}`;
    return t.question;
  }
  function add(from,text){setMsgs(p=>[...p,{from,text}]);}

  async function saveAnswer(taskId,answer,correct,pts){
    if(!sessionId||!task)return;
    const skillId=taskId.split('-').slice(0,3).join('-');
    try{
      await sb.from('answers').insert({
        session_id:sessionId, child_id:child.id, task_id:taskId,
        skill_id:skillId, answer, is_correct:correct, score:pts,
        attempts:attempts+1, used_hint:attempts>0
      });
      // Update skill_progress
      const{data:existing}=await sb.from('skill_progress').select('*')
        .eq('child_id',child.id).eq('skill_id',skillId).maybeSingle();
      if(existing){
        const newTotal=existing.total_attempts+1;
        const newCorrect=existing.correct_answers+(correct?1:0);
        const newScore=((existing.avg_score*(newTotal-1))+pts)/newTotal;
        await sb.from('skill_progress').update({
          total_attempts:newTotal, correct_answers:newCorrect,
          avg_score:Math.round(newScore*100)/100,
          last_practiced:new Date().toISOString()
        }).eq('id',existing.id);
      }else{
        await sb.from('skill_progress').insert({
          child_id:child.id, skill_id:skillId,
          total_attempts:1, correct_answers:correct?1:0,
          avg_score:pts, last_practiced:new Date().toISOString()
        });
      }
    }catch(e){console.error('Save answer error:',e);}
  }

  async function handleAns(answer){
    if(!task||typing||done)return;
    // Handle reward quiz answer
    if(rewardMode){
      add('student',answer);
      setChoices(null);
      const isRight=answer===rewardMode.opts[rewardMode.opts.indexOf(rewardMode.a.split('!')[0])||1];
      add('tutor',isRight?'Správně! Jsi expert! 🎉':'Dobrý pokus! 😄 Jedeme dál!');
      setRewardMode(null);
      setTimeout(()=>{
        const next=taskIdx+1;
        if(next<allTasks.length){
          setTaskIdx(next);
          const nt=allTasks[next];
          add('tutor',fmtQ(nt));
          if(nt.type==='choice')setChoices(nt.options);
        }else{
          setDone(true);
          add('tutor',`🏁 Hotovo! Výsledek: ${score.ok}/${score.total}`);
        }
      },800);
      return;
    }
    add('student',answer);
    setInp(''); setChoices(null); setTyping(true);

    const res=checkAns(task,answer);

    if(res.ok){
      const pts=attempts===0?3:attempts===1?2:1;
      await saveAnswer(task.id,answer,true,pts);

      const praises=['Výborně, hned napoprvé! 🎯','Přesně tak!','Správně, jdeš na to skvěle!',
        'Ano, to sedí!','Bomba! 💥','Tak to je správně.'];
      const p2=['Správně! Vidíš, šlo to.','Ano, teď to sedí!','Přesně! 👍'];
      const praise=attempts===0?praises[Math.floor(Math.random()*praises.length)]:p2[Math.floor(Math.random()*p2.length)];

      setTimeout(()=>{
        setTyping(false);
        add('tutor',praise);
        setScore(p=>({ok:p.ok+1,total:p.total+1}));
        setAttempts(0); setAiHist([]);

        setTimeout(()=>{
          const next=taskIdx+1;
          if(next<allTasks.length){
            // Every 5 correct answers — reward!
            if((score.ok+1)%5===0&&score.ok>0){
              const rewards=[
                {q:'🎮 Minecraft kvíz! Kolik srdíček má Steve na začátku?',a:'10 (20 half-hearts)',opts:['5','10','20']},
                {q:'🎮 Víš, jaký mob v Minecraftu exploduje?',a:'Creeper!',opts:['Zombie','Creeper','Skeleton']},
                {q:'🎮 Z čeho se v Minecraftu vyrobí pochodeň?',a:'Tyčka + uhlí',opts:['Tyčka + uhlí','Dřevo + kámen','Železo + dřevo']},
                {q:'🚽 Skibidi kvíz! Kdo je hlavní nepřítel Skibidi Toilet?',a:'Cameraman!',opts:['Cameraman','Speakerman','TV Man']},
                {q:'🚽 Jakou zbraň používá Titan Cameraman?',a:'Laser z oka',opts:['Meč','Laser z oka','Bazuku']},
                {q:'🎮 Co dropne Ender Dragon v Minecraftu?',a:'XP a Dragon Egg',opts:['Diamanty','XP a Dragon Egg','Netherite']},
              ];
              const r=rewards[Math.floor(Math.random()*rewards.length)];
              add('tutor',`🏆 Pět správně! Bonus otázka:\n\n${r.q}`);
              setChoices(r.opts);
              setRewardMode(r);
              return;
            }
            setTaskIdx(next);
            const nt=allTasks[next];
            add('tutor',fmtQ(nt));
            if(nt.type==='choice')setChoices(nt.options);
          }else{
            setDone(true);
            // End session
            if(sessionId){
              sb.from('sessions').update({
                ended_at:new Date().toISOString(),
                correct_tasks:score.ok+1, total_tasks:score.total+1
              }).eq('id',sessionId).then(()=>{});
            }
            add('tutor',`🏁 Hotovo! Výsledek: ${score.ok+1}/${score.total+1}\n\nSkvělá práce! Můžeš zavřít nebo zkusit další téma.`);
          }
        },800);
      },600);
    }else{
      const na=attempts+1; setAttempts(na);

      if(na>=3){
        await saveAnswer(task.id,answer,false,0);
        setTimeout(()=>{
          setTyping(false);
          const ans=Array.isArray(task.answer)?task.answer.join(', '):task.answer;
          add('tutor',`Nevadí! Správná odpověď je: ${ans}\n${task.hint||''}`);
          setScore(p=>({...p,total:p.total+1}));
          setAttempts(0); setAiHist([]);
          setTimeout(()=>{
            const next=taskIdx+1;
            if(next<allTasks.length){
              setTaskIdx(next);
              const nt=allTasks[next];
              add('tutor',fmtQ(nt));
              if(nt.type==='choice')setChoices(nt.options);
            }else{
              setDone(true);
              add('tutor',`🏁 Hotovo! Výsledek: ${score.ok}/${score.total+1}`);
            }
          },1200);
        },600);
      }else{
        // Try AI, fallback to hints
        if(apiKey){
          const newH=[...aiHist,{role:'user',content:
            `Žák odpověděl "${answer}" na "${task.question}". Špatně. ${res.fb?'Zpětná vazba: '+res.fb:''} Pokus ${na}/3. Pomoz, ale NEŘÍKEJ odpověď.`}];
          const aiR=await aiTutor(newH,task,apiKey);
          setTyping(false);
          if(aiR){add('tutor',aiR);setAiHist([...newH,{role:'assistant',content:aiR}]);}
          else{add('tutor',res.fb||task.hint||'Zkus to jinak.');}
        }else{
          setTimeout(()=>{
            setTyping(false);
            add('tutor',res.fb||task.hint||'Hmm, to není ono. Zkus to jinak.');
          },500);
        }
        if(task.type==='choice')setChoices(task.options);
      }
    }
  }

  function send(){if(inp.trim()){handleAns(inp.trim());}}

  return(
    <div className="chat-screen">
      <div className="chat-header">
        <button className="back-btn" onClick={onBack}>←</button>
        <span style={{fontSize:22}}>{DB[subject].icon}</span>
        <span style={{flex:1,fontWeight:700,fontSize:15}}>{unit.name}</span>
        <span className="score-badge">{score.ok}/{score.total}</span>
      </div>
      <div className="chat-messages">
        {msgs.map((m,i)=>(
          <div key={i} className={`msg msg-${m.from==='tutor'?'tutor':'student'} fade-in`}>
            {m.from==='tutor'&&<span className="msg-avatar">🤖</span>}
            <div className="msg-bubble" style={{whiteSpace:'pre-wrap'}}>{m.text}</div>
          </div>
        ))}
        {typing&&(
          <div className="msg msg-tutor">
            <span className="msg-avatar">🤖</span>
            <div className="msg-bubble"><div className="typing-dots"><span/><span/><span/></div></div>
          </div>
        )}
        {choices&&!typing&&!done&&(
          <div className="choices fade-in" style={{marginLeft:36,maxWidth:'85%'}}>
            {choices.map((o,i)=>(
              <button key={i} className="choice-btn" onClick={()=>handleAns(o)}>{o}</button>
            ))}
          </div>
        )}
        <div ref={endRef}/>
      </div>
      {!done&&(
        <div className="chat-input">
          <input value={inp} onChange={e=>setInp(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}}
            placeholder="Napiš odpověď..."/>
          <button onClick={send}>➤</button>
        </div>
      )}
    </div>
  );
}

// ===== PARENT DASHBOARD =====
function ParentDash({children:kids,onBack}){
  const[stats,setStats]=useState({});
  const[loading,setL]=useState(true);

  useEffect(()=>{
    (async()=>{
      const st={};
      for(const ch of kids){
        const{data:sessions}=await sb.from('sessions').select('*')
          .eq('child_id',ch.id).order('created_at',{ascending:false}).limit(20);
        const{data:answers}=await sb.from('answers').select('*')
          .eq('child_id',ch.id).order('created_at',{ascending:false}).limit(200);
        const{data:skillProg}=await sb.from('skill_progress').select('*')
          .eq('child_id',ch.id);
        st[ch.id]={
          sessions:sessions||[],
          answers:answers||[],
          totalCorrect:(answers||[]).filter(a=>a.is_correct).length,
          totalAnswers:(answers||[]).length,
          skills:skillProg||[],
        };
      }
      setStats(st); setL(false);
    })();
  },[kids]);

  if(loading)return(
    <div className="screen">
      <div className="header">
        <button className="back-btn" onClick={onBack}>←</button>
        <span className="header-title">📊 Přehled</span>
      </div>
      <div className="spinner"/>
    </div>
  );

  return(
    <div className="screen">
      <div className="header">
        <button className="back-btn" onClick={onBack}>←</button>
        <span className="header-title">📊 Rodičovský přehled</span>
      </div>
      <div className="dash-pad">
        {kids.map(ch=>{
          const s=stats[ch.id]||{totalCorrect:0,totalAnswers:0,sessions:[]};
          const pct=s.totalAnswers?Math.round(s.totalCorrect/s.totalAnswers*100):0;
          return(
            <div key={ch.id} className="dash-card fade-in">
              <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12}}>
                <span style={{fontSize:32}}>{ch.avatar}</span>
                <div>
                  <div style={{fontWeight:700,fontSize:16}}>{ch.name}</div>
                  <div style={{fontSize:12,color:'var(--text3)'}}>{ch.grade||4}. třída</div>
                </div>
              </div>

              <div style={{display:'flex',gap:12,marginBottom:12}}>
                <div style={{flex:1,background:'var(--card2)',borderRadius:10,padding:'10px 12px',textAlign:'center'}}>
                  <div style={{fontSize:11,color:'var(--text3)'}}>Celkem odpovědí</div>
                  <div style={{fontSize:20,fontWeight:800}}>{s.totalAnswers}</div>
                </div>
                <div style={{flex:1,background:'var(--card2)',borderRadius:10,padding:'10px 12px',textAlign:'center'}}>
                  <div style={{fontSize:11,color:'var(--text3)'}}>Správně</div>
                  <div style={{fontSize:20,fontWeight:800,color:'var(--green)'}}>{pct}%</div>
                </div>
                <div style={{flex:1,background:'var(--card2)',borderRadius:10,padding:'10px 12px',textAlign:'center'}}>
                  <div style={{fontSize:11,color:'var(--text3)'}}>Lekce</div>
                  <div style={{fontSize:20,fontWeight:800}}>{s.sessions.length}</div>
                </div>
              </div>

              <div className="progress-bar">
                <div className="progress-fill" style={{width:`${pct}%`,background:'var(--green)'}}/>
              </div>
              <div style={{fontSize:11,color:'var(--text3)',textAlign:'right',marginTop:4}}>
                {s.totalAnswers===0?'Zatím bez dat':`${s.totalCorrect} z ${s.totalAnswers} správně`}
              </div>

              {s.skills&&s.skills.length>0&&(
                <div style={{marginTop:12,borderTop:'1px solid var(--card2)',paddingTop:10}}>
                  <div style={{fontSize:12,fontWeight:700,color:'var(--text2)',marginBottom:6}}>Dovednosti:</div>
                  {s.skills.sort((a,b)=>a.avg_score-b.avg_score).slice(0,8).map(sk=>{
                    const col=sk.avg_score>=2.5?'var(--green)':sk.avg_score>=1.5?'var(--accent)':'var(--red)';
                    const label=sk.avg_score>=2.5?'💪':sk.avg_score>=1.5?'📝':'🔄';
                    return(
                      <div key={sk.skill_id} style={{display:'flex',alignItems:'center',gap:8,marginBottom:4,fontSize:12}}>
                        <span>{label}</span>
                        <span style={{flex:1,color:'var(--text2)'}}>{sk.skill_id}</span>
                        <span style={{color:col,fontWeight:700}}>{sk.avg_score}/3</span>
                        <span style={{color:'var(--text3)',fontSize:10}}>({sk.total_attempts}×)</span>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}

        {kids.length===0&&(
          <div style={{textAlign:'center',color:'var(--text3)',padding:40}}>
            Zatím žádné děti. Přidej dítě na hlavní obrazovce.
          </div>
        )}
      </div>
    </div>
  );
}

// ===== SETTINGS SCREEN =====
function SettingsScreen({onBack,apiKey,setApiKey}){
  const[key,setKey]=useState(apiKey);
  const[saved,setSaved]=useState(false);
  function save(){
    localStorage.setItem('du_api_key',key);
    setApiKey(key); setSaved(true);
    setTimeout(()=>setSaved(false),2000);
  }
  return(
    <div className="screen">
      <div className="header">
        <button className="back-btn" onClick={onBack}>←</button>
        <span className="header-title">⚙️ Nastavení</span>
      </div>
      <div className="onb-form fade-in">
        <div className="onb-label">Anthropic API klíč (pro AI učitele)</div>
        <input className="onb-input" type="password" placeholder="sk-ant-..."
          value={key} onChange={e=>setKey(e.target.value)}/>
        <div style={{color:'var(--text3)',fontSize:12,marginBottom:16}}>
          Nepovinné. Bez klíče tutor používá nápovědy z databáze.
          S klíčem odpovídá AI chytřeji a osobněji.
        </div>
        <button className="onb-btn" onClick={save}>
          {saved?'✅ Uloženo':'💾 Uložit klíč'}
        </button>
        <div style={{color:'var(--text3)',fontSize:11,marginTop:16,textAlign:'center'}}>
          Klíč se ukládá jen v tomto zařízení (localStorage).
        </div>
      </div>
    </div>
  );
}

// ===== MAIN APP =====
function App(){
  const[authReady,setAuthReady]=useState(false);
  const[user,setUser]=useState(null);
  const[family,setFamily]=useState(null);
  const[children,setChildren]=useState([]);
  const[view,setView]=useState('home'); // home|addChild|subjects|topics|chat|parent|settings
  const[selChild,setSelChild]=useState(null);
  const[selSubject,setSelSubject]=useState(null);
  const[selUnit,setSelUnit]=useState(null);
  const[progress,setProgress]=useState([]);
  const[apiKey,setApiKey]=useState(localStorage.getItem('du_api_key')||'');
  const[toast,toastEl]=useToast();

  // Check existing session on mount
  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      if(session){setUser(session.user);loadFamily(session.user.id);}
      setAuthReady(true);
    });
    const{data:{subscription}}=sb.auth.onAuthStateChange((ev,session)=>{
      if(ev==='SIGNED_IN'&&session){setUser(session.user);loadFamily(session.user.id);}
      if(ev==='SIGNED_OUT'){setUser(null);setFamily(null);setChildren([]);}
    });
    return()=>subscription.unsubscribe();
  },[]);

  async function loadFamily(userId){
    // Get or create family
    let{data:fam}=await sb.from('families').select('*').eq('auth_id',userId).maybeSingle();
    if(!fam){
      const{data:newFam}=await sb.from('families').insert({auth_id:userId}).select('*').maybeSingle();
      fam=newFam;
    }
    setFamily(fam);
    if(fam){
      const{data:kids}=await sb.from('children').select('*').eq('family_id',fam.id).order('created_at');
      setChildren(kids||[]);
    }
  }

  async function refreshChildren(){
    if(!family)return;
    const{data:kids}=await sb.from('children').select('*').eq('family_id',family.id).order('created_at');
    setChildren(kids||[]);
  }

  function handleAuth(session,u){setUser(u);loadFamily(u.id);}
  async function handleLogout(){await sb.auth.signOut();setView('home');}

  function selectChild(ch){
    setSelChild(ch); setView('subjects');
  }

  function selectSubject(subj){
    setSelSubject(subj); setView('topics');
    // Load progress for this child
    if(selChild){
      sb.from('skill_progress').select('*').eq('child_id',selChild.id)
        .then(({data})=>setProgress(data||[]));
    }
  }

  // RENDER
  if(!authReady)return <div className="screen" style={{justifyContent:'center',alignItems:'center'}}><div className="spinner"/></div>;

  if(!user)return <AuthScreen onAuth={handleAuth}/>;

  if(view==='addChild')return(
    <AddChildScreen familyId={family?.id}
      onDone={()=>{refreshChildren();setView('home');toast('Dítě přidáno!');}}
      onBack={()=>setView('home')}/>
  );

  if(view==='settings')return(
    <SettingsScreen onBack={()=>setView('home')} apiKey={apiKey} setApiKey={setApiKey}/>
  );

  if(view==='parent')return(
    <ParentDash children={children} onBack={()=>setView('home')}/>
  );

  if(view==='subjects'&&selChild)return(
    <SubjectPicker child={selChild}
      onPick={s=>selectSubject(s)}
      onBack={()=>{setSelChild(null);setView('home');}}/>
  );

  if(view==='topics'&&selSubject)return(
    <TopicPicker subject={selSubject} child={selChild} progress={progress}
      onPick={u=>{setSelUnit(u);setView('chat');}}
      onBack={()=>{setSelSubject(null);setView('subjects');}}/>
  );

  if(view==='chat'&&selUnit)return(
    <ChatScreen subject={selSubject} unit={selUnit} child={selChild}
      apiKey={apiKey}
      onBack={()=>{setSelUnit(null);setView('topics');}}/>
  );

  // HOME
  return(
    <>
      <HomeScreen user={user} family={family} children={children}
        onSelectChild={selectChild}
        onAddChild={()=>setView('addChild')}
        onParent={()=>setView('parent')}
        onLogout={handleLogout}
        onSettings={()=>setView('settings')}/>
      {toastEl}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
