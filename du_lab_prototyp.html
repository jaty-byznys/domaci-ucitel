<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Agent K - Street Runner</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',sans-serif;background:#111;touch-action:none;user-select:none;}
canvas{display:block;width:100%;height:100%;}
#shop,#lab,#completion{position:absolute;inset:0;display:none;z-index:10;overflow-y:auto;}
#shop{background:rgba(10,5,25,0.92);background-image:url('img/O.jpg');background-size:cover;background-position:center;}
#lab{background:rgba(0,0,0,0.95);}
#completion{background:rgba(0,0,0,0.95);display:none;justify-content:center;align-items:center;flex-direction:column;color:#fff;text-align:center;}
.overlay-title{color:#ffd700;font-size:2em;margin:12px 0;text-shadow:0 2px 8px rgba(0,0,0,0.9),0 0 20px rgba(0,0,0,0.7);}
.overlay-sub{color:#ccc;font-size:1em;margin-bottom:16px;}
#shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;padding:12px;max-width:700px;margin:0 auto;}
.shop-item{background:rgba(0,0,0,0.6);border:2px solid rgba(255,255,255,0.2);border-radius:10px;padding:8px;text-align:center;cursor:pointer;transition:all 0.15s;color:#fff;backdrop-filter:blur(4px);}
.shop-item:hover{border-color:#ffd700;background:rgba(255,215,0,0.1);transform:scale(1.05);}
.shop-item.owned{opacity:0.35;pointer-events:none;border-color:#555;}
.shop-item.too-expensive{opacity:0.6;border-color:#ff5722;}
.shop-item img,.shop-item .emoji-icon{width:64px;height:64px;object-fit:contain;display:block;margin:0 auto 4px;}
.emoji-icon{font-size:48px;line-height:64px;text-align:center;}
.shop-item .item-name{font-size:0.8em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 1px 3px rgba(0,0,0,0.8);}
.shop-item .item-price{color:#ffd700;font-weight:bold;font-size:0.9em;text-shadow:0 1px 3px rgba(0,0,0,0.9);}
.shop-coins{color:#ffd700;font-size:1.4em;font-weight:bold;text-align:center;padding:10px;background:rgba(0,0,0,0.7);border-radius:12px;margin:4px 12px;}
.cat-btn{padding:6px 14px;border:2px solid rgba(255,255,255,0.3);background:rgba(0,0,0,0.6);color:#eee;border-radius:20px;cursor:pointer;font-size:0.85em;font-weight:bold;transition:all 0.15s;}
.cat-btn:hover,.cat-btn.active{border-color:#ffd700;color:#ffd700;background:rgba(0,0,0,0.8);}
.shop-backpack{background:rgba(255,255,255,0.05);border-top:1px solid rgba(255,255,255,0.1);padding:10px;text-align:center;position:sticky;bottom:0;}
.shop-backpack h3{color:#aaa;margin-bottom:6px;font-size:0.9em;}
.bp-items{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;min-height:40px;}
.bp-icon{width:40px;height:40px;background:rgba(255,215,0,0.15);border:1px solid #ffd700;border-radius:6px;display:flex;align-items:center;justify-content:center;}
.bp-icon img{width:32px;height:32px;object-fit:contain;}
.btn{display:inline-block;padding:12px 32px;background:#ffd700;color:#111;font-size:1.1em;font-weight:bold;border:none;border-radius:8px;cursor:pointer;margin:10px;transition:transform 0.1s;}
.btn:hover{transform:scale(1.05);}
.btn:active{transform:scale(0.95);}
#lab-bg{position:absolute;inset:0;background-size:cover;background-position:center;}
#lab-zones{position:absolute;inset:0;}
.lab-zone{position:absolute;border:2px dashed rgba(255,255,255,0.15);border-radius:6px;transition:all 0.3s;display:flex;align-items:center;justify-content:center;}
.lab-zone:hover{border-color:rgba(255,215,0,0.3);}
.lab-zone.highlight{background:rgba(255,215,0,0.2);border-color:#ffd700;box-shadow:0 0 12px rgba(255,215,0,0.3);}
.lab-zone.filled{border-color:transparent;background:none;}
.lab-zone img{max-width:100%;max-height:100%;object-fit:contain;filter:drop-shadow(2px 3px 4px rgba(0,0,0,0.4));}
.lab-zone .emoji-icon{font-size:2em;filter:drop-shadow(2px 3px 4px rgba(0,0,0,0.4));}
.lab-zone .zone-label{position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:0.7em;color:rgba(255,255,255,0.5);white-space:nowrap;pointer-events:none;}
.door-pile{position:absolute;bottom:80px;left:8px;display:flex;flex-direction:column;gap:4px;z-index:4;}
.door-pile-item{width:36px;height:36px;background:rgba(0,0,0,0.5);border-radius:6px;display:flex;align-items:center;justify-content:center;border:1px solid #555;}
.door-pile-item img{width:28px;height:28px;object-fit:contain;}
.door-pile-item .emoji-icon{font-size:20px;}
#lab-tray{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.8);padding:10px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;min-height:70px;align-items:center;z-index:5;}
.tray-item{width:56px;height:56px;background:rgba(255,255,255,0.1);border:2px solid #ffd700;border-radius:8px;cursor:grab;display:flex;align-items:center;justify-content:center;transition:transform 0.1s;}
.tray-item:active{cursor:grabbing;transform:scale(1.1);}
.tray-item img{width:44px;height:44px;object-fit:contain;}
.tray-item .emoji-icon{font-size:32px;}
#volta-speech{position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.85);color:#ffd700;padding:10px 14px;border-radius:12px;font-size:0.95em;max-width:280px;display:none;z-index:5;border:2px solid #ffd700;display:none;}
#volta-speech::before{content:'';position:absolute;bottom:-8px;right:20px;width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:8px solid #ffd700;}
#lab-done-btn{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);display:none;z-index:5;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="shop">
  <div style="display:flex;align-items:center;justify-content:center;gap:12px;padding:12px 12px 0;">
    <img src="img/volta.png" style="width:50px;height:50px;border-radius:50%;border:2px solid #ffd700;" onerror="this.style.display='none'">
    <div class="overlay-title" style="margin:0">Obchod</div>
  </div>
  <div class="shop-coins" id="shop-coins"></div>
  <div id="shop-cats" style="display:flex;gap:6px;justify-content:center;padding:0 12px 8px;flex-wrap:wrap;"></div>
  <div id="shop-grid"></div>
  <div class="shop-backpack">
    <h3>Batoh</h3>
    <div class="bp-items" id="bp-items"></div>
  </div>
  <div style="text-align:center;padding:12px;"><button class="btn" id="shop-go-btn">Zpet na ulici!</button></div>
</div>
<div id="lab">
  <div id="lab-bg"></div>
  <div id="lab-zones"></div>
  <div class="door-pile" id="door-pile"></div>
  <div style="position:absolute;top:8px;right:8px;z-index:5;text-align:right;">
    <div id="volta-speech"></div>
    <img src="img/V_happy.png" id="volta-portrait" style="width:55px;height:55px;border-radius:50%;border:2px solid #ffd700;margin-top:4px;" onerror="this.style.display='none'">
  </div>
  <div id="lab-tray"></div>
  <button class="btn" id="lab-done-btn">Dalsi kolo!</button>
</div>
<div id="completion">
  <div class="overlay-title">Hotovo!</div>
  <div id="comp-text" style="color:#fff;font-size:1.2em;padding:20px;"></div>
  <button class="btn" onclick="location.reload()">Hrat znovu</button>
</div>

// --- VOLTA QUOTES ---
// Lab zones — where each item belongs (% positions on lab_empty.png / L1.jpg)
const LAB_ZONES = {

  A2:  {x:40, y:72, w:10, h:14, name:'Stolicka'},

const S = {

// --- RESIZE ---
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  S.W = canvas.width; S.H = canvas.height;
  S.groundY = S.H * 0.75;
  S.scale = Math.min(S.W / 800, S.H / 500);
}
window.addEventListener('resize', resize);
resize();

// --- GENERATE BUILDINGS ---
function generateBuildings() {
  S.buildings = [];
  const lvl = S.level || LEVELS[0];
  let x = 0;
  while (x < S.W * 3) {
    const w = 60 + Math.random() * 100;
    const h = 80 + Math.random() * 150;
    const ci = Math.floor(Math.random() * lvl.buildingColors.length);
    S.buildings.push({ x, w, h, color: lvl.buildingColors[ci],
      windows: Math.floor(Math.random()*6)+2 });
    x += w + 10 + Math.random() * 40;
  }
}
generateBuildings();

// --- GENERATE PLATFORMS (levels 3 & 4) ---
function generatePlatforms() {
  S.platforms = [];
  let x = 0;
  const isHarbor = S.level && S.level.hasWater;
  const maxX = S.maxDistance * 8;
  // Start with a wide starting platform
  S.platforms.push({ x: 0, w: 200, y: S.groundY });
  x = 200;
  while (x < maxX) {
    const w = 80 + Math.random() * 120;
    const gap = isHarbor ? (50 + Math.random() * 30) : (60 + Math.random() * 40);
    const yOff = isHarbor ? (Math.random() * 10 - 5) : (Math.random() * 15 - 7);
    S.platforms.push({ x, w, y: S.groundY + yOff });
    x += w + gap;
  }
  S.lastPlatformIdx = 0;
}

// --- SPAWN ---
let lastObstacleX = 0;
let lastCoinX = 0;

function spawnObstacle() {
  const lvl = S.level || LEVELS[0];
  const types = lvl.types;
  const type = types[Math.floor(Math.random() * types.length)];
  const gy = S.groundY;
  let ob = { type, x: S.W + 50, y: gy, w: 30, h: 40, frame: 0 };

  if (type === 'barrel') { ob.w = 30; ob.h = 30; }
  else if (type === 'crate') { ob.w = 36; ob.h = 40; }
  else if (type === 'clothesline') { ob.w = 60; ob.h = 20; ob.y = gy - 80; ob.flying = true; }
  else if (type === 'standing_pirate') { ob.w = 24; ob.h = 50; }
  else if (type === 'walking_pirate') { ob.w = 24; ob.h = 45; ob.walkDir = 1; ob.walkRange = 60; ob.startX = S.W + 50; }
  else if (type === 'sign') { ob.w = 40; ob.h = 20; ob.y = gy - 75; ob.flying = true; }
  else if (type === 'chimney') { ob.w = 20; ob.h = 35; }
  else if (type === 'pigeon') { ob.w = 20; ob.h = 16; ob.y = gy - 70 - Math.random()*30; ob.flying = true; }
  else if (type === 'seagull') { ob.w = 24; ob.h = 16; ob.y = gy - 75 - Math.random()*25; ob.flying = true; }
  else if (type === 'anchor') { ob.w = 20; ob.h = 50; ob.y = gy - 60; ob.flying = true; }
  else if (type === 'skripek') { ob.w = 24; ob.h = 45; }
  else if (type === 'parrot') { ob.w = 24; ob.h = 24; ob.y = gy - 80 - Math.random()*40; ob.flying = true; }
  else if (type === 'net') { ob.w = 50; ob.h = 20; }
  else if (type === 'piratka') { ob.w = 30; ob.h = 50; ob.cunning = true; ob.baseY = gy; }

  // For platform levels, place ground obstacles on platforms
  if (lvl.hasPlatforms && !ob.flying) {
    const visPlats = S.platforms.filter(p => {
      const px = p.x - S.bgOffset3;
      return px > S.W * 0.5 && px < S.W + 200;
    });
    if (visPlats.length > 0) {
      const plat = visPlats[Math.floor(Math.random() * visPlats.length)];
      ob.x = plat.x - S.bgOffset3 + plat.w * 0.3 + Math.random() * plat.w * 0.4;
      ob.y = plat.y;
    }
  }

  S.obstacles.push(ob);
  lastObstacleX = S.W + 50;
}

function spawnCoins() {
  const gy = S.groundY;
  const pattern = Math.floor(Math.random() * 4);
  const baseX = S.W + 60;
  if (pattern === 0) {
    // Small arc - 3 coins
    for (let i = 0; i < 3; i++) {
      const cx = baseX + i * 40;
      const cy = gy - 40 - Math.sin(i/2*Math.PI) * 60;
      S.coinPickups.push({ x: cx, y: cy, r: 10, collected: false, flash: 0 });
    }
  } else if (pattern === 1) {
    // Single high coin (risky jump)
    S.coinPickups.push({ x: baseX, y: gy - 110, r: 12, collected: false, flash: 0 });
  } else if (pattern === 2) {
    // Two low coins
    S.coinPickups.push({ x: baseX, y: gy - 15, r: 10, collected: false, flash: 0 });
    S.coinPickups.push({ x: baseX + 35, y: gy - 15, r: 10, collected: false, flash: 0 });
  } else {
    // Single mid-height coin
    S.coinPickups.push({ x: baseX, y: gy - 50, r: 10, collected: false, flash: 0 });
  }
  lastCoinX = baseX + 120;
}

function addParticles(x, y, color, count) {

}

function drawAgentK(x, y, frame, ducking) {

  ctx.strokeStyle = '#FFF'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(x-3,y-28+dy); ctx.lineTo(x-5,y-18+dy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+3,y-28+dy); ctx.lineTo(x+5,y-18+dy); ctx.stroke();

  ctx.fillStyle = '#FFD1A4';
  ctx.beginPath(); ctx.arc(x, y-38+dy, 11, 0, Math.PI*2); ctx.fill();

  ctx.beginPath(); ctx.arc(x, y-42+dy, 12, Math.PI, 0); ctx.fill();
  ctx.fillRect(x-12, y-44+dy, 5, 8); // side hair left
  ctx.fillRect(x+7, y-44+dy, 5, 8);  // side hair right

  ctx.beginPath(); ctx.moveTo(x+2,y-53+dy); ctx.lineTo(x+6,y-58+dy); ctx.lineTo(x+10,y-52+dy); ctx.fill();
  // Eyes
  ctx.fillStyle = '#FFF';

  ctx.beginPath(); ctx.arc(x+4, y-38+dy, 3.5, 0, Math.PI*2); ctx.fill();

  // Small smile
  ctx.strokeStyle = '#B8705A'; ctx.lineWidth = 1.5;

function drawCoin(x, y, r, flash) {
  ctx.save();
  if (flash > 0) { ctx.globalAlpha = flash / 15; r *= 1 + (15-flash)*0.1; }
  ctx.fillStyle = '#ffd700';
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#b8860b'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.stroke();
  ctx.fillStyle = '#b8860b'; ctx.font = `bold ${r}px sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('$', x, y+1);
  ctx.restore();
}

// --- PRELOAD BACKGROUND IMAGES ---
const bgImages = {};
LEVELS.forEach(lvl => {
  if (lvl.bgImage) {
    const img = new Image();
    img.src = lvl.bgImage;
    img.onload = () => { bgImages[lvl.bgImage] = img; };
  }
});

// --- DRAW BACKGROUND ---
function drawBackground() {
  const lvl = S.level || LEVELS[0];

  // Try to use background image if loaded
  const bgImg = lvl.bgImage && bgImages[lvl.bgImage];
  if (bgImg) {
    // Parallax scrolling with image (tile it)
    const imgW = bgImg.width * (S.H / bgImg.height); // scale to canvas height
    const offset = -(S.bgOffset2 % imgW);
    for (let x = offset; x < S.W + imgW; x += imgW) {
      ctx.drawImage(bgImg, x, 0, imgW, S.H);
    }
    // Still draw ground and other elements on top
    return drawBackgroundOverlay();
  }

  // Fallback: canvas-drawn background
  const cols = lvl.skyColors;

  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, S.groundY);
  grad.addColorStop(0, cols[0]);
  grad.addColorStop(0.5, cols[1]);
  grad.addColorStop(1, cols[2] || cols[1]);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, S.W, S.groundY);

  // Stars (levels 0, 3)
  if (lvl.hasStars) {
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    for (let i = 0; i < 30; i++) {
      const sx = ((i * 137 + S.bgOffset1 * 0.1) % S.W + S.W) % S.W;
      const sy = (i * 73) % (S.groundY * 0.6);
      ctx.fillRect(sx, sy, 2, 2);
    }
  }

  // Moon (level 3-harbor)
  if (lvl.hasMoon) {
    ctx.fillStyle = '#ffe8a0';
    ctx.beginPath();
    ctx.arc(S.W*0.8 - S.bgOffset1*0.05 % 200, 60, 25, 0, Math.PI*2);
    ctx.fill();
  }

  // Buildings (back layer)
  for (let b of S.buildings) {
    const bx = ((b.x - S.bgOffset2 * 0.3) % (S.W*3) + S.W*3) % (S.W*3) - S.W*0.5;
    if (bx > -b.w && bx < S.W + b.w) {
      ctx.fillStyle = b.color;
      ctx.fillRect(bx, S.groundY - b.h, b.w, b.h);
      const winColor = lvl === LEVELS[1] ? 'rgba(255,255,255,0.4)' : 'rgba(255,220,100,0.3)';
      ctx.fillStyle = winColor;
      for (let wi = 0; wi < b.windows; wi++) {
        const wx = bx + 8 + (wi % 3) * (b.w/3);
        const wy = S.groundY - b.h + 15 + Math.floor(wi/3) * 30;
        if (wy < S.groundY - 10) ctx.fillRect(wx, wy, 10, 12);
      }
    }
  }

  // Platform or flat ground
  if (lvl.hasPlatforms) {
    // Water below for harbor
    if (lvl.hasWater) {
      drawWater(S.W, S.groundY + 20, S.frame);
    } else {
      // Distant ground far below for rooftops
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(0, S.groundY + 40, S.W, S.H);
    }
    // Draw platforms
    const platColor = lvl.hasWater ? '#5C4033' : '#8B4513';
    const platTop = lvl.hasWater ? '#4E342E' : '#A0522D';
    for (let p of S.platforms) {
      const px = p.x - S.bgOffset3;
      if (px + p.w < -50 || px > S.W + 50) continue;
      ctx.fillStyle = platColor;
      ctx.fillRect(px, p.y, p.w, 20);
      ctx.fillStyle = platTop;
      ctx.fillRect(px, p.y, p.w, 5);
      // Sway animation for harbor boats
      if (lvl.hasWater) {
        ctx.fillStyle = '#3E2723';
        ctx.fillRect(px + 5, p.y + 5, p.w - 10, 12);
      }
    }
  } else {
    // Flat ground
    ctx.fillStyle = lvl.groundColor;
    ctx.fillRect(0, S.groundY, S.W, S.H - S.groundY);
    // Road lines
    ctx.fillStyle = '#555';
    const roadY = S.groundY + (S.H - S.groundY) * 0.5;
    for (let i = -1; i < S.W/80 + 2; i++) {
      const lx = ((i * 80 - S.bgOffset3) % S.W + S.W) % S.W;
      ctx.fillRect(lx, roadY, 40, 3);
    }
    ctx.fillStyle = '#666';
    ctx.fillRect(0, S.groundY, S.W, 4);
  }

  // Lightning flash (level 5)
  if (lvl.hasLightning && S.lightningFlash > 0) {
    ctx.fillStyle = `rgba(255,255,255,${S.lightningFlash * 0.1})`;
    ctx.fillRect(0, 0, S.W, S.H);
    S.lightningFlash--;
  }

  // Destination building (appears when finishing)
  if (S.finishing) {
    const bldgX = S.W - 80 + (1 - Math.min(1, (S.distance - S.maxDistance*0.9) / (S.maxDistance*0.1))) * 200;
    const bldgW = 100, bldgH = S.groundY - 30;
    const isShop = S.streetDir === 'to_shop';
    // Building
    ctx.fillStyle = isShop ? '#DEB887' : '#7B9EA8';
    ctx.fillRect(bldgX, S.groundY - bldgH, bldgW, bldgH);
    // Roof
    ctx.fillStyle = isShop ? '#8B4513' : '#4A6670';
    ctx.beginPath();
    ctx.moveTo(bldgX - 10, S.groundY - bldgH);
    ctx.lineTo(bldgX + bldgW/2, S.groundY - bldgH - 30);
    ctx.lineTo(bldgX + bldgW + 10, S.groundY - bldgH);
    ctx.fill();
    // Door
    ctx.fillStyle = '#4A2A0A';
    ctx.fillRect(bldgX + bldgW/2 - 15, S.groundY - 50, 30, 50);
    // Sign
    ctx.fillStyle = '#FFF';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(isShop ? 'OBCHOD' : 'LABORATOR', bldgX + bldgW/2, S.groundY - bldgH - 35);
    // Windows
    ctx.fillStyle = '#FFD700';
    ctx.fillRect(bldgX + 15, S.groundY - bldgH + 20, 18, 14);
    ctx.fillRect(bldgX + bldgW - 33, S.groundY - bldgH + 20, 18, 14);
  }
}

// When using bg image, still draw overlays (lightning, building, platforms)
function drawBackgroundOverlay() {
  const lvl = S.level || LEVELS[0];
  // Platforms for rooftop/harbor levels
  if (lvl.hasPlatforms) {
    if (lvl.hasWater) drawWater(S.W, S.groundY + 20, S.frame);
    const platColor = lvl.hasWater ? '#5C4033' : '#8B4513';
    for (let p of S.platforms) {
      const px = p.x - S.bgOffset3;
      if (px + p.w < -50 || px > S.W + 50) continue;
      ctx.fillStyle = platColor;
      ctx.fillRect(px, p.y, p.w, 20);
      ctx.fillStyle = lvl.hasWater ? '#3E2723' : '#A0522D';
      ctx.fillRect(px, p.y, p.w, 5);
    }
  }
  // Lightning
  if (lvl.hasLightning && S.lightningFlash > 0) {
    ctx.fillStyle = `rgba(255,255,255,${S.lightningFlash * 0.1})`;
    ctx.fillRect(0, 0, S.W, S.H);
    S.lightningFlash--;
  }
  // Destination building
  if (S.finishing) {
    const bldgX = S.W - 100;
    const bldgW = 100, bldgH = S.groundY - 30;
    const isShop = S.streetDir === 'to_shop';
    ctx.fillStyle = isShop ? '#DEB887' : '#7B9EA8';
    ctx.fillRect(bldgX, S.groundY - bldgH, bldgW, bldgH);
    ctx.fillStyle = isShop ? '#8B4513' : '#4A6670';
    ctx.beginPath();
    ctx.moveTo(bldgX-10, S.groundY-bldgH); ctx.lineTo(bldgX+bldgW/2, S.groundY-bldgH-30); ctx.lineTo(bldgX+bldgW+10, S.groundY-bldgH);
    ctx.fill();
    ctx.fillStyle = '#4A2A0A';
    ctx.fillRect(bldgX+bldgW/2-15, S.groundY-50, 30, 50);
    ctx.fillStyle = '#FFF'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(isShop ? 'OBCHOD' : 'LABORATOR', bldgX+bldgW/2, S.groundY-bldgH-35);
  }
}

// --- DRAW HUD ---
function drawHUD() {
  const s = S.scale;
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  roundRect(ctx, 10, 10, 100*s, 32*s, 16*s); ctx.fill();
  drawCoin(28*s+10, 10+16*s, 10*s, 0);
  ctx.fillStyle = '#ffd700'; ctx.font = `bold ${16*s}px sans-serif`;
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(S.coins, 44*s+10, 10+16*s);

  // Distance bar
  const barW = Math.min(300, S.W * 0.4);
  const barX = S.W/2 - barW/2;
  const barY = 14;
  const barH = 14*s;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  roundRect(ctx, barX-4, barY-2, barW+8, barH+4, 8); ctx.fill();
  ctx.fillStyle = '#444';
  ctx.fillRect(barX, barY, barW, barH);
  const prog = Math.min(1, S.distance / S.maxDistance);
  const grd = ctx.createLinearGradient(barX, 0, barX + barW * prog, 0);
  grd.addColorStop(0, '#4CAF50'); grd.addColorStop(1, '#8BC34A');
  ctx.fillStyle = grd;
  ctx.fillRect(barX, barY, barW * prog, barH);
  ctx.fillStyle = '#fff'; ctx.font = `bold ${10*s}px sans-serif`; ctx.textAlign = 'center';
  ctx.fillText(S.streetDir === 'to_shop' ? 'Do obchodu' : 'Do laboratore', S.W/2, barY + barH - 2);
  ctx.fillStyle = '#ffd700';
  ctx.beginPath(); ctx.arc(barX + barW * prog, barY + barH/2, 5*s, 0, Math.PI*2); ctx.fill();

  // Backpack items
  if (S.backpack.length > 0) {
    const startX = S.W - 16 - S.backpack.length * 36;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    roundRect(ctx, startX - 6, 8, S.backpack.length * 36 + 12, 36, 8); ctx.fill();
    for (let i = 0; i < S.backpack.length; i++) {
      ctx.fillStyle = 'rgba(255,215,0,0.2)';
      ctx.fillRect(startX + i*36, 12, 30, 28);
      ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 1;
      ctx.strokeRect(startX + i*36, 12, 30, 28);
      ctx.fillStyle = '#fff'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
      const item = ITEMS.find(it => it.id === S.backpack[i]);
      if (item) ctx.fillText(item.name.substring(0,4), startX+i*36+15, 30);
    }
  }

  // Round indicator + level name
  const lvl = S.level || LEVELS[0];
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  const riW = 140*s;
  roundRect(ctx, S.W - riW - 10, S.H - 30*s, riW, 24*s, 8); ctx.fill();
  ctx.fillStyle = '#ffd700'; ctx.font = `bold ${11*s}px sans-serif`; ctx.textAlign = 'center';
  ctx.fillText(`${lvl.name} (kolo ${S.round+1})`, S.W - riW/2 - 10, S.H - 14*s);
  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// --- COLLISION ---
function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

// --- START STREET RUN ---
function startStreetRun(dir) {
  S.streetDir = dir;
  S.phase = dir === 'to_shop' ? 'street_to_shop' : 'street_to_lab';
  const lvlIdx = S.round % LEVELS.length; // cycle through levels
  S.level = LEVELS[lvlIdx];
  S.distance = 0;
  S.maxDistance = 3000 + S.round * 500;
  S.finishing = false;
  S.obstacles = [];
  S.coinPickups = [];
  S.particles = [];
  S.py = S.groundY;
  S.vy = 0;
  S.jumping = false;
  S.ducking = false;
  S.onGround = true;
  S.hitFlash = 0;
  S.invincible = 0;
  S.frame = 0;
  S.bgOffset1 = 0; S.bgOffset2 = 0; S.bgOffset3 = 0;
  lastObstacleX = S.W + 200;
  lastCoinX = S.W;

  // Apply level scroll speed (return trip is harder)
  S.scrollSpeed = S.level.scrollSpeed + (dir === 'to_lab' ? 0.8 : 0);

  // Chaser state
  S.chaserX = -100;

  // Lightning state
  S.lightningTimer = 180 + Math.random() * 120;
  S.lightningFlash = 0;

  // Intro timer (60 frames ~ 1 second — shorter!)
  S.introTimer = 60;
  S.introAlpha = 1;

  // Speech bubble state
  S.speechText = '';
  S.speechTimer = 0;

  // Platform generation
  if (S.level.hasPlatforms) {
    generatePlatforms();
  } else {
    S.platforms = [];
  }

  generateBuildings();
  document.getElementById('shop').style.display = 'none';
  document.getElementById('lab').style.display = 'none';
}

// --- DRAW INTRO TEXT ---
function drawIntro() {
  if (S.introTimer <= 0) return;
  const lvl = S.level || LEVELS[0];
  const alpha = S.introTimer < 30 ? S.introTimer / 30 : 1;
  ctx.save();
  ctx.globalAlpha = alpha;
  // Dark backdrop
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, S.H*0.25, S.W, S.H*0.35);
  // Level name
  ctx.fillStyle = '#ffd700';
  ctx.font = `bold ${48*S.scale}px sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = '#000'; ctx.shadowBlur = 10;
  ctx.fillText(lvl.name, S.W/2, S.H*0.37);
  // Intro text
  ctx.fillStyle = '#fff';
  ctx.font = `${20*S.scale}px sans-serif`;
  ctx.fillText(lvl.intro, S.W/2, S.H*0.50);
  ctx.shadowBlur = 0;
  ctx.restore();
}

// --- SPEECH BUBBLE ---
function showSpeech(text, duration, isPirate) {
  S.speechText = text;
  S.speechTimer = duration || 90;
  S.speechPirate = !!isPirate;
}

function drawSpeechBubble() {
  if (S.speechTimer <= 0 || !S.speechText) return;
  S.speechTimer--;
  const alpha = S.speechTimer < 20 ? S.speechTimer / 20 : 1;
  ctx.save();
  ctx.globalAlpha = alpha;
  const fontSize = Math.max(11, 14 * S.scale);
  ctx.font = `bold ${fontSize}px sans-serif`;
  // Word wrap
  const maxW = Math.min(220, S.W * 0.35);
  const words = S.speechText.split(' ');
  const lines = [];
  let line = '';
  for (const w of words) {
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > maxW - 20) {
      if (line) lines.push(line);
      line = w;
    } else { line = test; }
  }
  if (line) lines.push(line);
  const lineH = fontSize + 4;
  const bubbleW = maxW;
  const bubbleH = lines.length * lineH + 14;
  const bx = Math.min(S.px + 25, S.W - bubbleW - 10);
  const by = S.py - 70 - bubbleH;
  // Colors
  const bgColor = S.speechPirate ? '#4a0000' : '#fff';
  const borderColor = S.speechPirate ? '#ff3333' : '#555';
  const textColor = S.speechPirate ? '#fff' : '#222';
  // Bubble
  ctx.fillStyle = bgColor;
  roundRect(ctx, bx, by, bubbleW, bubbleH, 12); ctx.fill();
  ctx.strokeStyle = borderColor; ctx.lineWidth = 2;
  roundRect(ctx, bx, by, bubbleW, bubbleH, 12); ctx.stroke();
  // Tail
  ctx.fillStyle = bgColor;
  ctx.beginPath();
  ctx.moveTo(bx + 15, by + bubbleH);
  ctx.lineTo(bx + 8, by + bubbleH + 14);
  ctx.lineTo(bx + 28, by + bubbleH);
  ctx.fill();
  ctx.strokeStyle = borderColor;
  ctx.beginPath();
  ctx.moveTo(bx + 15, by + bubbleH);
  ctx.lineTo(bx + 8, by + bubbleH + 14);
  ctx.lineTo(bx + 28, by + bubbleH);
  ctx.stroke();
  // Text lines
  ctx.fillStyle = textColor;
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  for (let i = 0; i < lines.length; i++) {
    ctx.fillText(lines[i], bx + 10, by + 7 + i * lineH);
  }
  ctx.restore();
}

// --- TITLE SCREEN ---
function drawTitle() {
  S.level = LEVELS[0];
  drawBackground();
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, S.W, S.H);
  const cx = S.W/2, cy = S.H * 0.35;
  ctx.fillStyle = '#ffd700'; ctx.font = `bold ${40*S.scale}px sans-serif`; ctx.textAlign = 'center';
  ctx.fillText('AGENT K', cx, cy);
  ctx.fillStyle = '#aaa'; ctx.font = `${18*S.scale}px sans-serif`;
  ctx.fillText('Street Runner', cx, cy + 36*S.scale);
  drawAgentK(cx, cy + 110*S.scale, S.frame, false);
  ctx.fillStyle = '#fff'; ctx.font = `bold ${20*S.scale}px sans-serif`;
  const pulse = 0.7 + Math.sin(S.frame * 0.08) * 0.3;
  ctx.globalAlpha = pulse;
  ctx.fillText('Klikni pro start!', cx, S.H * 0.75);
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#888'; ctx.font = `${13*S.scale}px sans-serif`;
  ctx.fillText('NAHORU = skok   |   DOLU = skrz', cx, S.H * 0.85);
  ctx.fillText('Na mobilu: klikni nahoru/dolu', cx, S.H * 0.90);
}

// --- PLATFORM PHYSICS ---
function getGroundYAtX(px) {
  if (!S.level || !S.level.hasPlatforms) return S.groundY;
  for (let i = 0; i < S.platforms.length; i++) {
    const p = S.platforms[i];
    const platLeft = p.x - S.bgOffset3;
    const platRight = platLeft + p.w;
    if (px >= platLeft && px <= platRight) {
      S.lastPlatformIdx = i;
      return p.y;
    }
  }
  return -1; // In a gap
}

function respawnOnPlatform() {
  const p = S.platforms[S.lastPlatformIdx];
  if (!p) return;
  // Teleport agent back to last safe platform
  S.bgOffset3 = p.x + p.w * 0.5 - S.px;
  S.py = p.y;
  S.vy = 0;
  S.onGround = true;
  S.jumping = false;
  S.hitFlash = 20;
  S.invincible = 60;
  // Lose coins
  const lose = Math.min(3, S.coins);
  S.coins -= lose;
  addParticles(S.px, S.py - 20, '#ff4444', 12);
}

// --- UPDATE STREET ---
function updateStreet(dt) {
  // During intro, just count down + show speech after
  if (S.introTimer > 0) {
    S.introTimer -= dt;
    if (S.introTimer <= 0) {
      const lvl = S.level || LEVELS[0];
      showSpeech(lvl.intro, 120);
    }
    S.frame++;
    return;
  }

  S.frame++;
  const spd = S.scrollSpeed * dt;
  S.distance += spd * 0.15;
  S.bgOffset1 += spd * 0.3;
  S.bgOffset2 += spd * 0.7;
  S.bgOffset3 += spd;

  S.scrollSpeed += 0.0008 * dt;

  // Lightning timer (level 5)
  if (S.level && S.level.hasLightning) {
    S.lightningTimer -= dt;
    if (S.lightningTimer <= 0) {
      S.lightningFlash = 3;
      S.lightningTimer = 180 + Math.random() * 120;
    }
  }

  // Chaser movement (levels 1 & 5)
  if (S.level && S.level.hasChaser) {
    // Chasers slowly gain on agent
    S.chaserX += 0.02 * dt;
    if (S.chaserX > S.px - 80) S.chaserX = S.px - 80;
    if (S.chaserX < 0) S.chaserX = Math.min(S.chaserX + 0.5, S.px - 120);
  }

  // Player physics
  if (!S.onGround) {
    S.vy += 0.55 * dt;
    S.py += S.vy * dt;

    if (S.level && S.level.hasPlatforms) {
      // Check if landed on a platform
      const gy = getGroundYAtX(S.px);
      if (gy > 0 && S.py >= gy && S.vy > 0) {
        S.py = gy; S.vy = 0; S.onGround = true; S.jumping = false;
      } else if (S.py > S.groundY + 60) {
        // Fell through gap
        respawnOnPlatform();
      }
    } else {
      if (S.py >= S.groundY) {
        S.py = S.groundY; S.vy = 0; S.onGround = true; S.jumping = false;
      }
    }
  } else if (S.level && S.level.hasPlatforms) {
    // Check if walked off platform edge
    const gy = getGroundYAtX(S.px);
    if (gy < 0) {
      S.onGround = false;
      S.vy = 0;
    }
  }

  // Spawn obstacles (not during finish)
  if (!S.finishing) {
    const rate = (S.level ? S.level.obstacleRate : 0.025);
    const minGap = Math.max(180, 280 - S.round * 20);
    if (S.obstacles.length === 0 ||
        (S.W + 50 - S.obstacles[S.obstacles.length-1].x > minGap && Math.random() < rate * dt)) {
      spawnObstacle();
    }
  }

  // Spawn coins
  if (S.coinPickups.filter(c=>!c.collected).length < 2 && Math.random() < 0.012 * dt) {
    spawnCoins();
  }

  // Move obstacles
  for (let ob of S.obstacles) {
    ob.x -= spd;
    ob.frame = S.frame;
    if (ob.flying) ob.y += Math.sin(S.frame * 0.05) * 0.5;
    // Walking pirate oscillation
    if (ob.type === 'walking_pirate') {
      ob.x += Math.sin(S.frame * 0.03) * 1.5;
    }
    // Piratka cunning AI: mirrors player jumps, shifts position
    if (ob.type === 'piratka' && ob.cunning) {
      // Jump when player jumps (delayed reaction)
      if (S.jumping && !ob.pJumping && ob.x < S.W * 0.8) {
        ob.pJumping = true;
        ob.pJumpTimer = 8; // delay before she jumps
      }
      if (ob.pJumpTimer > 0) { ob.pJumpTimer--; }
      else if (ob.pJumping) {
        ob.y = ob.baseY - 40; // she jumps too!
        ob.pJumpHold = (ob.pJumpHold || 0) + 1;
        if (ob.pJumpHold > 25) { ob.y = ob.baseY; ob.pJumping = false; ob.pJumpHold = 0; }
      } else {
        ob.y = ob.baseY;
      }
      // Slight horizontal dodge to be harder to avoid
      if (Math.abs(ob.x - S.px) < 150) {
        ob.x += Math.sin(S.frame * 0.08) * 1.2; // sway
      }
    }
  }
  S.obstacles = S.obstacles.filter(ob => ob.x > -80);

  // Move coins
  for (let c of S.coinPickups) { c.x -= spd; if (c.flash > 0) c.flash--; }
  S.coinPickups = S.coinPickups.filter(c => c.x > -30 && (!c.collected || c.flash > 0));

  // Player hitbox
  const ph = S.ducking ? 25 : 50;
  const pTop = S.py - ph;
  const pLeft = S.px - 12;
  const pW = 24;

  // Coin collision
  for (let c of S.coinPickups) {
    if (c.collected) continue;
    const dx = S.px - c.x, dy = (S.py - ph/2) - c.y;
    if (Math.sqrt(dx*dx+dy*dy) < c.r + 18) {
      c.collected = true; c.flash = 15;
      S.coins++;
      addParticles(c.x, c.y, '#ffd700', 6);
    }
  }

  // Obstacle collision
  if (S.invincible <= 0) {
    for (let ob of S.obstacles) {
      if (ob.hit) continue;
      let ox = ob.x - ob.w/2, oy = ob.y - ob.h, ow = ob.w, oh = ob.h;
      if (ob.flying) { oy = ob.y - ob.h/2; }
      if (ob.type === 'parrot' || ob.type === 'seagull' || ob.type === 'pigeon') {
        oy = ob.y - 12; oh = 24; ox = ob.x - 12; ow = 24;
      }
      if (ob.type === 'net') { ox = ob.x - 25; ow = 50; oh = 18; oy = ob.y - 18; }
      if (ob.type === 'clothesline') { ox = ob.x - 30; ow = 60; }
      if (ob.type === 'sign') { ox = ob.x - 20; ow = 40; }
      if (ob.type === 'anchor') { ox = ob.x - 10; ow = 20; oh = 50; oy = ob.y - 50; }

      if (rectsOverlap(pLeft, pTop, pW, ph, ox, oy, ow, oh)) {
        ob.hit = true;
        S.hitFlash = 20;
        S.invincible = 60;
        if (S.backpack.length > 0) {
          const lost = S.backpack.pop();
          const lostItem = ITEMS.find(i => i.id === lost);
          addParticles(S.px + 20, S.py - 20, '#ff4444', 10);
          showSpeech(lostItem ? lostItem.name + ' ukradena!' : 'Neco ukradli!', 80, true);
        } else if (S.coins > 0) {
          const lose = Math.min(5, S.coins);
          S.coins -= lose;
          addParticles(S.px, S.py - 20, '#ffd700', 8);
          // Level-specific pirate messages
          const lvl = S.level || LEVELS[0];
          const msgs = lvl.hitMsgs || ['-'+lose+' minci!'];
          showSpeech(msgs[Math.floor(Math.random()*msgs.length)] + ' (-'+lose+')', 70, true);
        }
      }
    }
  }
  if (S.invincible > 0) S.invincible--;
  if (S.hitFlash > 0) S.hitFlash--;

  // Particles
  for (let p of S.particles) {
    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life--;
  }
  S.particles = S.particles.filter(p => p.life > 0);

  // Smooth finish
  if (S.distance >= S.maxDistance && !S.finishing) {
    S.finishing = true;
    S.finishTimer = 40; // ~0.7 seconds then auto-enter building
  }
  if (S.finishing) {
    S.scrollSpeed = 0; // instant stop
    S.obstacles = [];
    S.coinPickups = S.coinPickups.filter(c => c.collected);
    S.finishTimer--;
    if (S.finishTimer <= 0 && S.onGround) {
      if (S.streetDir === 'to_shop') openShop();
      else openLab();
      return;
    }
  }
  // (finish handled above)
}

// --- DRAW OBSTACLE (dispatcher) ---
function drawObstacle(ob) {
  switch (ob.type) {
    case 'skripek': drawSkripek(ob.x, ob.y); break;
    case 'barrel': drawBarrel(ob.x, ob.y); drawRepak(ob.x, ob.y - 30); break;
    case 'parrot': drawKeksik(ob.x, ob.y, ob.frame); break;
    case 'net': drawNet(ob.x, ob.y); break;
    case 'crate': drawCrate(ob.x, ob.y); break;
    case 'clothesline': drawClothesline(ob.x, ob.y); break;
    case 'standing_pirate': drawStandingPirate(ob.x, ob.y); break;
    case 'walking_pirate': drawWalkingPirate(ob.x, ob.y, ob.frame); break;
    case 'sign': drawSign(ob.x, ob.y); break;
    case 'chimney': drawChimney(ob.x, ob.y); break;
    case 'pigeon': drawPigeon(ob.x, ob.y, ob.frame); break;
    case 'seagull': drawSeagull(ob.x, ob.y, ob.frame); break;
    case 'anchor': drawAnchor(ob.x, ob.y); break;
    case 'piratka': drawPiratka(ob.x, ob.y, ob.frame); break;
  }
}

// --- DRAW STREET ---
function drawStreet() {
  drawBackground();

  // Draw chasers behind Agent (levels 1 & 5)
  if (S.level && S.level.hasChaser && S.introTimer <= 0) {
    drawChaserPirates(S.chaserX, S.py, S.frame);
  }

  // Draw obstacles
  for (let ob of S.obstacles) drawObstacle(ob);

  // Draw coins
  for (let c of S.coinPickups) drawCoin(c.x, c.y, c.r, c.flash);

  // Draw Agent K
  drawAgentK(S.px, S.py, S.frame, S.ducking);

  // Speech bubble above Agent
  drawSpeechBubble();

  // Particles
  for (let p of S.particles) {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  // Hit flash overlay
  if (S.hitFlash > 0) {
    ctx.fillStyle = `rgba(255,0,0,${S.hitFlash * 0.015})`;
    ctx.fillRect(0, 0, S.W, S.H);
  }

  drawHUD();

  // Intro overlay
  if (S.introTimer > 0) {
    drawIntro();
  } else {
    // Destination indicator
    const destText = S.streetDir === 'to_shop' ? 'OBCHOD -->' : 'LABORATOR -->';
    ctx.fillStyle = '#ffd700'; ctx.font = `bold ${14*S.scale}px sans-serif`; ctx.textAlign = 'right';
    ctx.globalAlpha = 0.5 + Math.sin(S.frame * 0.05) * 0.3;
    ctx.fillText(destText, S.W - 15, S.H - 10);
    ctx.globalAlpha = 1;
  }
}

// --- SHOP ---
function openShop() {
  S.phase = 'shop';
  document.getElementById('shop').style.display = 'block';
  renderShop();
}

let shopCat = 'all';

function renderShopCats() {
  const cats = document.getElementById('shop-cats');
  cats.innerHTML = '';
  const categories = [
    {id:'all', label:'Vse'},
    {id:'lab', label:'Laborator'},
    {id:'lux', label:'Luxus & Bydleni'},
    {id:'fun', label:'Drobnosti'},
  ];
  for (const c of categories) {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (shopCat === c.id ? ' active' : '');
    btn.textContent = c.label;
    btn.onclick = () => { shopCat = c.id; renderShop(); };
    cats.appendChild(btn);
  }
}

function renderShop() {
  document.getElementById('shop-coins').textContent = 'Mince: ' + S.coins + '  |  Batoh: ' + S.backpack.length + '/' + MAX_BACKPACK;
  renderShopCats();
  const grid = document.getElementById('shop-grid');
  grid.innerHTML = '';
  const filtered = shopCat === 'all' ? ITEMS : ITEMS.filter(i => i.cat === shopCat);
  // Sort: not owned first, then by price
  const sorted = [...filtered].sort((a,b) => {
    const aOwn = S.boughtItems.includes(a.id) || S.placedItems.some(p => p.id === a.id);
    const bOwn = S.boughtItems.includes(b.id) || S.placedItems.some(p => p.id === b.id);
    if (aOwn !== bOwn) return aOwn ? 1 : -1;
    return a.price - b.price;
  });
  for (const item of sorted) {
    const owned = S.boughtItems.includes(item.id) || S.placedItems.some(p => p.id === item.id);
    const tooExpensive = !owned && item.price > S.coins;
    const div = document.createElement('div');
    div.className = 'shop-item' + (owned ? ' owned' : '') + (tooExpensive ? ' too-expensive' : '');
    if (item.img) {
      div.innerHTML = `<img src="${item.img}" alt="${item.name}" onerror="this.style.display='none';this.nextSibling.style.display='block'"><div class="emoji-icon" style="display:none">${item.emoji||'\u{1F4E6}'}</div>`;
    } else {
      div.innerHTML = `<div class="emoji-icon">${item.emoji||'\u{1F4E6}'}</div>`;
    }
    const priceColor = owned ? '#555' : (tooExpensive ? '#ff5722' : '#ffd700');
    div.innerHTML += `<div class="item-name">${item.name}</div><div class="item-price" style="color:${priceColor}">${owned ? 'Koupeno' : item.price + ' minci'}</div>`;
    if (!owned && !tooExpensive) div.addEventListener('click', () => buyItem(item));
    grid.appendChild(div);
  }
  renderBackpack();
}

function buyItem(item) {
  if (S.coins < item.price) return;
  if (S.boughtItems.includes(item.id)) return;
  if (S.backpack.length >= MAX_BACKPACK) {
    document.getElementById('shop-coins').textContent = 'Batoh je plny! Max ' + MAX_BACKPACK + ' veci.';
    document.getElementById('shop-coins').style.color = '#ff5722';
    setTimeout(() => { document.getElementById('shop-coins').style.color = ''; renderShop(); }, 1500);
    return;
  }
  S.coins -= item.price;
  S.boughtItems.push(item.id);
  S.backpack.push(item.id);
  localStorage.setItem('labBought', JSON.stringify(S.boughtItems));
  renderShop();
}

function renderBackpack() {
  const bp = document.getElementById('bp-items');
  bp.innerHTML = '';
  for (const id of S.backpack) {
    const item = ITEMS.find(i => i.id === id);
    if (!item) continue;
    const div = document.createElement('div');
    div.className = 'bp-icon';
    if (item.img) {
      div.innerHTML = `<img src="${item.img}" onerror="this.outerHTML='<span style=font-size:24px>${item.emoji||'\u{1F4E6}'}</span>'">`;
    } else {
      div.innerHTML = `<span style="font-size:24px">${item.emoji||'\u{1F4E6}'}</span>`;
    }
    bp.appendChild(div);
  }
}

document.getElementById('shop-go-btn').addEventListener('click', () => {
  startStreetRun('to_lab');
});

// --- LAB ---
let dragItem = null;
let dragEl = null;

function openLab() {
  S.phase = 'lab';
  const labEl = document.getElementById('lab');
  labEl.style.display = 'block';
  const labBg = document.getElementById('lab-bg');
  labBg.style.backgroundImage = 'url(img/lab_empty.png), url(img/L1.jpg)';
  labBg.style.backgroundColor = '#1a1a2e';

  // Render zones
  const zonesEl = document.getElementById('lab-zones');
  zonesEl.innerHTML = '';
  for (const [id, z] of Object.entries(LAB_ZONES)) {
    const zone = document.createElement('div');
    zone.className = 'lab-zone';
    zone.dataset.itemId = id;
    zone.style.cssText = `left:${z.x}%;top:${z.y}%;width:${z.w}%;height:${z.h}%;`;
    // Already placed?
    const placed = S.placedItems.find(p => p.id === id);
    if (placed) {
      zone.classList.add('filled');
      const item = ITEMS.find(i => i.id === id);
      if (item) zone.innerHTML = itemImgHtml(item);
    } else {
      zone.innerHTML = `<span class="zone-label">${z.name}</span>`;
    }
    // Drop events
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('highlight'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('highlight'));
    zone.addEventListener('drop', e => {
      e.preventDefault(); zone.classList.remove('highlight');
      if (dragItem) tryPlaceItem(zone, dragItem);
    });
    zonesEl.appendChild(zone);
  }

  // Door pile (non-lab items already placed behind door)
  renderDoorPile();

  // Tray
  const tray = document.getElementById('lab-tray');
  tray.innerHTML = '';
  // Show ALL bought items that aren't placed yet and aren't behind door
  const toPlace = S.boughtItems.filter(id => !S.placedItems.some(p => p.id === id) && !S.doorItems.includes(id));
  for (const id of toPlace) {
    const item = ITEMS.find(i => i.id === id);
    if (!item) continue;
    const div = document.createElement('div');
    div.className = 'tray-item';
    div.draggable = true;
    div.dataset.itemId = id;
    div.innerHTML = itemImgHtml(item);
    div.addEventListener('dragstart', e => { dragItem = id; e.dataTransfer.effectAllowed = 'move'; });
    div.addEventListener('touchstart', e => { e.preventDefault(); dragItem = id; dragEl = div; div.style.opacity = '0.5'; });
    tray.appendChild(div);
  }

  // Touch drag for mobile
  labEl.ontouchmove = (e) => { e.preventDefault(); };
  labEl.ontouchend = (e) => {
    if (!dragItem) return;
    const touch = e.changedTouches[0];
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    if (el) {
      const zone = el.closest('.lab-zone');
      if (zone) {
        tryPlaceItem(zone, dragItem);
      } else if (!LAB_ZONES[dragItem]) {
        // Non-lab item dropped anywhere → behind door
        tryPlaceItem({dataset:{itemId:'_door'}}, dragItem);
      }
    }
    if (dragEl) dragEl.style.opacity = '1';
    dragItem = null; dragEl = null;
  };

  // Also handle drops on lab background (for non-lab items)
  labEl.addEventListener('drop', (e) => {
    e.preventDefault();
    if (dragItem && !LAB_ZONES[dragItem]) {
      tryPlaceItem({dataset:{itemId:'_door'}}, dragItem);
    }
  });
  labEl.addEventListener('dragover', (e) => e.preventDefault());

  document.getElementById('lab-done-btn').style.display = 'none';
  showVoltaSpeech('Vitej! Pretahni predmety na spravna mista.');
  checkLabDone();
}

function itemImgHtml(item) {
  if (item.img) {
    return `<img src="${item.img}" onerror="this.outerHTML='<div class=emoji-icon>${item.emoji||'📦'}</div>'">`;
  }
  return `<div class="emoji-icon">${item.emoji||'📦'}</div>`;
}

function tryPlaceItem(zone, itemId) {
  const targetId = zone.dataset.itemId;
  const item = ITEMS.find(i => i.id === itemId);
  if (!item) return;

  // Does this item belong in the lab? (has a zone?)
  if (!LAB_ZONES[itemId]) {
    // Non-lab item → behind the door
    S.doorItems.push(itemId);
    const bpIdx = S.backpack.indexOf(itemId);
    if (bpIdx >= 0) S.backpack.splice(bpIdx, 1);
    const trayItem = document.querySelector(`#lab-tray [data-item-id="${itemId}"]`);
    if (trayItem) trayItem.remove();
    renderDoorPile();
    showVoltaSpeech(VOLTA_WRONG_ROOM[Math.floor(Math.random() * VOLTA_WRONG_ROOM.length)]);
    localStorage.setItem('labDoor', JSON.stringify(S.doorItems));
    dragItem = null;
    checkLabDone();
    return;
  }

  // Correct zone?
  if (targetId === itemId) {
    // Place it!
    S.placedItems.push({ id: itemId, slot: targetId });
    localStorage.setItem('labPlaced', JSON.stringify(S.placedItems));
    const bpIdx = S.backpack.indexOf(itemId);
    if (bpIdx >= 0) S.backpack.splice(bpIdx, 1);
    zone.classList.add('filled');
    zone.innerHTML = '';
    const inner = document.createElement('div');
    inner.style.cssText = 'transform:scale(0);width:100%;height:100%;display:flex;align-items:center;justify-content:center;';
    inner.innerHTML = itemImgHtml(item);
    zone.appendChild(inner);
    requestAnimationFrame(() => {
      inner.style.transition = 'transform 0.35s cubic-bezier(0.34,1.56,0.64,1)';
      inner.style.transform = 'scale(1)';
    });
    const trayItem = document.querySelector(`#lab-tray [data-item-id="${itemId}"]`);
    if (trayItem) trayItem.remove();
    showVoltaSpeech(VOLTA_QUOTES[Math.floor(Math.random() * VOLTA_QUOTES.length)]);
    // Change Volta portrait to happy
    const portrait = document.getElementById('volta-portrait');
    if (portrait) portrait.src = 'img/V_happy.png';
  } else {
    // Wrong zone
    showVoltaSpeech('Tohle patri jinam! Zkus to znovu.');
    const portrait = document.getElementById('volta-portrait');
    if (portrait) portrait.src = 'img/V_shock.png';
  }
  dragItem = null;
  checkLabDone();
}

function renderDoorPile() {
  const pile = document.getElementById('door-pile');
  pile.innerHTML = '';
  if (!S.doorItems || S.doorItems.length === 0) return;
  const label = document.createElement('div');
  label.style.cssText = 'color:#aaa;font-size:0.65em;text-align:center;margin-bottom:2px;';
  label.textContent = 'Za dvermi';
  pile.appendChild(label);
  for (const id of S.doorItems) {
    const item = ITEMS.find(i => i.id === id);
    if (!item) continue;
    const div = document.createElement('div');
    div.className = 'door-pile-item';
    div.title = item.name;
    div.innerHTML = itemImgHtml(item);
    pile.appendChild(div);
  }
}

function showVoltaSpeech(text) {
  const el = document.getElementById('volta-speech');
  el.textContent = text;
  el.style.display = 'block';
  clearTimeout(el._timer);
  el._timer = setTimeout(() => { el.style.display = 'none'; }, 3000);
}

function checkLabDone() {
  const tray = document.getElementById('lab-tray');
  const remaining = tray.querySelectorAll('.tray-item').length;
  if (remaining === 0) {
    document.getElementById('lab-done-btn').style.display = 'block';
  }
}

document.getElementById('lab-done-btn').addEventListener('click', () => {
  S.round++;
  // Keep playing as long as player has coins and items to buy
  const unbought = ITEMS.filter(i => !S.boughtItems.includes(i.id) && !S.placedItems.some(p => p.id === i.id));
  if (S.coins <= 0 || unbought.length === 0) {
    showCompletion();
  } else {
    startStreetRun('to_shop');
  }
});

// --- COMPLETION ---
function showCompletion() {
  S.phase = 'complete';
  document.getElementById('lab').style.display = 'none';
  const comp = document.getElementById('completion');
  comp.style.display = 'flex';
  document.getElementById('comp-text').innerHTML =
    `Dokoncil jsi ${S.round} kol!<br>Umisteno predmetu: ${S.placedItems.length}<br>Zbyvajici mince: ${S.coins}<br><br>` +
    (S.coins <= 0 ? 'Dosly ti mince. Ziskej dalsi ucenim!' : 'Vsechno koupeno! Laborator je kompletni!');
}

// --- INPUT ---
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'ArrowUp' || e.code === 'ArrowDown' || e.code === 'Space') e.preventDefault();
  if (S.phase === 'title') { startStreetRun('to_shop'); return; }
  if (S.introTimer > 0) return; // No control during intro
  if ((e.code === 'ArrowUp' || e.code === 'Space') && S.onGround && !S.ducking) {
    S.vy = -12; S.onGround = false; S.jumping = true;
  }
  if (e.code === 'ArrowDown') S.ducking = true;
});
window.addEventListener('keyup', e => {
  keys[e.code] = false;
  if (e.code === 'ArrowDown') S.ducking = false;
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (S.phase === 'title') { startStreetRun('to_shop'); return; }
  if (S.introTimer > 0) return;
  const t = e.touches[0];
  if (t.clientY < S.H * 0.5) {
    if (S.onGround && !S.ducking) { S.vy = -12; S.onGround = false; S.jumping = true; }
  } else {
    S.ducking = true;
  }
});
canvas.addEventListener('touchend', e => { S.ducking = false; });
canvas.addEventListener('click', e => {
  if (S.phase === 'title') startStreetRun('to_shop');
});

// --- MAIN LOOP ---
let lastTime = 0;
function gameLoop(time) {
  const dt = Math.min(3, (time - lastTime) / 16.67);
  lastTime = time;
  ctx.clearRect(0, 0, S.W, S.H);
  if (S.phase === 'title') {
    S.frame++;
    drawTitle();
  } else if (S.phase === 'street_to_shop' || S.phase === 'street_to_lab') {
    updateStreet(dt);
    drawStreet();
  }
  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);
</script>
