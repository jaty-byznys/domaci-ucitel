<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Domaci Ucitel - Laborator Dr. Volty</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',sans-serif;background:#111;}
#game{position:relative;width:100%;height:100%;max-width:900px;margin:0 auto;overflow:hidden;}
#bg{width:100%;height:100%;object-fit:cover;display:block;}
#ui{position:absolute;inset:0;pointer-events:none;}
#ui>*{pointer-events:auto;}

/* Coin HUD */
#hud{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.7);color:#ffd700;padding:6px 14px;border-radius:20px;font-size:1.1em;font-weight:bold;z-index:50;display:flex;align-items:center;gap:6px;}
#hud img{width:24px;height:24px;}

/* Dialog */
#dialog{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.85);color:#fff;padding:10px;display:none;z-index:60;min-height:100px;}
#dialog-inner{display:flex;align-items:flex-start;gap:10px;}
#dialog-portrait{width:70px;height:70px;object-fit:contain;border-radius:8px;background:rgba(255,255,255,.1);flex-shrink:0;}
#dialog-text{flex:1;font-size:.95em;line-height:1.4;padding:6px 0;min-height:50px;}
#dialog-name{font-weight:bold;color:#ffd700;margin-bottom:4px;font-size:.85em;}
#dialog-continue{position:absolute;bottom:8px;right:14px;font-size:.75em;color:#aaa;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}

/* Phone button */
#phone-btn{position:absolute;bottom:12px;right:12px;width:50px;height:50px;background:#2196F3;border:none;border-radius:50%;cursor:pointer;z-index:55;display:none;box-shadow:0 2px 8px rgba(0,0,0,.4);font-size:1.4em;color:#fff;transition:transform .15s;}
#phone-btn:hover{transform:scale(1.1);}
#phone-btn:active{transform:scale(.95);}

/* Hotspots on street */
.hotspot{position:absolute;cursor:pointer;z-index:10;border:2px dashed rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);padding:0;border-radius:8px;min-width:40px;min-height:40px;transition:all 0.2s;}
.hotspot:hover{background:rgba(255,215,0,0.15);border-color:rgba(255,215,0,0.5);transform:scale(1.05);}
.hotspot.sparkle{border:2px solid rgba(255,215,0,0.4);background:rgba(255,215,0,0.08);animation:sparkle 1.5s infinite;}
@keyframes sparkle{0%,100%{box-shadow:0 0 6px 3px rgba(255,215,0,.2);border-color:rgba(255,215,0,0.3);}50%{box-shadow:0 0 16px 6px rgba(255,215,0,.6);border-color:rgba(255,215,0,0.7);}}
.hotspot.glow{border:2px dashed rgba(100,200,255,0.3);background:rgba(100,200,255,0.06);animation:glow 2s infinite;}
@keyframes glow{0%,100%{box-shadow:0 0 4px 2px rgba(100,200,255,.15);}50%{box-shadow:0 0 10px 4px rgba(100,200,255,.4);}}

/* Shop */
#shop-panel{position:absolute;inset:0;display:none;z-index:40;}
#shop-grid{position:absolute;top:15%;left:5%;right:5%;bottom:18%;display:flex;justify-content:center;gap:14px;flex-wrap:wrap;align-items:center;}
.shop-item{width:130px;background:rgba(255,255,255,.92);border-radius:12px;padding:10px;text-align:center;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 2px 6px rgba(0,0,0,.2);}
.shop-item:hover{transform:translateY(-3px);box-shadow:0 4px 12px rgba(0,0,0,.3);}
.shop-item img{width:70px;height:70px;object-fit:contain;}
.shop-item .name{font-size:.8em;font-weight:bold;margin:4px 0 2px;}
.shop-item .price{font-size:.85em;color:#e65100;font-weight:bold;}
.shop-item.bought{opacity:.4;pointer-events:none;}
#shop-done{position:absolute;bottom:4%;left:50%;transform:translateX(-50%);padding:10px 30px;background:#4CAF50;color:#fff;border:none;border-radius:8px;font-size:1em;cursor:pointer;display:none;}
#shop-done:hover{background:#388E3C;}

/* Ambush overlay */
#ambush{position:absolute;inset:0;background:rgba(0,0,0,.8);display:none;z-index:70;flex-direction:column;align-items:center;justify-content:center;color:#fff;}
#ambush-title{font-size:1.3em;margin-bottom:10px;color:#ff9800;font-weight:bold;text-align:center;padding:0 10px;}
#ambush-area{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;align-items:center;margin:10px;}
.ambush-choice{width:120px;height:120px;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.3);border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1em;text-align:center;padding:8px;transition:transform .1s,border-color .2s;color:#fff;}
.ambush-choice:hover{border-color:#ff9800;transform:scale(1.05);}
#ambush-timer{font-size:2em;color:#ff5722;font-weight:bold;margin-bottom:6px;}
#ambush-msg{text-align:center;max-width:350px;margin-top:10px;font-size:.9em;line-height:1.4;padding:0 10px;}

/* Lab build - drag & drop */
#lab-items{position:absolute;bottom:0;left:0;right:0;height:90px;background:rgba(0,0,0,.7);display:none;z-index:30;overflow-x:auto;white-space:nowrap;padding:8px;display:none;}
#lab-items .lab-item{display:inline-block;width:70px;height:70px;margin:0 4px;cursor:grab;border:2px solid transparent;border-radius:8px;background:rgba(255,255,255,.1);padding:2px;}
#lab-items .lab-item img{width:100%;height:100%;object-fit:contain;pointer-events:none;}
#lab-items .lab-item.dragging{opacity:.5;}
.drop-zone{position:absolute;border:2px dashed rgba(255,255,0,.5);border-radius:6px;z-index:20;background:rgba(255,255,0,.05);transition:border-color .2s;}
.drop-zone.highlight{border-color:#ffd700;background:rgba(255,215,0,.15);}
.placed-item{position:absolute;z-index:25;pointer-events:none;}
.placed-item img{width:100%;height:100%;object-fit:contain;}

/* Video overlay */
#video-overlay{position:absolute;inset:0;background:#000;z-index:100;display:none;align-items:center;justify-content:center;}
#video-overlay video{max-width:100%;max-height:100%;}
#skip-video{position:absolute;top:10px;right:10px;background:rgba(255,255,255,.2);color:#fff;border:none;padding:6px 16px;border-radius:4px;cursor:pointer;font-size:.85em;}

/* Riddle modal */
#riddle{position:absolute;inset:0;background:rgba(0,0,0,.85);display:none;z-index:65;flex-direction:column;align-items:center;justify-content:center;color:#fff;padding:20px;}
#riddle-text{font-size:1.1em;text-align:center;max-width:400px;margin-bottom:16px;line-height:1.5;}
#riddle-input{padding:8px 14px;font-size:1em;border-radius:6px;border:2px solid #555;background:#222;color:#fff;width:220px;text-align:center;}
#riddle-submit{margin-top:10px;padding:8px 24px;background:#ff9800;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:1em;}
#riddle-feedback{margin-top:8px;font-size:.9em;min-height:20px;}

/* Completion screen */
#completion{position:absolute;inset:0;background:rgba(0,0,0,.9);display:none;z-index:90;flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;padding:20px;}
#completion h2{color:#ffd700;font-size:1.5em;margin-bottom:12px;}
#completion .stat{margin:4px 0;font-size:1em;}
#completion button{margin-top:16px;padding:10px 30px;background:#4CAF50;color:#fff;border:none;border-radius:8px;font-size:1em;cursor:pointer;}

/* Debug bar */
#debug{position:absolute;top:0;left:0;background:rgba(0,0,0,.8);color:#0f0;font-size:.7em;padding:4px 8px;z-index:200;display:none;}
#debug button{font-size:.7em;margin:0 2px;cursor:pointer;background:#333;color:#0f0;border:1px solid #0f0;padding:1px 6px;border-radius:3px;}

/* Floating text */
.float-text{position:absolute;color:#ffd700;font-weight:bold;font-size:1.2em;pointer-events:none;z-index:80;animation:floatUp 1.2s forwards;text-shadow:0 1px 3px #000;}
@keyframes floatUp{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-50px);}}

/* Responsive */
@media(max-width:600px){
  .shop-item{width:100px;padding:6px;}
  .shop-item img{width:50px;height:50px;}
  .ambush-choice{width:90px;height:90px;font-size:.85em;}
  #dialog-portrait{width:50px;height:50px;}
}
</style>
</head>
<body>
<div id="game">
  <img id="bg" src="img/L1.jpg" alt="scene">
  <div id="ui">
    <div id="hud"><img src="img/C23.png" alt="coin"> <span id="coin-count">40</span></div>
    <button id="phone-btn" onclick="phoneHint()">&#128222;</button>
    <div id="dialog" onclick="advanceDialog()">
      <div id="dialog-inner">
        <img id="dialog-portrait" src="img/volta.png" alt="">
        <div><div id="dialog-name"></div><div id="dialog-text"></div></div>
      </div>
      <div id="dialog-continue">Klikni pro pokracovani...</div>
    </div>
    <div id="shop-panel"><div id="shop-grid"></div><button id="shop-done" onclick="leaveShop()">Hotovo - zpet do ulice!</button></div>
    <div id="lab-items"></div>
    <div id="ambush"></div>
    <div id="riddle">
      <div id="riddle-text"></div>
      <input id="riddle-input" placeholder="Tvoje odpoved..." autocomplete="off">
      <button id="riddle-submit">Odpovedet</button>
      <div id="riddle-feedback"></div>
    </div>
    <div id="video-overlay"><video id="game-video" playsinline></video><button id="skip-video" onclick="skipVideo()">Preskocit</button></div>
    <div id="completion">
      <h2>Laborator je obnovena!</h2>
      <div id="comp-stats"></div>
      <button onclick="playLabVideo()">Podivat se na laborator</button>
    </div>
    <div id="debug">
      DEBUG:
      <button onclick="GS.coins+=10;updateHUD()">+10 coins</button>
      <button onclick="nextPhase()">Skip phase</button>
      <button onclick="GS.currentRound++;startRound()">Skip round</button>
      <span id="debug-info"></span>
    </div>
  </div>
</div>

<script>
// ===================== DATA =====================
const ROUNDS = [
  { items:['A1','A3','A14'], costs:[5,3,2], pirate:null },
  { items:['A2','A12','A8'], costs:[2,3,3], pirate:'skripek' },
  { items:['A4','A6','A9'], costs:[4,4,2], pirate:'repak' },
  { items:['A5','A13','A10'], costs:[8,3,3], pirate:'piratka' },
  { items:['A7','A11','A15'], costs:[6,5,7], pirate:'krivak' }
];

const ITEM_DATA = {
  A1:{name:'Stul',img:'img/A1.png',zone:{x:25,y:55,w:18,h:20},deps:[],vOk:'Pevny stul! Zaklad laboratore.',vFail:'Tohle sem nepatri...'},
  A2:{name:'Stolicka',img:'img/A2.png',zone:{x:26,y:65,w:10,h:15},deps:['A1'],vOk:'Tady se bude dobre sedet!',vFail:'Stolicka patri ke stolu.'},
  A3:{name:'Policka',img:'img/A3.png',zone:{x:5,y:20,w:15,h:18},deps:[],vOk:'Policka drzi pevne.',vFail:'To neni spravne misto.'},
  A4:{name:'Zkumavky',img:'img/A4.png',zone:{x:7,y:22,w:10,h:12},deps:['A3'],vOk:'Zkumavky na policce, perfektni!',vFail:'Zkumavky potrebuji policku.'},
  A5:{name:'Mikroskop',img:'img/A5.png',zone:{x:28,y:48,w:12,h:18},deps:['A1'],vOk:'Mikroskop na stole! Ted muzeme zkoumat.',vFail:'Mikroskop patri na stul.'},
  A6:{name:'Kahan',img:'img/A6.png',zone:{x:60,y:55,w:10,h:14},deps:[],vOk:'Kahan je pripraven.',vFail:'Kahan sem nedavej.'},
  A7:{name:'Vahy',img:'img/A7.png',zone:{x:72,y:55,w:12,h:14},deps:['A1'],vOk:'Presne vahy! Dulezite pro experimenty.',vFail:'Vahy patri na pracovni plochu.'},
  A8:{name:'Period. tabulka',img:'img/A8.png',zone:{x:45,y:10,w:20,h:18},deps:[],vOk:'Tabulka prvku na zdi!',vFail:'To neni spravna zed.'},
  A9:{name:'Bezpecnost',img:'img/A9.png',zone:{x:75,y:10,w:12,h:16},deps:[],vOk:'Bezpecnostni pokyny na miste.',vFail:'Zkus to jinam.'},
  A10:{name:'Obvod',img:'img/A10.png',zone:{x:55,y:45,w:14,h:14},deps:['A6'],vOk:'Elektricky obvod funguje!',vFail:'Obvod potrebuje zdroj energie.'},
  A11:{name:'Banky',img:'img/A11.png',zone:{x:8,y:38,w:10,h:14},deps:['A3'],vOk:'Banky jsou v bezpeci na policce.',vFail:'Banky patri na policku.'},
  A12:{name:'Lampa',img:'img/A12.png',zone:{x:40,y:40,w:8,h:20},deps:[],vOk:'Svetlo! Ted vidime co delame.',vFail:'Lampa sem nepatri.'},
  A13:{name:'Knihy',img:'img/A13.png',zone:{x:6,y:25,w:10,h:10},deps:['A3'],vOk:'Vedecke knihy na policce.',vFail:'Knihy patri na policku.'},
  A14:{name:'Plast',img:'img/A14.png',zone:{x:82,y:40,w:10,h:25},deps:[],vOk:'Laboratorni plast na vesaku!',vFail:'Plast patri k vesaku.'},
  A15:{name:'Chemikalie',img:'img/A15.png',zone:{x:62,y:25,w:12,h:14},deps:['A9'],vOk:'Chemikalie ulozeny bezpecne!',vFail:'Nejdriv bezpecnostni pokyny!'}
};

const STREET_HOTSPOTS = [
  // Round 1
  [{id:'wall',x:8,y:25,w:15,h:22,coins:3,cls:'sparkle',msg:'Mince schovane v cihlach!'},
   {id:'cat',x:68,y:45,w:14,h:18,coins:1,cls:'sparkle',msg:'Kocka mela minci na obojku!'},
   {id:'keksik1',x:45,y:15,w:14,h:15,coins:0,cls:'sparkle',msg:'Keksik: "KRAAA!" ...a zmizel.',isKeksik:true}],
  // Round 2
  [{id:'newspaper',x:30,y:70,w:14,h:10,coins:2,cls:'glow',msg:'Piratske noviny! A mezi strankami mince!'},
   {id:'sewer',x:65,y:80,w:10,h:8,coins:0,cls:'glow',msg:'Jen smradlavy kanal. Nic tu neni.'}],
  // Round 3
  [{id:'chest3',x:20,y:60,w:14,h:14,coins:5,cls:'',msg:'Truhla! Ale je zamcena...',riddle:{q:'Hadanka: Mam nohy ale nechodim, mam desku ale nejsem kniha. Co jsem?',a:'stul',reward:5,bonusSmoke:true}},
   {id:'sleepkek',x:75,y:35,w:10,h:12,coins:1,cls:'',msg:'Keksik spi... opatrne! Mince pod kridlem.'}],
  // Round 4
  [{id:'cobble',x:40,y:75,w:16,h:10,coins:4,cls:'',msg:'Dlazebni kameny ve spravnem poradi! 4 mince!',sequence:true},
   {id:'citizen',x:60,y:15,w:10,h:12,coins:0,cls:'',msg:'Obcan: "Podivej se do modreho kontejneru!"',reveals:'bluebin'},
   {id:'bluebin',x:15,y:70,w:10,h:12,coins:3,cls:'',msg:'V kontejneru - 3 mince! Dekuji, obcane!',hidden:true}],
  // Round 5
  [{id:'graffiti',x:80,y:25,w:12,h:12,coins:1,cls:'',msg:'Piratske graffiti... a za nim mince!'},
   {id:'chest5',x:25,y:55,w:14,h:14,coins:5,cls:'',msg:'Posledni truhla!',riddle:{q:'Hadanka: Cim vic me beres, tim vic zbyva. Co jsem?',a:'dira',reward:5}}]
];

const VOLTA_BRIEFINGS = [
  'Agente K! Laborator je znicena. Potrebuju stul, policku a plast. Melo by to byt bezpecne.',
  'Pozor, Skripek te videl. Neumi cist ani jidelni listek, ale umi kricet.',
  'Zachytil jsem piratskou frekvenci. Repak rikal neco o "sigma pasti". Nevim co to je.',
  'Piratka je jina liga. Chytra, klidna, nebezpecna. Jako ja, ale na spatne strane.',
  'Krivak jde po tobe osobne. Tohle je posledni sance. Dej do toho vsechno.'
];

const PHONE_HINTS = [
  'Zkus se podivat na tu zed... neni tam neco divneho?',
  'Na zemi lezi noviny. Piratske!',
  'V ulicce jsem zahledl truhlu. Ale bude zamcena...',
  'Nekdo te pozoruje z okna. Zkus se podivat nahoru.',
  'Tenhle vylet bude tezky. Seber vsechno co muzes.'
];

// ===================== STATE =====================
const GS = {
  currentRound: 0,
  phase: 'init', // lab_briefing, street_out, shop, street_return, ambush, lab_build
  coins: 40,
  bought: new Set(),
  placed: new Set(),
  inventory: [],
  discoveries: new Set(),
  smokebomb: false,
  piratesDefeated: 0,
  lostItems: [],
  roundBought: new Set()
};

let dialogQueue = [];
let dialogCallback = null;
let dragItem = null;
let dragOffX = 0, dragOffY = 0;
let activeDropZones = [];

// ===================== HELPERS =====================
const $ = id => document.getElementById(id);
const game = $('game');
const bg = $('bg');

function updateHUD() {
  $('coin-count').textContent = GS.coins;
  if ($('debug').style.display !== 'none') {
    $('debug-info').textContent = ` R${GS.currentRound+1} ${GS.phase} inv:[${GS.inventory}]`;
  }
}

function showBg(src) { bg.src = src; }

function floatText(text, x, y) {
  const el = document.createElement('div');
  el.className = 'float-text';
  el.textContent = text;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  $('ui').appendChild(el);
  setTimeout(() => el.remove(), 1300);
}

function showDialog(portrait, name, lines, cb) {
  dialogQueue = Array.isArray(lines) ? [...lines] : [lines];
  dialogCallback = cb || null;
  const d = $('dialog');
  $('dialog-portrait').src = portrait;
  $('dialog-name').textContent = name;
  d.style.display = 'block';
  typeNextLine();
}

let typeTimer = null;
let fullLine = '';
function typeNextLine() {
  if (dialogQueue.length === 0) {
    $('dialog').style.display = 'none';
    if (dialogCallback) { const cb = dialogCallback; dialogCallback = null; cb(); }
    return;
  }
  fullLine = dialogQueue.shift();
  const el = $('dialog-text');
  el.textContent = '';
  let i = 0;
  clearInterval(typeTimer);
  typeTimer = setInterval(() => {
    if (i < fullLine.length) { el.textContent += fullLine[i]; i++; }
    else clearInterval(typeTimer);
  }, 25);
}

function advanceDialog() {
  const el = $('dialog-text');
  if (el.textContent.length < fullLine.length) {
    clearInterval(typeTimer);
    el.textContent = fullLine;
  } else {
    typeNextLine();
  }
}

// ===================== PHASE MACHINE =====================
function startGame() {
  // Check debug mode
  if (location.hash === '#debug') $('debug').style.display = 'block';
  startRound();
}

function startRound() {
  if (GS.currentRound >= 5) { showCompletion(); return; }
  GS.phase = 'lab_briefing';
  GS.roundBought = new Set();
  showBg('img/L1.jpg');
  clearHotspots();
  hideShop();
  hideLab();
  $('phone-btn').style.display = 'none';
  updateHUD();

  const briefing = VOLTA_BRIEFINGS[GS.currentRound];
  const r = GS.currentRound;
  const itemNames = ROUNDS[r].items.map(id => ITEM_DATA[id].name).join(', ');
  showDialog('img/V_point.png', 'Dr. Volta', [briefing, `Potrebujes koupit: ${itemNames}`], () => {
    GS.phase = 'street_out';
    goStreet();
  });
}

function nextPhase() {
  switch (GS.phase) {
    case 'lab_briefing': GS.phase = 'street_out'; goStreet(); break;
    case 'street_out': GS.phase = 'shop'; goShop(); break;
    case 'shop': GS.phase = 'street_return'; goStreetReturn(); break;
    case 'street_return': GS.phase = 'ambush'; startAmbush(); break;
    case 'ambush': GS.phase = 'lab_build'; goLab(); break;
    case 'lab_build': GS.currentRound++; startRound(); break;
  }
}

// ===================== STREET =====================
function goStreet() {
  showBg('img/U.jpg');
  $('phone-btn').style.display = 'block';
  clearHotspots();
  renderHotspots();
  // Always show nav button - it stays even after dialogs
  addStreetNavBtn('Do obchodu >', () => { GS.phase = 'shop'; goShop(); });
  showDialog('img/agent_k.png','Agent K',['Ulice... podivam se, jestli tu neco nenajdu.'],null);
}

function goStreetReturn() {
  showBg('img/U.jpg');
  $('phone-btn').style.display = 'block';
  clearHotspots();
  renderHotspots();

  const pirate = ROUNDS[GS.currentRound].pirate;
  if (GS.currentRound === 0) {
    // Tutorial: Skripek peeks
    setTimeout(() => {
      showDialog('img/skripek.png', 'Skripek', ['*vykukne zpoza rohu*','...a utek!'], () => {
        addStreetNavBtn('Zpet do laboratore', () => { GS.phase = 'lab_build'; goLab(); });
      });
    }, 800);
  } else {
    addStreetNavBtn('Zpet do laboratore', () => {
      GS.phase = 'ambush';
      startAmbush();
    });
  }
}

function clearHotspots() {
  document.querySelectorAll('.hotspot,.street-nav-btn').forEach(el => el.remove());
}

function renderHotspots() {
  const spots = STREET_HOTSPOTS[GS.currentRound];
  if (!spots) return;
  spots.forEach(s => {
    if (GS.discoveries.has(s.id)) return;
    if (s.hidden) return; // revealed by chain
    const btn = document.createElement('button');
    btn.className = 'hotspot' + (s.cls ? ' ' + s.cls : '');
    btn.style.cssText = `left:${s.x}%;top:${s.y}%;width:${s.w}%;height:${s.h}%;`;
    if (!s.cls) btn.style.cursor = 'help';
    btn.onclick = (e) => clickHotspot(s, e, btn);
    $('ui').appendChild(btn);
  });
}

function clickHotspot(s, e, btn) {
  if (GS.discoveries.has(s.id)) return;
  if (s.riddle) {
    openRiddle(s);
    return;
  }
  GS.discoveries.add(s.id);
  btn.remove();
  if (s.coins > 0) {
    GS.coins += s.coins;
    updateHUD();
    const rect = game.getBoundingClientRect();
    floatText('+' + s.coins, e.clientX - rect.left, e.clientY - rect.top);
  }
  showDialog(s.isKeksik ? 'img/keksik.png' : 'img/agent_k.png', s.isKeksik ? 'Keksik' : 'Agent K', [s.msg], () => {
    // Chain discovery?
    if (s.reveals) revealHotspot(s.reveals);
  });
}

function revealHotspot(id) {
  const spots = STREET_HOTSPOTS[GS.currentRound];
  const s = spots.find(h => h.id === id);
  if (!s || GS.discoveries.has(id)) return;
  const btn = document.createElement('button');
  btn.className = 'hotspot glow';
  btn.style.cssText = `left:${s.x}%;top:${s.y}%;width:${s.w}%;height:${s.h}%;`;
  btn.onclick = (e) => clickHotspot(s, e, btn);
  $('ui').appendChild(btn);
}

function openRiddle(s) {
  const r = $('riddle');
  r.style.display = 'flex';
  $('riddle-text').textContent = s.riddle.q;
  $('riddle-input').value = '';
  $('riddle-feedback').textContent = '';
  $('riddle-submit').onclick = () => {
    const ans = $('riddle-input').value.trim().toLowerCase();
    if (ans === s.riddle.a) {

      if (s.riddle.bonusSmoke) GS.smokebomb = true;
      updateHUD();
      $('riddle-feedback').textContent = `Spravne! +${s.riddle.reward} minci!` + (s.riddle.bonusSmoke ? ' +Dymovnice!' : '');
      $('riddle-feedback').style.color = '#4CAF50';
      setTimeout(() => { r.style.display = 'none'; clearHotspots(); renderHotspots(); addStreetNavBtn('Do obchodu >', () => { GS.phase = 'shop'; goShop(); }); }, 1500);
    } else {
      $('riddle-feedback').textContent = 'Spatne... zkus to znovu!';
      $('riddle-feedback').style.color = '#ff5722';
    }
  };
  $('riddle-input').onkeydown = (e) => { if (e.key === 'Enter') $('riddle-submit').click(); };
}

// ===================== SHOP =====================
function goShop() {
  showBg('img/O.jpg');
  $('phone-btn').style.display = 'block';
  clearHotspots();
  const panel = $('shop-panel');
  const grid = $('shop-grid');
  grid.innerHTML = '';
  panel.style.display = 'block';

  const r = ROUNDS[GS.currentRound];
  const itemsToShow = [...r.items, ...GS.lostItems.filter(id => !GS.bought.has(id))];

  itemsToShow.forEach((id, i) => {
    const data = ITEM_DATA[id];
    const cost = r.items.includes(id) ? r.costs[r.items.indexOf(id)] : ITEM_DATA[id]._rebuyPrice || 3;
    const div = document.createElement('div');
    div.className = 'shop-item' + (GS.bought.has(id) ? ' bought' : '');
    div.innerHTML = `<img src="${data.img}" alt="${data.name}"><div class="name">${data.name}</div><div class="price">${cost} minci</div>`;
    div.onclick = () => buyItem(id, cost, div);
    grid.appendChild(div);
  });

  checkShopDone();
}

function buyItem(id, cost, div) {
  if (GS.bought.has(id)) return;
  if (GS.coins < cost) {
    showDialog('img/V_shock.png', 'Prodavac', ['Nemas dost minci! Jdi hledat dal.']);
    return;
  }
  GS.coins -= cost;
  GS.bought.add(id);
  GS.roundBought.add(id);
  GS.inventory.push(id);
  if (GS.lostItems.includes(id)) GS.lostItems = GS.lostItems.filter(x => x !== id);
  div.classList.add('bought');
  updateHUD();
  floatText('-' + cost, 200, 200);
  checkShopDone();
}

function checkShopDone() {
  const r = ROUNDS[GS.currentRound];
  const allBought = r.items.every(id => GS.bought.has(id));
  $('shop-done').style.display = allBought ? 'block' : 'none';
}

function hideShop() {
  $('shop-panel').style.display = 'none';
}

function leaveShop() {
  hideShop();
  GS.phase = 'street_return';
  goStreetReturn();
}

function ambushDodge() {
  $('ambush-title').textContent = 'Skripek: "S-stuj! Dej mi... co to neses?"';
  const area = $('ambush-area');
  const safe = Math.floor(Math.random() * 3);
  let timeLeft = 3;
  $('ambush-timer').textContent = timeLeft;
  const timer = setInterval(() => {
    timeLeft--;
    $('ambush-timer').textContent = timeLeft;
    if (timeLeft <= 0) {
      clearInterval(timer);
      GS.coins = Math.max(0, GS.coins - 2);
      updateHUD();
      endAmbush(false, 'Skripek chytil 2 mince a utekl!', 'skripek.png', 'Skripek');
    }
  }, 1000);

  for (let i = 0; i < 3; i++) {
    const div = document.createElement('div');
    div.className = 'ambush-choice';
    div.textContent = 'Sud ' + (i + 1);
    div.style.fontSize = '1.2em';
    if (i !== safe) div.style.animation = 'shake .3s infinite';
    div.onclick = () => {
      clearInterval(timer);
      if (i === safe) {
        endAmbush(true, 'To neni fer! Ja se te bal PRVNI!', 'skripek.png', 'Skripek');
      } else {
        GS.coins = Math.max(0, GS.coins - 2);
        updateHUD();
        endAmbush(false, 'Skripek chytil 2 mince a utekl!', 'skripek.png', 'Skripek');
      }
    };
    area.appendChild(div);
  }
  // Add shake animation
  const style = document.createElement('style');
  style.textContent = '@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-4px);}75%{transform:translateX(4px);}}';
  area.appendChild(style);
}

// --- MEMORY (Piratka) ---
function ambushMemory() {
  $('ambush-title').textContent = 'Piratka: "Zahrajeme si hru. Vyhras - projdes."';
  $('ambush-timer').textContent = '';
  const area = $('ambush-area');
  $('ambush-msg').textContent = 'Zapamatuj si obrazky...';

  const myItems = [...GS.roundBought];
  const missing = myItems[Math.floor(Math.random() * myItems.length)];
  const shown = myItems.filter(x => x !== missing);
  // Add pirate items
  const pirateImgs = ['skripek','repak'];
  shown.push(...pirateImgs.map(p => '_pirate_' + p));
  // Show phase
  shown.forEach(id => {
    const div = document.createElement('div');
    div.className = 'ambush-choice';
    if (id.startsWith('_pirate_')) {
      div.innerHTML = `<img src="img/${id.replace('_pirate_','')}.png" style="width:60px;height:60px;object-fit:contain;">`;
    } else {
      div.innerHTML = `<img src="${ITEM_DATA[id].img}" style="width:60px;height:60px;object-fit:contain;">`;
    }
    area.appendChild(div);
  });

  setTimeout(() => {
    area.innerHTML = '';
    $('ambush-msg').textContent = 'Ktery z TVYCH predmetu NEBYL zobrazen?';
    // Show 3 options: all myItems
    myItems.forEach(id => {
      const div = document.createElement('div');
      div.className = 'ambush-choice';
      div.innerHTML = `<img src="${ITEM_DATA[id].img}" style="width:50px;height:50px;object-fit:contain;"><br><span style="font-size:.8em">${ITEM_DATA[id].name}</span>`;
      div.onclick = () => {
        area.querySelectorAll('.ambush-choice').forEach(c => c.style.pointerEvents = 'none');
        if (id === missing) {
          GS.coins += 2; updateHUD();
          endAmbush(true, 'Piratka: "Hmm... jsi dobry. +2 mince jako respekt."', 'piratka.png', 'Piratka');
        } else {
          // Lose cheapest unbought item
          const cheapest = myItems.reduce((a, b) => {
            const r = ROUNDS[GS.currentRound];
            const ca = r.costs[r.items.indexOf(a)] || 99;
            const cb = r.costs[r.items.indexOf(b)] || 99;
            return ca < cb ? a : b;
          });
          GS.inventory = GS.inventory.filter(x => x !== cheapest);
          GS.bought.delete(cheapest);

          endAmbush(false, `Piratka vzala ${ITEM_DATA[cheapest].name}! Musis ho znovu koupit.`, 'piratka.png', 'Piratka');
        }
      };
      area.appendChild(div);
    });
  }, 4000);
}

function goLab() {
  showBg('img/L1.jpg');
  $('phone-btn').style.display = 'none';
  clearHotspots();
  hideShop();

  // Show lab items tray
  const tray = $('lab-items');
  tray.innerHTML = '';
  tray.style.display = 'block';
  activeDropZones = [];

  // Remove old drop zones
  document.querySelectorAll('.drop-zone,.placed-item').forEach(el => {
    if (!el.dataset.placed) el.remove();
  });

  // Show items to place this round
  const roundItems = GS.inventory.filter(id => !GS.placed.has(id));
  if (roundItems.length === 0) { finishRound(); return; }

  roundItems.forEach(id => {
    const data = ITEM_DATA[id];
    // Drop zone
    const zone = document.createElement('div');
    zone.className = 'drop-zone';
    zone.style.cssText = `left:${data.zone.x}%;top:${data.zone.y}%;width:${data.zone.w}%;height:${data.zone.h}%;`;
    zone.dataset.itemId = id;
    $('ui').appendChild(zone);
    activeDropZones.push(zone);

    // Tray item
    const el = document.createElement('div');
    el.className = 'lab-item';
    el.dataset.itemId = id;
    el.innerHTML = `<img src="${data.img}" alt="${data.name}">`;
    el.setAttribute('draggable', 'true');
    setupDrag(el, id);
    tray.appendChild(el);
  });

  // Also re-show already placed items
  GS.placed.forEach(id => {
    const data = ITEM_DATA[id];
    if (!document.querySelector(`.placed-item[data-id="${id}"]`)) {
      const pi = document.createElement('div');
      pi.className = 'placed-item';
      pi.dataset.id = id;
      pi.dataset.placed = '1';
      pi.style.cssText = `left:${data.zone.x}%;top:${data.zone.y}%;width:${data.zone.w}%;height:${data.zone.h}%;`;
      pi.innerHTML = `<img src="${data.img}">`;
      $('ui').appendChild(pi);
    }
  });

  showDialog('img/V_point.png', 'Dr. Volta', ['Skvele! Ted umisti predmety na spravna mista. Tahni a pust!']);
}

function setupDrag(el, id) {
  // Mouse
  el.addEventListener('mousedown', e => startDragItem(e, el, id));
  // Touch
  el.addEventListener('touchstart', e => { e.preventDefault(); startDragItem(e.touches[0], el, id); }, {passive:false});
}

function startDragItem(e, el, id) {
  dragItem = {el, id};
  el.classList.add('dragging');
  const clone = el.cloneNode(true);
  clone.id = 'drag-clone';
  clone.style.cssText = 'position:absolute;width:70px;height:70px;z-index:100;pointer-events:none;opacity:.8;';
  clone.style.left = (e.clientX - game.getBoundingClientRect().left - 35) + 'px';
  clone.style.top = (e.clientY - game.getBoundingClientRect().top - 35) + 'px';
  $('ui').appendChild(clone);

  function onMove(ev) {
    const pt = ev.touches ? ev.touches[0] : ev;
    const rect = game.getBoundingClientRect();
    clone.style.left = (pt.clientX - rect.left - 35) + 'px';
    clone.style.top = (pt.clientY - rect.top - 35) + 'px';
    // Highlight zones
    activeDropZones.forEach(z => {
      const zr = z.getBoundingClientRect();
      const inside = pt.clientX >= zr.left && pt.clientX <= zr.right && pt.clientY >= zr.top && pt.clientY <= zr.bottom;
      z.classList.toggle('highlight', inside);
    });
  }

  function onEnd(ev) {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onEnd);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onEnd);
    clone.remove();
    el.classList.remove('dragging');

    const pt = ev.changedTouches ? ev.changedTouches[0] : ev;
    let dropped = null;
    activeDropZones.forEach(z => {
      const zr = z.getBoundingClientRect();
      if (pt.clientX >= zr.left && pt.clientX <= zr.right && pt.clientY >= zr.top && pt.clientY <= zr.bottom) {
        dropped = z;
      }
      z.classList.remove('highlight');
    });

    if (dropped) {
      const targetId = dropped.dataset.itemId;
      if (targetId === id) {
        // Check deps
        const deps = ITEM_DATA[id].deps;
        const depsOk = deps.every(d => GS.placed.has(d));
        if (!depsOk) {
          showDialog('img/V_shock.png', 'Dr. Volta', [ITEM_DATA[id].vFail + ' Nejdriv umisti: ' + deps.map(d => ITEM_DATA[d].name).join(', ')]);
          return;
        }
        placeItem(id, dropped);
      } else {
        showDialog('img/V_shock.png', 'Dr. Volta', [ITEM_DATA[targetId]?.vFail || 'Tohle sem nepatri...']);
      }
    }
    dragItem = null;
  }

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onEnd);
  document.addEventListener('touchmove', onMove, {passive:false});
  document.addEventListener('touchend', onEnd);
}

function placeItem(id, zone) {
  GS.placed.add(id);
  const data = ITEM_DATA[id];

  // Visual
  const pi = document.createElement('div');
  pi.className = 'placed-item';
  pi.dataset.id = id;
  pi.dataset.placed = '1';
  pi.style.cssText = `left:${data.zone.x}%;top:${data.zone.y}%;width:${data.zone.w}%;height:${data.zone.h}%;`;
  pi.innerHTML = `<img src="${data.img}">`;
  $('ui').appendChild(pi);

  // Remove from tray and zones
  zone.remove();
  activeDropZones = activeDropZones.filter(z => z !== zone);
  const trayItem = document.querySelector(`#lab-items .lab-item[data-item-id="${id}"]`);
  if (trayItem) trayItem.remove();

  // Success dialog
  showDialog('img/V_happy.png', 'Dr. Volta', [data.vOk], () => {
    // Check if all done this round
    const remaining = GS.inventory.filter(i => !GS.placed.has(i));
    if (remaining.length === 0 || activeDropZones.length === 0) {
      finishRound();
    }
  });
}

function finishRound() {
  $('lab-items').style.display = 'none';
  document.querySelectorAll('.drop-zone').forEach(z => z.remove());
  GS.currentRound++;

  if (GS.currentRound >= 5) {
    showCompletion();
  } else {
    showDialog('img/V_happy.png', 'Dr. Volta', ['Vyborne! Jdeme na dalsi kolo.'], () => {
      startRound();
    });
  }
}
