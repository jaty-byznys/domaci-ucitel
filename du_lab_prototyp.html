<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Domaci Ucitel - Laborator Dr. Volty</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Fredoka',sans-serif; background:#1a1a2e; color:#eee; overflow:hidden; height:100vh; user-select:none; -webkit-user-select:none; }
.screen { display:none; width:100vw; height:100vh; position:absolute; top:0; left:0; flex-direction:column; }
.screen.active { display:flex; }
.coin-display { display:flex; align-items:center; gap:6px; font-size:18px; font-weight:700; color:#ffd700; }
.coin-icon { width:24px; height:24px; object-fit:contain; }
#shopScreen { background-size:cover; background-position:center; }
.shop-header { padding:10px 16px; display:flex; justify-content:space-between; align-items:center; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px); z-index:10; }
.shop-header h2 { font-size:20px; color:#ffd700; text-shadow:1px 1px 3px #000; }
.shop-grid { flex:1; display:grid; grid-template-columns:repeat(5,1fr); gap:8px; padding:12px; overflow-y:auto; align-content:start; }
.shop-item { background:rgba(255,248,220,0.92); border-radius:10px; padding:8px; text-align:center; cursor:pointer; border:3px solid #6b4423; transition:all 0.2s; position:relative; }
.shop-item:hover { transform:scale(1.05); box-shadow:0 4px 15px rgba(255,215,0,0.3); }
.shop-item.bought { opacity:0.35; cursor:default; border-color:#555; }
.shop-item.bought::after { content:"\2713"; position:absolute; top:3px; right:6px; font-size:18px; color:#2d8a4e; font-weight:900; }
.shop-item.locked { opacity:0.5; cursor:not-allowed; }
.shop-item img.item-img { width:70px; height:70px; object-fit:contain; }
.shop-item .item-name { font-size:11px; font-weight:600; color:#333; margin-top:3px; line-height:1.2; }
.shop-item .item-price { display:flex; align-items:center; justify-content:center; gap:3px; font-size:13px; font-weight:700; color:#8B6914; margin-top:2px; }
.shop-item .item-price img { width:16px; height:16px; }
.shop-footer { padding:8px 16px; background:rgba(0,0,0,0.8); display:flex; justify-content:space-between; align-items:center; }
.btn { padding:8px 20px; border:none; border-radius:8px; font-family:inherit; font-size:15px; font-weight:700; cursor:pointer; transition:all 0.2s; }
.btn-build { background:linear-gradient(135deg,#2d8a4e,#1a6b35); color:white; }
.btn-build:hover { transform:scale(1.05); }
.btn-build:disabled { background:#444; cursor:default; transform:none; }
.lab-header { padding:8px 16px; display:flex; justify-content:space-between; align-items:center; background:rgba(0,0,0,0.75); z-index:10; }
.lab-header h2 { font-size:18px; color:#7ec8e3; text-shadow:1px 1px 3px #000; }
.lab-area { flex:1; position:relative; background-size:cover; background-position:center; overflow:hidden; }
.drop-zone { position:absolute; border:2px dashed rgba(255,255,255,0.2); border-radius:6px; transition:all 0.3s; }
.drop-zone.highlight { border-color:#ffd700; background:rgba(255,215,0,0.12); box-shadow:0 0 12px rgba(255,215,0,0.25); }
.placed-item { position:absolute; pointer-events:none; }
.placed-item.plop { animation:plop 0.4s ease-out; }
@keyframes plop { 0%{transform:scale(1.5)} 50%{transform:scale(0.85)} 100%{transform:scale(1)} }
.ground-item { position:absolute; animation:wobble 0.5s ease-out; filter:drop-shadow(2px 4px 3px rgba(0,0,0,0.5)); }
@keyframes wobble { 0%{transform:rotate(0)} 25%{transform:rotate(-15deg)} 50%{transform:rotate(10deg)} 75%{transform:rotate(-5deg)} 100%{transform:rotate(0)} }
.inventory-bar { display:flex; gap:6px; padding:8px 12px; background:rgba(0,0,0,0.85); overflow-x:auto; min-height:90px; align-items:center; }
.inv-item { width:72px; height:72px; background:rgba(255,248,220,0.9); border-radius:8px; border:2px solid #6b4423; display:flex; align-items:center; justify-content:center; cursor:grab; flex-shrink:0; transition:all 0.2s; }
.inv-item:active { cursor:grabbing; }
.inv-item.dragging { opacity:0.4; transform:scale(0.85); }
.inv-item img { width:58px; height:58px; object-fit:contain; pointer-events:none; }
.volta-dialog { position:absolute; bottom:100px; left:50%; transform:translateX(-50%); display:flex; align-items:flex-end; gap:8px; z-index:20; pointer-events:none; max-width:85%; }
.volta-dialog.hidden { display:none; }
.volta-dialog img { width:80px; object-fit:contain; filter:drop-shadow(2px 3px 4px rgba(0,0,0,0.5)); }
.volta-bubble { background:rgba(255,248,220,0.95); color:#333; padding:10px 14px; border-radius:10px; border:2px solid #6b4423; font-size:13px; max-width:320px; box-shadow:2px 4px 8px rgba(0,0,0,0.3); }
#completeScreen { align-items:center; justify-content:center; background-size:cover; background-position:center; }
#completeScreen::before { content:""; position:absolute; inset:0; background:rgba(0,0,0,0.35); }
.complete-content { position:relative; z-index:1; text-align:center; }
.complete-content h1 { font-size:32px; color:#ffd700; text-shadow:2px 2px 8px #000; margin-bottom:16px; }
.complete-content p { font-size:16px; margin-bottom:24px; text-shadow:1px 1px 4px #000; }
.debug-bar { position:fixed; top:4px; right:4px; z-index:999; display:flex; gap:4px; }
.debug-bar button { padding:3px 8px; background:#222; color:#ffd700; border:1px solid #444; border-radius:3px; font-size:10px; cursor:pointer; font-family:inherit; }
.video-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:500; display:flex; align-items:center; justify-content:center; flex-direction:column; }
.video-overlay.hidden { display:none; }
.video-overlay video { max-width:90vw; max-height:75vh; border-radius:12px; border:3px solid #ffd700; }
.video-overlay .btn-skip { margin-top:16px; background:#6b4423; color:#ffd700; padding:8px 24px; border:none; border-radius:8px; font-family:inherit; font-size:14px; font-weight:700; cursor:pointer; }
.guide-selector { position:absolute; top:8px; left:8px; z-index:30; display:flex; gap:4px; }
.guide-btn { width:40px; height:40px; border-radius:50%; border:2px solid #555; cursor:pointer; object-fit:cover; transition:all 0.2s; background:#222; padding:2px; }
.guide-btn.active { border-color:#ffd700; box-shadow:0 0 8px rgba(255,215,0,0.5); }
.guide-btn:hover { transform:scale(1.1); }
.pirate-encounter { position:absolute; inset:0; background:rgba(0,0,0,0.85); z-index:40; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:16px; }
.pirate-encounter.hidden { display:none; }
.pirate-encounter img { width:120px; filter:drop-shadow(0 4px 12px rgba(0,0,0,0.7)); }
.pirate-encounter .pirate-text { background:rgba(255,248,220,0.95); color:#333; padding:14px 20px; border-radius:12px; border:3px solid #8b0000; font-size:15px; max-width:80%; text-align:center; }
.pirate-encounter .btn-pirate { background:linear-gradient(135deg,#8b0000,#cc0000); color:white; padding:10px 24px; border:none; border-radius:8px; font-family:inherit; font-size:14px; font-weight:700; cursor:pointer; }
@media (max-width:768px) { .shop-grid { grid-template-columns:repeat(3,1fr); gap:6px; padding:8px; } .shop-item img.item-img { width:55px; height:55px; } }
</style>
</head>
<body>
<div class="debug-bar"><button onclick="addCoins(50)">M +50</button><button onclick="resetGame()">R Reset</button><button onclick="playVideo('ulice')">V1</button><button onclick="playVideo('prodej')">V2</button><button onclick="playVideo('lab')">V3</button></div>
<div class="video-overlay hidden" id="videoOverlay"><video id="videoPlayer" controls></video><button class="btn-skip" onclick="closeVideo()">Preskocit / Zavrit</button></div>
<div id="shopScreen" class="screen active">
  <div class="shop-header"><h2>Vyzkumne pomucky</h2><div style="display:flex;align-items:center;gap:12px;"><div class="coin-display"><img class="coin-icon" id="coinIconShop" src="" alt=""><span id="shopCoins">40</span></div><select id="guideSelect" onchange="switchGuide(this.value)" style="background:#333;color:#ffd700;border:1px solid #555;border-radius:6px;padding:4px 8px;font-family:inherit;font-size:12px;font-weight:600;"><option value="volta">Dr. Volta</option><option value="agent_k">Agent K</option><option value="skripek">Skripek</option><option value="repak">Repak</option><option value="keksik">Keksik</option><option value="piratka">Piratka</option><option value="krivak">Krivak</option></select></div></div>
  <div class="shop-grid" id="shopGrid"></div>
  <div class="shop-footer"><span style="color:#aaa;font-size:12px" id="boughtCount">Koupeno: 0/15</span><button class="btn btn-build" id="btnBuild" onclick="goToLab()">Jit stavet!</button></div>
</div>
<div id="labScreen" class="screen">
  <div class="lab-header"><h2>Laborator Dr. Volty</h2><div style="display:flex;gap:12px;align-items:center"><div class="coin-display"><img class="coin-icon" id="coinIconLab" src="" alt=""><span id="labCoins">40</span></div><button class="btn" style="background:#6b4423;color:white;font-size:12px;padding:5px 12px" onclick="goToShop()">Obchod</button></div></div>
  <div class="lab-area" id="labArea"><div class="volta-dialog hidden" id="voltaDialog"><img id="voltaImg" src="" alt="Volta"><div class="volta-bubble" id="voltaText"></div></div><div class="guide-selector" id="guideSelector"></div><div class="pirate-encounter hidden" id="pirateEncounter"><img id="pirateImg" src=""><div class="pirate-text" id="pirateText"></div><button class="btn-pirate" onclick="dismissPirate()">Utect!</button></div></div>
  <div class="inventory-bar" id="inventoryBar"></div>
</div>
<div id="completeScreen" class="screen"><div class="complete-content"><h1>Laborator opravena!</h1><p>Dr. Volta je nadseny! Mise 1 splnena.</p><button class="btn btn-build" onclick="resetGame()" style="font-size:18px;padding:12px 28px">Hrat znovu</button></div></div>
<script>
var IMG = 'img/';
var ASSETS = {
  L1: IMG+'L1.jpg', L2: IMG+'L2.jpg', U: IMG+'U.jpg', O: IMG+'O.jpg',
  A1: IMG+'A1.png', A2: IMG+'A2.png', A3: IMG+'A3.png', A4: IMG+'A4.png',
  A5: IMG+'A5.png', A6: IMG+'A6.png', A7: IMG+'A7.png', A8: IMG+'A8.png',
  A9: IMG+'A9.png', A10: IMG+'A10.png', A11: IMG+'A11.png', A12: IMG+'A12.png',
  A13: IMG+'A13.png', A14: IMG+'A14.png', A15: IMG+'A15.png',
  V_point: IMG+'V_point.png', V_shock: IMG+'V_shock.png',
  V_happy: IMG+'V_happy.png', V_worried: IMG+'V_worried.png',
  C23: IMG+'C23.png', C24: IMG+'C24.png', C25: IMG+'C25.png', C26: IMG+'C26.png',
  volta: IMG+'volta.png', agent_k: IMG+'agent_k.png',
  skripek: IMG+'skripek.png', repak: IMG+'repak.png',
  keksik: IMG+'keksik.png', piratka: IMG+'piratka.png', krivak: IMG+'krivak.png'
};
var VIDEOS = {
  ulice: 'https://ydzlvkgrjkytalgcnsie.supabase.co/storage/v1/object/public/media/minihra1-ulice.mp4',
  prodej: 'https://ydzlvkgrjkytalgcnsie.supabase.co/storage/v1/object/public/media/minihra2-prodej.mp4',
  lab: 'https://ydzlvkgrjkytalgcnsie.supabase.co/storage/v1/object/public/media/minihra13-lab.mp4'
};
var GUIDES = {
  volta:   { name:'Dr. Volta', img:ASSETS.volta, pose:{point:ASSETS.V_point,shock:ASSETS.V_shock,happy:ASSETS.V_happy,worried:ASSETS.V_worried}, isPirate:false },
  agent_k: { name:'Agent K',   img:ASSETS.agent_k, pose:null, isPirate:false },
  skripek: { name:'Skripek',   img:ASSETS.skripek, pose:null, isPirate:false },
  repak:   { name:'Repak',     img:ASSETS.repak,   pose:null, isPirate:false },
  keksik:  { name:'Keksik',    img:ASSETS.keksik,  pose:null, isPirate:false },
  piratka: { name:'Piratka',   img:ASSETS.piratka, pose:null, isPirate:true },
  krivak:  { name:'Krivak',    img:ASSETS.krivak,  pose:null, isPirate:true }
};
var currentGuide = 'volta';
var PIRATE_EVENTS = [
  {who:'piratka',text:'Ahoj! Piratka ti sebere 3 mince!',coins:-3},
  {who:'piratka',text:'Piratka nasla poklad! +5 minci!',coins:5},
  {who:'krivak',text:'Krivak se pokusil ukrast zkumavky...',coins:-2},
  {who:'krivak',text:'Krivak nasel starou mapu! +4 mince!',coins:4},
  {who:'piratka',text:'Piratka: Pekna laborator... skoda ze neni na lodi.',coins:0},
  {who:'krivak',text:'Krivak se leka vlastniho stinu. -1 mince.',coins:-1}
];
var ITEMS = [
  { id:'A1', name:'Pracovni stul', price:5, img:ASSETS.A1, zone:{x:25,y:55,w:35,h:25}, deps:[],
    vOk:'Vyborne! Stul je zaklad.', vFail:null },
  { id:'A2', name:'Stolicka', price:2, img:ASSETS.A2, zone:{x:45,y:70,w:10,h:15}, deps:['A1'],
    vOk:'Sednout a premyslet. Dobra strategie!', vFail:'Sednout? Kam? Nejdriv stul.' },
  { id:'A3', name:'Policka', price:3, img:ASSETS.A3, zone:{x:70,y:25,w:25,h:12}, deps:[],
    vOk:'Policka na zdi. Konecne kam dat chemikalie.', vFail:null },
  { id:'A12', name:'Stolni lampa', price:3, img:ASSETS.A12, zone:{x:12,y:42,w:10,h:18}, deps:['A1'],
    vOk:'At je videt na praci!', vFail:'Lampa bez stolu? Svitit na podlahu?' },
  { id:'A5', name:'Mikroskop', price:8, img:ASSETS.A5, zone:{x:30,y:42,w:10,h:18}, deps:['A1'],
    vOk:'Mikroskop! Ted uvidime i to, co neexistuje!', vFail:'Mikroskop na podlahu? Pasteur by plakal.' },
  { id:'A6', name:'Kahan', price:4, img:ASSETS.A6, zone:{x:42,y:45,w:8,h:15}, deps:['A1'],
    vOk:'Ohen! Zdroj vsech dobrych i spatnych napadu.', vFail:'Kahan na holou zem? Chces pozar?' },
  { id:'A7', name:'Vahy', price:6, img:ASSETS.A7, zone:{x:52,y:45,w:12,h:15}, deps:['A1'],
    vOk:'Presnost je zaklad vedy. A vareni.', vFail:'Vahy potrebuji rovnou plochu. Stul!' },
  { id:'A4', name:'Zkumavky', price:4, img:ASSETS.A4, zone:{x:22,y:42,w:10,h:15}, deps:['A1'],
    vOk:'Zkumavky! Konecne budu michat veci!', vFail:'Zkumavky bez stolu spadnou.' },
  { id:'A11', name:'Banky a kolby', price:5, img:ASSETS.A11, zone:{x:38,y:42,w:10,h:15}, deps:['A1'],
    vOk:'Erlenmeyerky! To zni jako kouzlo.', vFail:'Sklo na zem? Optimista.' },
  { id:'A15', name:'Chemikalie', price:7, img:ASSETS.A15, zone:{x:72,y:32,w:20,h:15}, deps:['A3'],
    vOk:'Lahvicky na policce. Jako v lekarne.', vFail:'Chemikalie musi na policku!' },
  { id:'A13', name:'Knihy', price:3, img:ASSETS.A13, zone:{x:5,y:48,w:12,h:15}, deps:['A1'],
    vOk:'Vedeni! Nejnebezpecnejsi zbran.', vFail:'Knihy patri na stul nebo vedle nej.' },
  { id:'A8', name:'Periodicka tabulka', price:3, img:ASSETS.A8, zone:{x:55,y:15,w:18,h:18}, deps:[],
    vOk:'Mendelejev by plakal stestim!', vFail:null },
  { id:'A9', name:'Bezpecnostni tabule', price:2, img:ASSETS.A9, zone:{x:35,y:12,w:15,h:18}, deps:[],
    vOk:'Bezpecnost! To rikam nez neco vybuchne.', vFail:null },
  { id:'A10', name:'Elektricky obvod', price:3, img:ASSETS.A10, zone:{x:2,y:12,w:16,h:18}, deps:[],
    vOk:'Schema obvodu na zdi. Profesionalni!', vFail:null },
  { id:'A14', name:'Laboratorni plast', price:2, img:ASSETS.A14, zone:{x:88,y:20,w:8,h:22}, deps:[],
    vOk:'Plast! Ted jsem opravdovy vedec.', vFail:null },
];

var coins=40, bought=new Set(), placed=new Set(), inventory=[], dragItem=null, dragClone=null, voltaTimeout=null, pirateChance=0;

function playVideo(key) {
  var url=VIDEOS[key]; if(!url) return;
  var o=document.getElementById('videoOverlay'), p=document.getElementById('videoPlayer');
  p.src=url; o.classList.remove('hidden'); p.play().catch(function(){});
}
function closeVideo() {
  var o=document.getElementById('videoOverlay'), p=document.getElementById('videoPlayer');
  p.pause(); p.src=''; o.classList.add('hidden');
}
function switchGuide(k) {
  if(!GUIDES[k]) return; currentGuide=k;
  document.getElementById('guideSelect').value=k; renderGuideSelector();
  var g=GUIDES[k];
  if(g.isPirate) showGuideMessage(g.img, g.name+' je tvuj pruvodce! Pozor na piraty...');
  else showGuideMessage(g.img, g.name+' te provazi laboratori!');
}
function renderGuideSelector() {
  var c=document.getElementById('guideSelector'); c.innerHTML='';
  Object.keys(GUIDES).forEach(function(k){
    var g=GUIDES[k], img=document.createElement('img');
    img.className='guide-btn'+(k===currentGuide?' active':'');
    img.src=g.img; img.alt=g.name; img.title=g.name;
    img.onclick=function(){switchGuide(k);}; c.appendChild(img);
  });
}
function showGuideMessage(src,txt) {
  var d=document.getElementById('voltaDialog');
  document.getElementById('voltaImg').src=src;
  document.getElementById('voltaText').textContent=txt;
  d.classList.remove('hidden');
  if(voltaTimeout) clearTimeout(voltaTimeout);
  voltaTimeout=setTimeout(function(){d.classList.add('hidden');},4000);
}
function maybePirateEncounter() {
  var g=GUIDES[currentGuide]; if(!g||!g.isPirate) return;
  pirateChance+=0.25; if(Math.random()>pirateChance) return; pirateChance=0;
  var ev=PIRATE_EVENTS[Math.floor(Math.random()*PIRATE_EVENTS.length)];
  document.getElementById('pirateImg').src=ASSETS[ev.who];
  document.getElementById('pirateText').textContent=ev.text;
  document.getElementById('pirateEncounter').classList.remove('hidden');
  if(ev.coins!==0) addCoins(ev.coins);
}
function dismissPirate(){document.getElementById('pirateEncounter').classList.add('hidden');}

function renderShop() {
  var grid=document.getElementById('shopGrid'); grid.innerHTML='';
  ITEMS.forEach(function(item){
    var div=document.createElement('div');
    div.className='shop-item'+(bought.has(item.id)?' bought':'')+(item.price>coins&&!bought.has(item.id)?' locked':'');
    var ph=bought.has(item.id)?'<span style="color:#2d8a4e;font-weight:900">Koupeno</span>':'<img src="'+ASSETS.C23+'" style="width:16px;height:16px"> '+item.price;
    div.innerHTML='<img class="item-img" src="'+item.img+'" alt="'+item.name+'"><div class="item-name">'+item.name+'</div><div class="item-price">'+ph+'</div>';
    if(!bought.has(item.id)&&item.price<=coins) div.onclick=function(){buyItem(item);};
    grid.appendChild(div);
  });
  document.getElementById('shopCoins').textContent=coins;
  document.getElementById('boughtCount').textContent='Koupeno: '+bought.size+'/15';
  document.getElementById('btnBuild').disabled=bought.size===0&&inventory.length===0;
}
function buyItem(item) {
  if(bought.has(item.id)||item.price>coins) return;
  coins-=item.price; bought.add(item.id); inventory.push(item.id); renderShop();
}
function goToLab() {
  document.getElementById('shopScreen').classList.remove('active');
  document.getElementById('labScreen').classList.add('active');
  document.getElementById('labArea').style.backgroundImage='url('+ASSETS.L1+')';
  renderLab(); renderInventory(); renderGuideSelector();
  document.getElementById('labCoins').textContent=coins;
  if(inventory.length>0&&placed.size===0) showVolta('V_point','Vitej v me znicene laboratori! Poloz veci tam, kam patri.');
}
function goToShop() {
  document.getElementById('labScreen').classList.remove('active');
  document.getElementById('shopScreen').classList.add('active'); renderShop();
}
function renderLab() {
  var la=document.getElementById('labArea');
  la.querySelectorAll('.drop-zone,.placed-item,.ground-item').forEach(function(el){el.remove();});
  ITEMS.forEach(function(item){
    if(placed.has(item.id)){
      var img=document.createElement('img'); img.className='placed-item'; img.src=item.img;
      img.style.left=item.zone.x+'%'; img.style.top=item.zone.y+'%';
      img.style.width=item.zone.w+'%'; img.style.height='auto';
      img.style.maxHeight=item.zone.h+'%'; img.style.objectFit='contain';
      la.appendChild(img);
    } else if(inventory.includes(item.id)){
      var z=document.createElement('div'); z.className='drop-zone'; z.dataset.itemId=item.id;
      z.style.left=item.zone.x+'%'; z.style.top=item.zone.y+'%';
      z.style.width=item.zone.w+'%'; z.style.height=item.zone.h+'%';
      la.appendChild(z);
    }
  });
}
function renderInventory() {
  var bar=document.getElementById('inventoryBar'); bar.innerHTML='';
  inventory.filter(function(id){return !placed.has(id);}).forEach(function(id){
    var item=ITEMS.find(function(i){return i.id===id;});
    var div=document.createElement('div'); div.className='inv-item'; div.dataset.itemId=id;
    div.innerHTML='<img src="'+item.img+'" alt="'+item.name+'">';
    div.addEventListener('touchstart',function(e){e.preventDefault();startDrag(e.touches[0].clientX,e.touches[0].clientY,id);},{passive:false});
    div.addEventListener('mousedown',function(e){e.preventDefault();startDrag(e.clientX,e.clientY,id);});
    bar.appendChild(div);
  });
}

function startDrag(cx,cy,itemId) {
  dragItem=itemId; var item=ITEMS.find(function(i){return i.id===itemId;});
  dragClone=document.createElement('img'); dragClone.src=item.img;
  dragClone.style.cssText='position:fixed;width:80px;height:80px;object-fit:contain;pointer-events:none;z-index:100;opacity:0.85;filter:drop-shadow(3px 5px 5px rgba(0,0,0,0.5))';
  document.body.appendChild(dragClone); moveDrag(cx,cy);
  var el=document.querySelector('.inv-item[data-item-id="'+itemId+'"]');
  if(el) el.classList.add('dragging');
  highlightZones(itemId);
  document.addEventListener('mousemove',onMM); document.addEventListener('mouseup',onMU);
  document.addEventListener('touchmove',onTM,{passive:false}); document.addEventListener('touchend',onTE);
}
function moveDrag(cx,cy){if(dragClone){dragClone.style.left=(cx-40)+'px';dragClone.style.top=(cy-40)+'px';}}
function onMM(e){moveDrag(e.clientX,e.clientY);}
function onTM(e){e.preventDefault();moveDrag(e.touches[0].clientX,e.touches[0].clientY);}
function endDrag(cx,cy) {
  document.removeEventListener('mousemove',onMM); document.removeEventListener('mouseup',onMU);
  document.removeEventListener('touchmove',onTM); document.removeEventListener('touchend',onTE);
  if(dragClone){dragClone.remove();dragClone=null;}
  var el=document.querySelector('.inv-item.dragging'); if(el) el.classList.remove('dragging');
  clearHighlights(); if(!dragItem) return;
  var la=document.getElementById('labArea'), rect=la.getBoundingClientRect();
  var x=((cx-rect.left)/rect.width)*100, y=((cy-rect.top)/rect.height)*100;
  tryPlace(dragItem,x,y); dragItem=null;
}
function onMU(e){endDrag(e.clientX,e.clientY);}
function onTE(e){endDrag(e.changedTouches[0].clientX,e.changedTouches[0].clientY);}
function highlightZones(id){document.querySelectorAll('.drop-zone').forEach(function(z){if(z.dataset.itemId===id)z.classList.add('highlight');});}
function clearHighlights(){document.querySelectorAll('.drop-zone.highlight').forEach(function(z){z.classList.remove('highlight');});}

function tryPlace(itemId,dropX,dropY) {
  var item=ITEMS.find(function(i){return i.id===itemId;}); if(!item) return;
  var z=item.zone;
  var inZone=dropX>=z.x-5&&dropX<=z.x+z.w+5&&dropY>=z.y-5&&dropY<=z.y+z.h+5;
  if(!inZone) return;
  var depsOk=item.deps.every(function(d){return placed.has(d);});
  if(!depsOk){ showVolta('V_shock',item.vFail||'Tohle jeste ne. Nejdriv neco jineho.'); showGroundItem(item,dropX,dropY); return; }
  placed.add(itemId); showVolta('V_happy',item.vOk);
  renderLab(); renderInventory();
  var els=document.querySelectorAll('.placed-item'); if(els.length) els[els.length-1].classList.add('plop');
  maybePirateEncounter();
  if(placed.size===ITEMS.length) setTimeout(showComplete,2000);
}
function showGroundItem(item,x,y) {
  var la=document.getElementById('labArea'), img=document.createElement('img');
  img.className='ground-item'; img.src=item.img;
  img.style.left=(x-5)+'%'; img.style.bottom='5%'; img.style.width='8%'; img.style.objectFit='contain';
  la.appendChild(img); setTimeout(function(){img.remove();},2000);
}
function showVolta(pose,text) {
  var g=GUIDES[currentGuide], src;
  if(g&&g.pose&&g.pose[pose.replace('V_','')]) src=g.pose[pose.replace('V_','')];
  else if(g) src=g.img;
  else src=ASSETS.V_point;
  showGuideMessage(src,text);
}
function showComplete() {
  document.getElementById('labScreen').classList.remove('active');
  var cs=document.getElementById('completeScreen');
  cs.style.backgroundImage='url('+ASSETS.L2+')'; cs.classList.add('active');
  playVideo('lab');
}
function addCoins(n){coins+=n;if(coins<0)coins=0;document.getElementById('shopCoins').textContent=coins;document.getElementById('labCoins').textContent=coins;renderShop();}
function resetGame() {
  coins=40; bought.clear(); placed.clear(); inventory=[]; pirateChance=0;
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById('shopScreen').classList.add('active');
  document.getElementById('pirateEncounter').classList.add('hidden');
  renderShop();
}

document.getElementById('coinIconShop').src=ASSETS.C23;
document.getElementById('coinIconLab').src=ASSETS.C23;

playVideo('ulice');
document.addEventListener('keydown',function(e){if(e.key==='m'||e.key==='M')addCoins(50);if(e.key==='r'||e.key==='R')resetGame();});
</script>
