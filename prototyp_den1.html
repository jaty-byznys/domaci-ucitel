<!DOCTYPE html>
<html lang="cs"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Domácí Učitel — Den 1</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Nunito',sans-serif;background:#000;color:#fff;user-select:none}
#game{width:100vw;height:100vh;position:relative;overflow:hidden}
#bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:background-image .5s;z-index:0}
#bg::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.7) 0%,transparent 40%,transparent 70%,rgba(0,0,0,.4) 100%);z-index:1}
#ui{position:relative;z-index:10;height:100%;display:flex;flex-direction:column}
#topbar{padding:10px 16px;display:flex;align-items:center;gap:10px;background:rgba(0,0,0,.5);backdrop-filter:blur(8px)}
#round-label{font-size:14px;font-weight:700;flex:1}
#stars-count{font-size:14px;font-weight:700;color:#f59e0b}
#q-progress{font-size:13px;color:#aaa}
#dialog-area{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;padding:8px 16px;overflow-y:auto}
.bubble{width:50%;min-width:280px;padding:10px 14px;border-radius:14px;margin-bottom:4px;animation:pop .25s ease-out;align-self:center}
.bubble .name{font-size:12px;font-weight:700;margin-bottom:2px}
.bubble .text{font-size:15px;line-height:1.45}
.b-volta{background:rgba(26,39,68,.92);border:1.5px solid #3b6cf5}
.b-volta .name{color:#8bb4ff}
.b-volta .text{color:#d0dfff}
.b-agent{background:rgba(21,46,31,.92);border:1.5px solid #22c55e}
.b-agent .name{color:#6ee7a0}
.b-agent .text{color:#d1fae5}
.b-pirat{background:rgba(45,18,25,.92);border:1.5px solid #e11d48}
.b-pirat .name{color:#fb7185}
.b-pirat .text{color:#fecdd3}
.b-popis{background:rgba(26,26,34,.85);border:1px solid #555}
.b-popis .text{color:#aaa;font-style:italic;font-size:14px}
#answer-area{padding:8px 16px 16px;background:rgba(0,0,0,.6);backdrop-filter:blur(8px)}
#question-text{font-size:16px;font-weight:700;margin-bottom:10px;line-height:1.4;min-height:24px}
#options{display:flex;flex-direction:column;gap:7px}
.opt-btn{width:100%;padding:12px 16px;border-radius:12px;border:1.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#fff;font-size:15px;font-weight:600;text-align:left;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s;display:flex;align-items:center;gap:10px}
.opt-btn:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.25)}
.opt-btn:active{transform:scale(.98)}
.opt-btn.correct{background:rgba(34,197,94,.2);border-color:#22c55e;color:#6ee7a0}
.opt-btn.wrong{background:rgba(239,68,68,.2);border-color:#ef4444;color:#fca5a5}
.opt-btn.disabled{pointer-events:none;opacity:.4}
.opt-letter{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;background:rgba(255,255,255,.08);color:#999;flex-shrink:0}
#continue-btn{display:none;width:100%;padding:14px;border-radius:12px;border:none;background:#f59e0b;color:#000;font-size:15px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;margin-top:8px}
#continue-btn:hover{filter:brightness(1.1)}
.star-fly{position:fixed;font-size:28px;z-index:999;animation:starUp .8s ease-out forwards;pointer-events:none}
@keyframes starUp{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.5)}}
#collect{display:none;position:absolute;inset:0;z-index:50;background:rgba(0,0,0,.8);align-items:center;justify-content:center}
#collect-card{background:rgba(20,20,40,.95);border:2px solid #f59e0b;border-radius:20px;padding:24px;text-align:center;max-width:300px;animation:pop .3s ease-out}
.c-icon{font-size:48px;margin-bottom:8px}
.c-title{font-size:17px;font-weight:800;color:#fbbf24}
.c-desc{font-size:14px;color:#ccc;margin-top:4px}
.c-btn{margin-top:16px;padding:12px 28px;border-radius:12px;border:none;background:#f59e0b;color:#000;font-size:15px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif}
#summary{display:none;position:absolute;inset:0;z-index:60;background:rgba(0,0,0,.85);align-items:center;justify-content:center}
#summary-card{background:rgba(20,20,40,.95);border:2px solid #3b6cf5;border-radius:20px;padding:28px;text-align:center;max-width:340px}
#video-box{display:none;position:absolute;inset:0;z-index:100;background:#000;align-items:center;justify-content:center}
#video-box video{max-width:100%;max-height:100%}
#skip-btn{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:8px 18px;border-radius:16px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700}
@keyframes pop{from{opacity:0;transform:scale(.9) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
</style></head>
<body>
<div id="game">
<div id="bg"></div>
<div id="ui">
<div id="topbar"><button id="back-btn" onclick="goBack()" style="background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;padding:6px 14px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;margin-right:8px;">← Zpet</button><div id="round-label"></div><div id="stars-count"></div><div id="q-progress"></div></div>
<div id="dialog-area"></div>
<div id="answer-area"><div id="question-text"></div><div id="options"></div><button id="continue-btn"></button></div>
</div>
<div id="collect"><div id="collect-card"><div class="c-icon"></div><div class="c-title"></div><div class="c-desc"></div><button class="c-btn" onclick="closeCollect()">Sebrat!</button></div></div>
<div id="summary"><div id="summary-card"></div></div>
<div id="video-box"><video id="vid" playsinline muted autoplay></video><button id="skip-btn" onclick="skipVideo()">Přeskočit</button></div>
</div>
<script>
var GH=''; // local files
var IMG={intro:'img/m01/d01/D1S1.png',intro2:'img/m01/d01/D1S2.png',quiz:'img/m01/d01/D1S1-quiz.png',lab:'img/m01/d01/D1S2.png',skripek:'img/m01/d01/D1S3.png',repak:'img/m01/d01/D1S4.png',keksik:'img/m01/d01/D1S5.png',zaver:'img/m01/d01/D1S6.png'};
var VID={intro0:'video/m01/d01/D1-S0.mp4',intro:'video/m01/d01/D1-S1.mp4',skripek:'video/m01/d01/D1-S3.mp4',repak:'video/m01/d01/D1-S4.mp4',keksik:'video/m01/d01/D1-S5.mp4',zaver:'video/m01/d01/D1-S6.mp4'};
var NAMES={volta:'Dr. Volta',agent:'Agent K',skripek:'Skřípek',repak:'Řepák',keksik:'Keksík',krivak:'Krivák'};
var BCLS={volta:'b-volta',agent:'b-agent',skripek:'b-pirat',repak:'b-pirat',keksik:'b-pirat',krivak:'b-pirat',popis:'b-popis'};
var SIDES={volta:'left',agent:'right',skripek:'left',repak:'left',keksik:'left',krivak:'left',popis:'left'};
var RICOS=['📖','🔢','🇬🇧','🌀'],RNAMES=['Čeština','Matika','Angličtina','Chaos'];
var data,stars=0,totalQ=0,correctFirst=0,collected=[];
var $bg=document.getElementById('bg'),$dlg=document.getElementById('dialog-area'),$qt=document.getElementById('question-text'),$opts=document.getElementById('options'),$cont=document.getElementById('continue-btn'),$rl=document.getElementById('round-label'),$sc=document.getElementById('stars-count'),$qp=document.getElementById('q-progress'),$ans=document.getElementById('answer-area');

// Navigation - jump to any section
var skipResolve=null;
function goBack(){
  // Show navigation panel
  var nav=document.getElementById('nav-panel');
  if(nav){nav.style.display=nav.style.display==='flex'?'none':'flex';return;}
  // Create nav panel
  nav=document.createElement('div');
  nav.id='nav-panel';
  nav.style.cssText='position:absolute;inset:0;z-index:200;background:rgba(0,0,0,0.9);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:20px;';
  nav.innerHTML='<h2 style="color:#ffd700;margin-bottom:10px">Navigace</h2>'+
    '<button class="nav-btn" onclick="jumpTo(0)">Uvod + Dialog</button>'+
    '<button class="nav-btn" onclick="jumpTo(1)">Okruh 1: Cestina</button>'+
    '<button class="nav-btn" onclick="jumpTo(2)">Scenka 1: Skripek</button>'+
    '<button class="nav-btn" onclick="jumpTo(3)">Okruh 2: Matika</button>'+
    '<button class="nav-btn" onclick="jumpTo(4)">Scenka 2: Repak</button>'+
    '<button class="nav-btn" onclick="jumpTo(5)">Okruh 3: Anglictina</button>'+
    '<button class="nav-btn" onclick="jumpTo(6)">Scenka 3: Keksik</button>'+
    '<button class="nav-btn" onclick="jumpTo(7)">Okruh 4: Mix</button>'+
    '<button class="nav-btn" onclick="jumpTo(8)">Scenka 4: Krivak</button>'+
    '<button class="nav-btn" onclick="jumpTo(9)">Zaver</button>'+
    '<button class="nav-btn" style="background:#555;margin-top:10px" onclick="this.parentElement.style.display=\'none\'">Zavrit</button>';
  document.getElementById('game').appendChild(nav);
  // Add style for nav buttons
  if(!document.getElementById('nav-style')){
    var s=document.createElement('style');s.id='nav-style';
    s.textContent='.nav-btn{width:250px;padding:12px;border:none;border-radius:10px;background:rgba(255,215,0,0.2);color:#ffd700;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.15s;}.nav-btn:hover{background:rgba(255,215,0,0.4);transform:scale(1.03);}';
    document.head.appendChild(s);
  }
}
function jumpTo(section){
  document.getElementById('nav-panel').style.display='none';
  // Stop current flow
  if(skipResolve){skipResolve();skipResolve=null;}
  $dlg.innerHTML='';$qt.textContent='';$opts.innerHTML='';$cont.style.display='none';
  document.getElementById('video-box').style.display='none';
  document.getElementById('collect').style.display='none';
  // Jump to section
  runFromSection(section);
}
async function runFromSection(startSection){
  if(!data){
    try{var r=await fetch('mise01_scenar_d01.json');data=await r.json();}
    catch(e){if(window._EMBEDDED_DATA)data=window._EMBEDDED_DATA;else return;}
  }
  $sc.textContent='⭐ '+stars;
  var section=startSection;
  // Intro
  if(section<=0){
    // D1-S1 — původní úvodní video
    await playVideo('intro0');
    // 1.V — druhé intro video
    await playVideo('intro');
    // 1.O — Volta sám, první část dialogů
    setBg('intro');
    var splitIdx=0;
    for(var si=0;si<data.intro.length;si++){if(data.intro[si].p==='agent'){splitIdx=si;break;}}
    if(splitIdx>0){
      await playD(data.intro.slice(0,splitIdx));clrD();
      // 2.O — Volta + Agent, zbytek dialogů
      setBg('intro2');
      await playD(data.intro.slice(splitIdx));clrD();
    }else{
      await playD(data.intro);clrD();
    }
    section=1;
  }
  // Okruhy loop
  for(var ri=0;ri<data.okruhy.length;ri++){
    var ok=data.okruhy[ri];
    var bgK='quiz';
    var vidK=[null,'skripek','repak','keksik'][ri];
    // Okruh questions
    if(section<=(ri*2+1)){
      $rl.textContent=RICOS[ri]+' '+RNAMES[ri]+' — Okruh '+(ri+1);
      setBg('quiz');
      if(ok.intro&&ok.intro.length>0){await playD(ok.intro);clrD();}
      for(var qi=0;qi<ok.otazky.length;qi++){await askQ(ok.otazky[qi],qi+1,ok.otazky.length);clrD();}
      section=ri*2+2;
    }
    // Scenka after okruh
    if(section<=(ri*2+2)){
      if(vidK)await playVideo(vidK);
      if(ok.akce&&ok.akce.dialog&&ok.akce.dialog.length>0){if(vidK)setBg(vidK);await playD(ok.akce.dialog);clrD();}
      if(ok.akce&&ok.akce.sber)await showCollect(ok.akce.sber);
      if(ok.scenka&&ok.scenka.length>0){setBg(bgK);await playD(ok.scenka);clrD();}
      section=ri*2+3;
    }
  }
  // Zaver
  if(section<=9){
    setBg('zaver');await playVideo('zaver');
    if(data.zaver&&data.zaver.length>0)await playD(data.zaver,'zaver');
    $rl.textContent='';$qt.textContent='';$opts.innerHTML='';$cont.style.display='none';$ans.style.display='none';
    showSum();
  }
}
function setBg(k){$bg.style.backgroundImage='url('+(IMG[k]||k)+')';}
var _userClicked=false;
document.addEventListener('click',function(){_userClicked=true;},{ once:true });
function playVideo(k){return new Promise(function(res){var u=VID[k];if(!u){res();return;}var b=document.getElementById('video-box'),v=document.getElementById('vid');b.style.display='flex';v.muted=!_userClicked;v.src=u;v.onended=function(){b.style.display='none';v.src='';res();};v.onerror=function(){b.style.display='none';v.src='';res();};window._skR=res;v.load();v.play().catch(function(){});});}
function skipVideo(){var b=document.getElementById('video-box'),v=document.getElementById('vid');v.pause();b.style.display='none';v.src='';if(window._skR){window._skR();window._skR=null;}}

function addB(who,text){var d=document.createElement('div');d.className='bubble '+(SIDES[who]||'left')+' '+(BCLS[who]||'b-popis');var nm=NAMES[who];if(nm)d.innerHTML='<div class="name">'+nm+'</div><div class="text">'+text+'</div>';else d.innerHTML='<div class="text">'+text+'</div>';$dlg.appendChild(d);d.scrollIntoView({behavior:'smooth'});}
function clrD(){$dlg.innerHTML='';}
function waitC(label){return new Promise(function(res){$cont.style.display='block';$cont.textContent=label||'Pokračovat →';$cont.onclick=function(){$cont.style.display='none';res();};});}
async function playD(arr,bg){if(bg)setBg(bg);for(var i=0;i<arr.length;i++){addB(arr[i].postava||arr[i].p,arr[i].text||arr[i].t);await waitC();}}

function showStar(){var s=document.createElement('div');s.className='star-fly';s.textContent='⭐';s.style.left=(window.innerWidth/2-14)+'px';s.style.top=(window.innerHeight/2)+'px';document.body.appendChild(s);setTimeout(function(){s.remove();},900);}

function askQ(q,num,tot){
return new Promise(function(resolve){
clrD();
addB('volta',q.vi||q.question);
$qt.textContent=q.question;
$qp.textContent=num+'/'+tot;
var correct=q.answer;
var wrongs=q.options.filter(function(o){return o!==correct;});
for(var i=wrongs.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=wrongs[i];wrongs[i]=wrongs[j];wrongs[j]=t;}
var opts=[correct,wrongs[0],wrongs[1],wrongs[2],wrongs[3]];
for(var i=opts.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=opts[i];opts[i]=opts[j];opts[j]=t;}
var attempts=0,letters=['A','B','C','D','E'];

function render(){
$opts.innerHTML='';
for(var i=0;i<opts.length;i++){
var btn=document.createElement('button');btn.className='opt-btn';
btn.innerHTML='<span class="opt-letter">'+letters[i]+'</span>'+opts[i];
btn.dataset.val=opts[i];
(function(val,el){el.onclick=function(){handle(val,el);};})(opts[i],btn);
$opts.appendChild(btn);
}}

function disableAll(){var all=$opts.querySelectorAll('.opt-btn');for(var k=0;k<all.length;k++)all[k].style.pointerEvents='none';}
function markCorrect(){var all=$opts.querySelectorAll('.opt-btn');for(var k=0;k<all.length;k++){if(all[k].dataset.val===correct)all[k].className='opt-btn correct';else if(all[k].className.indexOf('wrong')===-1)all[k].className='opt-btn disabled';}}

function handle(val,el){
attempts++;
if(val===correct){
el.className='opt-btn correct';disableAll();
addB('volta',q.vs||'Správně!');
if(attempts===1){stars++;correctFirst++;$sc.textContent='⭐ '+stars;showStar();}
totalQ++;
waitC('Další →').then(function(){$qt.textContent='';$opts.innerHTML='';resolve({ok:true,att:attempts});});
}else{
el.className='opt-btn wrong';el.style.pointerEvents='none';
if(attempts<3){
addB('volta',attempts===1?(q.hint||q.vn||'Zkus znovu.'):(q.vn||'Poslední pokus!'));
}else{
markCorrect();disableAll();
addB('volta',q.vn||'Správná odpověď: '+correct);
totalQ++;
waitC('Další →').then(function(){$qt.textContent='';$opts.innerHTML='';resolve({ok:false,att:3});});
}}}
render();
});}

function showCollect(item){return new Promise(function(res){collected.push(item);var c=document.getElementById('collect');c.querySelector('.c-icon').textContent=item.ikona;c.querySelector('.c-title').textContent=item.nazev;c.querySelector('.c-desc').textContent=item.popis;c.style.display='flex';window._cR=res;});}
function closeCollect(){document.getElementById('collect').style.display='none';if(window._cR){window._cR();window._cR=null;}}

function showSum(){
var coins = stars * 5 + correctFirst * 2; // 5 per star + 2 bonus per first-try
var c=document.getElementById('summary-card');
c.innerHTML='<h2 style="font-size:22px;color:#f59e0b;margin-bottom:12px">🎉 Den 1 hotový!</h2>'+
'<div style="display:flex;gap:20px;justify-content:center;margin:16px 0">'+
'<div style="text-align:center"><div style="font-size:28px;font-weight:800;color:#f59e0b">⭐ '+stars+'</div><div style="font-size:12px;color:#999">hvězd</div></div>'+
'<div style="text-align:center"><div style="font-size:28px;font-weight:800;color:#22c55e">'+correctFirst+'</div><div style="font-size:12px;color:#999">napoprvé</div></div>'+
'<div style="text-align:center"><div style="font-size:28px;font-weight:800;color:#ffd700">💰 '+coins+'</div><div style="font-size:12px;color:#999">mincí</div></div></div>'+
'<div style="margin-top:16px"><div style="font-size:14px;color:#f59e0b;font-weight:700;margin-bottom:8px">Sebrané předměty</div>'+
collected.map(function(it){return '<div style="display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.06);padding:6px 12px;border-radius:8px;margin:3px;font-size:13px">'+it.ikona+' '+it.nazev+'</div>';}).join('')+'</div>'+
'<div style="margin-top:20px"><button onclick="goToMinigame('+coins+')" style="padding:16px 40px;border-radius:14px;border:none;background:linear-gradient(135deg,#f59e0b,#d97706);color:#000;font-size:18px;font-weight:800;cursor:pointer;font-family:Nunito,sans-serif;">🎮 Jít stavět laboratoř! ('+coins+' mincí)</button></div>';
document.getElementById('summary').style.display='flex';
}
function goToMinigame(coins){
window.location.href='du_lab_prototyp.html?coins='+coins;
}

async function run(){
try{var r=await fetch('mise01_scenar_d01.json');data=await r.json();}
catch(e){if(window._EMBEDDED_DATA){data=window._EMBEDDED_DATA;}
else{document.body.innerHTML='<div style="padding:40px;text-align:center">Chyba nacitani dat.</div>';return;}}
Object.values(IMG).forEach(function(s){new Image().src=s;});
$sc.textContent='⭐ 0';
await runFromSection(0);
}
window.addEventListener('load',run);
</script>
